<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - เยี่ยมบ้านนักเรียน</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f4f7fe; overflow: hidden; }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // 🔴 เปลี่ยน URL ตรงนี้
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxunxLelcTes_NAvm3sfL5L5wkAG2-i0x5H1JyYdBI676LQ6PiQNg373HTecsLKk-jc/exec";

    function LoginApp() {
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!username || !password) return setError("กรุณากรอกข้อมูลให้ครบถ้วน");
        if (SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL") return setError("กรุณาตั้งค่า SCRIPT_URL ในโค้ดก่อนใช้งาน");

        setLoading(true); setError("");
        try {
          const q = new URLSearchParams({ action: "login", username, password }).toString();
          const r = await fetch(`${SCRIPT_URL}?${q}`);
          const res = await r.json();
          
          if (res.success) {
            // บันทึกข้อมูลลงเครื่องแล้ววาร์ปไปหน้า Dashboard
            localStorage.setItem("hv_user", JSON.stringify(res.data));
            window.location.href = "dashboard.html";
          } else {
            setError(res.message || "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
            setLoading(false);
          }
        } catch (err) {
          setError("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
          setLoading(false);
        }
      };

      return (
        <div className="w-full max-w-md p-8 glass-card rounded-[2rem] shadow-2xl border border-white mx-4 animate-[fadeIn_0.5s_ease-out]">
          <div className="text-center mb-8">
            <div className="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/30">
              <i className="fa-solid fa-house-chimney-user text-3xl text-white"></i>
            </div>
            <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight">ระบบเยี่ยมบ้านนักเรียน</h1>
            <p className="text-sm text-slate-500 mt-2 font-medium">โรงเรียนป่าก้าง · ปีการศึกษา 2568</p>
          </div>

          <form onSubmit={handleLogin} className="space-y-5">
            <div>
              <label className="block text-sm font-bold text-slate-700 mb-2 ml-1">ชื่อผู้ใช้งาน</label>
              <div className="relative">
                <i className="fa-solid fa-user absolute left-4 top-4 text-slate-400"></i>
                <input type="text" value={username} onChange={e => setUsername(e.target.value)}
                  className="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-bold text-slate-700 placeholder:font-medium placeholder:text-slate-400"
                  placeholder="Username" />
              </div>
            </div>
            <div>
              <label className="block text-sm font-bold text-slate-700 mb-2 ml-1">รหัสผ่าน</label>
              <div className="relative">
                <i className="fa-solid fa-lock absolute left-4 top-4 text-slate-400"></i>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                  className="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-bold tracking-wider text-slate-700 placeholder:font-medium placeholder:text-slate-400"
                  placeholder="••••••••" />
              </div>
            </div>

            {error && (
              <div className="bg-rose-50 text-rose-600 px-4 py-3 rounded-xl text-sm font-bold text-center border border-rose-100 animate-[shake_0.4s_ease-in-out]">
                <i className="fa-solid fa-circle-exclamation mr-2"></i>{error}
              </div>
            )}

            <button type="submit" disabled={loading}
              className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-blue-500/30 transform transition-all hover:-translate-y-1 disabled:opacity-70 disabled:hover:translate-y-0 mt-4 flex justify-center items-center gap-2">
              {loading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <><i className="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ</>}
            </button>
          </form>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LoginApp />);
  </script>
</body>
</html>
