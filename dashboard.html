<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - เยี่ยมบ้านนักเรียน</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-slate-700 h-screen overflow-hidden">
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 🔴 เปลี่ยน URL ตรงนี้ให้ตรงกับหน้า Login
    const SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL";

    // --- Utilities ---
    const api = {
      async get(action, params = {}) {
        const q = new URLSearchParams({ action, ...params }).toString();
        try { const r = await fetch(`${SCRIPT_URL}?${q}`); return await r.json(); } 
        catch { return { success: false, message: "เชื่อมต่อขัดข้อง" }; }
      },
      async post(body) {
        try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" } }); return await r.json(); } 
        catch { return { success: false, message: "เชื่อมต่อขัดข้อง" }; }
      }
    };

    const HOUSE_COND = ["ดีมาก","ดี","ปานกลาง","ทรุดโทรม","ไม่ปลอดภัย"];
    const REL_OPTS = ["อบอุ่นดีมาก","อบอุ่นดี","ปานกลาง","ไม่ค่อยอบอุ่น","มีปัญหา"];
    const VISIT_STAT = ["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"];
    const RESULT_OPTS = ["ปกติ","ต้องเฝ้าระวัง","ต้องช่วยเหลือเร่งด่วน","ส่งต่อ"];

    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
      return (
        <div className={`fixed top-6 right-6 z-50 px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 animate-[fadeIn_0.3s_ease-out] border-l-4 bg-white ${type==='success'?'border-emerald-500':'border-rose-500'}`}>
          <i className={`fa-solid ${type==='success'?'fa-circle-check text-emerald-500':'fa-circle-exclamation text-rose-500'} text-xl`}></i>
          <span className="font-bold text-sm text-slate-700">{msg}</span>
        </div>
      );
    };

    // --- Main App ---
    function DashboardApp() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState("list"); // 'list' หรือ 'form'
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [toast, setToast] = useState(null);

      useEffect(() => {
        const savedUser = localStorage.getItem("hv_user");
        if (!savedUser) { window.location.href = "login.html"; return; }
        setUser(JSON.parse(savedUser));
      }, []);

      const logout = () => { localStorage.removeItem("hv_user"); window.location.href = "login.html"; };
      const openForm = (student) => { setSelectedStudent(student); setView("form"); };
      const backToList = () => { setSelectedStudent(null); setView("list"); };

      if (!user) return <div className="flex h-screen items-center justify-center"><i className="fa-solid fa-spinner fa-spin text-4xl text-blue-500"></i></div>;

      return (
        <div className="flex h-full w-full">
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          
          {/* Sidebar */}
          <aside className="w-[280px] bg-white border-r border-slate-200 flex flex-col h-full flex-shrink-0 z-30 shadow-lg">
            <div className="p-8 pb-6 flex flex-col items-center border-b border-slate-50">
              <div className="w-24 h-24 rounded-full border-4 border-blue-50 p-1 mb-4 shadow-inner">
                <img src={`https://ui-avatars.com/api/?name=${user.fullName}&background=2563EB&color=fff`} className="w-full h-full rounded-full object-cover" />
              </div>
              <h2 className="text-lg font-extrabold text-slate-800 text-center leading-tight">{user.fullName}</h2>
              <p className="text-xs text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full mt-3 font-bold">ครูประจำชั้น {user.classLevel}</p>
            </div>
            
            <div className="p-4 flex-1">
              <nav className="space-y-2">
                <button onClick={backToList} className={`w-full flex items-center space-x-4 px-5 py-4 rounded-2xl transition-all font-bold ${view==='list' ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                  <i className="fa-solid fa-users text-lg w-5"></i><span>รายชื่อนักเรียน</span>
                </button>
              </nav>
            </div>
            
            <div className="p-5 border-t border-slate-100">
              <button onClick={logout} className="w-full bg-white border border-rose-200 hover:bg-rose-50 text-rose-500 py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors shadow-sm">
                <i className="fa-solid fa-power-off"></i><span>ออกจากระบบ</span>
              </button>
            </div>
          </aside>

          {/* Main Content Area */}
          <main className="flex-1 flex flex-col h-full overflow-hidden bg-slate-50 relative">
            <header className="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 flex items-center justify-between flex-shrink-0 z-20">
              <div className="flex items-center space-x-4">
                <div className="bg-gradient-to-tr from-blue-500 to-indigo-500 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md">
                  <i className="fa-solid fa-house-chimney-user"></i>
                </div>
                <h1 className="text-xl font-extrabold text-slate-800 tracking-tight">ระบบบันทึกเยี่ยมบ้าน</h1>
              </div>
              {view === 'form' && (
                <button onClick={backToList} className="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-xl font-bold text-sm transition-colors flex items-center gap-2">
                  <i className="fa-solid fa-arrow-left"></i> กลับหน้ารายชื่อ
                </button>
              )}
            </header>

            <div className="flex-1 overflow-y-auto p-6 md:p-10">
              <div className="max-w-5xl mx-auto">
                {view === "list" ? (
                  <StudentList user={user} onSelect={openForm} setToast={setToast} />
                ) : (
                  <VisitForm user={user} student={selectedStudent} onDone={() => { backToList(); setToast({msg: "บันทึกข้อมูลเยี่ยมบ้านสำเร็จ!", type: "success"}); }} setToast={setToast} />
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    // --- Student List Component ---
    function StudentList({ user, onSelect, setToast }) {
      const [students, setStudents] = useState([]);
      const [visits, setVisits] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState("");

      useEffect(() => {
        Promise.all([
          api.get("getStudents", { classLevel: user.classLevel }),
          api.get("getVisits", { classLevel: user.classLevel })
        ]).then(([sRes, vRes]) => {
          if (sRes.success) setStudents(sRes.data);
          if (vRes.success) setVisits(vRes.data);
          setLoading(false);
        }).catch(() => {
          setLoading(false); setToast({ msg: "โหลดข้อมูลล้มเหลว", type: "error" });
        });
      }, [user]);

      const getStatus = (name) => { const v = visits.find(v => v.studentName === name); return v ? v.visitStatus : "ยังไม่เยี่ยม"; };
      const filtered = students.filter(s => !search || s.studentName.includes(search) || s.nickname?.includes(search) || s.studentNo?.includes(search));
      const visitedCount = students.filter(s => getStatus(s.studentName) === "เยี่ยมแล้ว").length;

      if (loading) return <div className="text-center py-20"><i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4 block"></i><span className="font-bold text-slate-500">กำลังโหลดข้อมูลนักเรียน...</span></div>;

      return (
        <div className="fade-in">
          {/* Stats */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
              <div><p className="text-slate-400 font-bold text-sm mb-1">นักเรียนทั้งหมด</p><h3 className="text-4xl font-black text-slate-800">{students.length}</h3></div>
              <div className="w-14 h-14 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-2xl"><i className="fa-solid fa-users"></i></div>
            </div>
            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
              <div><p className="text-slate-400 font-bold text-sm mb-1">เยี่ยมแล้ว</p><h3 className="text-4xl font-black text-emerald-600">{visitedCount}</h3></div>
              <div className="w-14 h-14 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center text-2xl"><i className="fa-solid fa-house-circle-check"></i></div>
            </div>
            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
              <div><p className="text-slate-400 font-bold text-sm mb-1">ยังไม่เยี่ยม</p><h3 className="text-4xl font-black text-rose-500">{students.length - visitedCount}</h3></div>
              <div className="w-14 h-14 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center text-2xl"><i className="fa-solid fa-house-circle-xmark"></i></div>
            </div>
          </div>

          <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 className="text-2xl font-black text-slate-800">รายชื่อนักเรียน <span className="text-blue-500">ชั้น {user.classLevel}</span></h2>
            <div className="relative w-full md:w-80">
              <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
              <input type="text" placeholder="ค้นหาชื่อ หรือ เลขที่..." value={search} onChange={e => setSearch(e.target.value)} className="w-full bg-white border border-slate-200 rounded-2xl py-3 pl-11 pr-4 font-bold text-sm outline-none focus:border-blue-500 shadow-sm transition-all" />
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {filtered.length === 0 && <div className="col-span-full text-center py-10 text-slate-400 font-bold">ไม่พบข้อมูลนักเรียน</div>}
            {filtered.map((s, i) => {
              const status = getStatus(s.studentName);
              const isDone = status === "เยี่ยมแล้ว";
              return (
                <div key={i} onClick={() => onSelect(s)} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-300 transition-all cursor-pointer flex items-center justify-between group fade-in" style={{animationDelay: `${i*0.05}s`}}>
                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center font-black text-lg group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">{s.studentNo}</div>
                    <div>
                      <h4 className="font-bold text-slate-800 text-base">{s.studentName}</h4>
                      <p className="text-xs text-slate-500 font-medium mt-0.5">{s.nickname && `ชื่อเล่น: ${s.nickname}`}</p>
                    </div>
                  </div>
                  <div>
                    {isDone ? 
                      <span className="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg text-xs font-bold border border-emerald-100 flex items-center gap-1"><i className="fa-solid fa-check"></i> เยี่ยมแล้ว</span> : 
                      <span className="bg-rose-50 text-rose-500 px-3 py-1.5 rounded-lg text-xs font-bold border border-rose-100">ยังไม่เยี่ยม</span>
                    }
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // --- Visit Form Component ---
    function VisitForm({ user, student, onDone, setToast }) {
      const [tab, setTab] = useState(0);
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({
        semester: "1", visitStatus: "เยี่ยมแล้ว", visitDate: new Date().toISOString().split("T")[0], observations: "",
        houseType: "", distanceKm: "", travelMethod: "", houseCondition: "", utilities: "", environment: "",
        familyMembers: "", siblings: "", familyRelationship: "", familyIncome: "", studentDuties: "", familyActivities: "",
        riskHealth: "", riskSafety: "", riskTravel: "", riskWork: "", riskSocial: "", riskSubstance: "",
        parentConcerns: "", visitResult: "", teacherNotes: ""
      });

      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
      const TABS = ["สถานะการเยี่ยม", "ข้อมูลที่พัก", "ข้อมูลครอบครัว", "พฤติกรรมเสี่ยง", "ข้อห่วงใย", "สรุปผล"];

      const handleSave = async () => {
        setSaving(true);
        const data = { ...form, teacherUsername: user.username, teacherName: user.fullName, classLevel: user.classLevel, studentNo: student.studentNo, studentName: student.studentName, nickname: student.nickname };
        const res = await api.post({ action: "saveVisit", data });
        if (!res.success) { setToast({ msg: res.message || "เกิดข้อผิดพลาด", type: "error" }); setSaving(false); return; }
        setSaving(false); onDone();
      };

      const Input = ({ label, type="text", k, placeholder="" }) => (
        <div className="mb-5"><label className="block text-sm font-bold text-slate-600 mb-2 ml-1">{label}</label><input type={type} value={form[k]} onChange={e=>set(k, e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 font-medium text-slate-700 transition-all" placeholder={placeholder}/></div>
      );
      const Select = ({ label, k, options }) => (
        <div className="mb-5"><label className="block text-sm font-bold text-slate-600 mb-2 ml-1">{label}</label><select value={form[k]} onChange={e=>set(k, e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 font-bold text-slate-700 transition-all cursor-pointer"><option value="">-- เลือก --</option>{options.map(o=><option key={o}>{o}</option>)}</select></div>
      );
      const Textarea = ({ label, k, rows=3, placeholder="" }) => (
        <div className="mb-5"><label className="block text-sm font-bold text-slate-600 mb-2 ml-1">{label}</label><textarea rows={rows} value={form[k]} onChange={e=>set(k, e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 font-medium text-slate-700 transition-all resize-y" placeholder={placeholder}/></div>
      );

      return (
        <div className="fade-in max-w-3xl mx-auto">
          {/* Header Card */}
          <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-3xl p-8 text-white shadow-lg mb-8 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-48 h-48 bg-white/10 rounded-full blur-2xl transform translate-x-10 -translate-y-10 pointer-events-none"></div>
            <h2 className="text-3xl font-black mb-1 drop-shadow-sm">{student.studentName}</h2>
            <div className="flex gap-3 mt-4">
              <span className="bg-white/20 backdrop-blur-sm border border-white/30 px-4 py-1.5 rounded-full text-sm font-bold">ชั้น {user.classLevel}</span>
              <span className="bg-white/20 backdrop-blur-sm border border-white/30 px-4 py-1.5 rounded-full text-sm font-bold">เลขที่ {student.studentNo}</span>
            </div>
          </div>

          {/* Tab Navigation */}
          <div className="flex gap-2 overflow-x-auto custom-scroll pb-2 mb-6">
            {TABS.map((t, i) => (
              <button key={i} onClick={() => setTab(i)} className={`flex-none px-6 py-2.5 rounded-full font-bold text-sm transition-all ${tab === i ? 'bg-slate-800 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                {i+1}. {t}
              </button>
            ))}
          </div>

          {/* Form Content */}
          <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 min-h-[400px]">
            <h3 className="text-xl font-black text-slate-800 mb-6 border-b-2 border-slate-100 pb-4 tracking-tight"><span className="text-blue-500 mr-2">#</span>{TABS[tab]}</h3>
            
            <div className="animate-[fadeIn_0.3s_ease-out]">
              {tab === 0 && <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6"><Select label="ภาคเรียน" k="semester" options={["1","2"]}/><Select label="สถานะการเยี่ยม" k="visitStatus" options={VISIT_STAT}/><Input label="วันที่เยี่ยมบ้าน" type="date" k="visitDate"/><div className="col-span-full"><Textarea label="การสังเกตและสอบถามเบื้องต้น" k="observations" rows={4} placeholder="ระบุสิ่งที่สังเกตเห็น..."/></div></div>}
              
              {tab === 1 && <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6"><Input label="ลักษณะที่อยู่อาศัย (เช่น บ้านเดี่ยว, หอพัก)" k="houseType"/><Input label="ระยะทางจากบ้านถึง รร. (กม.)" k="distanceKm"/><Input label="วิธีการเดินทางมา รร." k="travelMethod"/><Select label="สภาพบ้าน" k="houseCondition" options={HOUSE_COND}/><Input label="สาธารณูปโภค (น้ำ/ไฟ)" k="utilities"/><div className="col-span-full"><Textarea label="สภาพแวดล้อมรอบบ้าน" k="environment"/></div></div>}
              
              {tab === 2 && <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6"><Input label="จำนวนสมาชิกในบ้าน (คน)" k="familyMembers"/><Input label="จำนวนพี่น้อง (คน)" k="siblings"/><Select label="ความสัมพันธ์ในครอบครัว" k="familyRelationship" options={REL_OPTS}/><Input label="รายได้ครอบครัว (บาท/เดือน)" k="familyIncome"/><Input label="ภาระงาน/ความรับผิดชอบของนักเรียน" k="studentDuties"/><div className="col-span-full"><Textarea label="กิจกรรมที่ทำร่วมกันในครอบครัว" k="familyActivities"/></div></div>}
              
              {tab === 3 && <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6"><Input label="ด้านสุขภาพ" k="riskHealth" placeholder="ระบุ (ถ้ามี)"/><Input label="ด้านความปลอดภัย" k="riskSafety" placeholder="ระบุ (ถ้ามี)"/><Input label="ด้านการเดินทาง" k="riskTravel" placeholder="ระบุ (ถ้ามี)"/><Input label="ด้านการงาน/เศรษฐกิจ" k="riskWork" placeholder="ระบุ (ถ้ามี)"/><Input label="ด้านกิจกรรม/คบเพื่อน" k="riskSocial" placeholder="ระบุ (ถ้ามี)"/><Input label="ด้านสารเสพติด" k="riskSubstance" placeholder="ระบุ (ถ้ามี)"/></div>}
              
              {tab === 4 && <div><Textarea label="ข้อห่วงใย/ความต้องการของผู้ปกครอง" k="parentConcerns" rows={6}/></div>}
              
              {tab === 5 && <div>
                <div className="grid grid-cols-4 gap-4 mb-8">
                  {[1,2,3,4].map(n=><div key={n} className="aspect-square border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center text-slate-400 bg-slate-50 cursor-pointer hover:border-blue-400 hover:text-blue-500 transition-colors"><i className="fa-solid fa-camera text-2xl mb-2"></i><span className="text-xs font-bold">อัปโหลดรูป {n}</span></div>)}
                </div>
                <Select label="สรุปผลการเยี่ยมบ้าน" k="visitResult" options={RESULT_OPTS}/>
                <Textarea label="บันทึกเพิ่มเติมจากครูประจำชั้น" k="teacherNotes" rows={4}/>
              </div>}
            </div>

            {/* Form Actions */}
            <div className="flex justify-between items-center mt-10 pt-6 border-t border-slate-100">
              <button onClick={() => setTab(Math.max(0, tab - 1))} disabled={tab === 0} className="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 disabled:opacity-30 disabled:hover:bg-transparent transition-colors flex items-center gap-2">
                <i className="fa-solid fa-arrow-left"></i> ย้อนกลับ
              </button>
              
              {tab < TABS.length - 1 ? (
                <button onClick={() => setTab(tab + 1)} className="px-8 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition-all flex items-center gap-2">
                  ถัดไป <i className="fa-solid fa-arrow-right"></i>
                </button>
              ) : (
                <button onClick={handleSave} disabled={saving} className="px-10 py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 shadow-lg shadow-emerald-500/30 transition-all flex items-center gap-2 disabled:opacity-70 disabled:cursor-wait transform hover:-translate-y-0.5">
                  {saving ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-floppy-disk"></i>}
                  {saving ? "กำลังบันทึก..." : "บันทึกข้อมูลเยี่ยมบ้าน"}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DashboardApp />);
  </script>
</body>
</html>
