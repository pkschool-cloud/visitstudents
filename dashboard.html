<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบคัดกรองนักเรียนยากจน (นร.01)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; color: #334155; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    
    .soft-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(241, 245, 249, 1); box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05); border-radius: 2rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .soft-card:hover { transform: translateY(-2px); box-shadow: 0 15px 40px -10px rgba(0, 0, 0, 0.08); }
    
    .input-wrapper { position: relative; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 1.25rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .input-wrapper:focus-within { background: #ffffff; border-color: #60a5fa; box-shadow: 0 10px 25px -5px rgba(96, 165, 250, 0.2), 0 0 0 4px rgba(96, 165, 250, 0.1); transform: translateY(-2px); }
    .premium-input { width: 100%; background: transparent; border: none; padding: 1.2rem 1.5rem; font-family: 'Prompt', sans-serif; font-weight: 500; color: #1e293b; outline: none; }
    
    .btn-press { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 9999px; cursor: pointer; }
    .btn-press:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -6px rgba(0,0,0,0.15); }
    .btn-press:active { transform: scale(0.96); box-shadow: 0 2px 5px -2px rgba(0,0,0,0.1); }
    
    .hide-scroll::-webkit-scrollbar { display: none; }

    /* 🌟 ระบบ Print หน้าเว็บ 🌟 */
    @media print {
      @page { size: A4 portrait; margin: 15mm 15mm; } 
      body { background-color: #ffffff !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .screen-only { display: none !important; }
      .print-only { display: block !important; }
      .break-after-page { page-break-after: always; }
      .break-before-page { page-break-before: always; }
      .avoid-break { page-break-inside: avoid; }
    }
    @media screen {
      .print-only { display: none !important; }
    }
  </style>
</head>
<body class="h-screen overflow-hidden bg-slate-50">
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // 🔴 ใส่ URL Google Apps Script ของคุณครูตรงนี้ครับ
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLtbMjEtqeWMU2SPG_ZySJAWDd2l5dbDagC--5d0mHGG2KOFYlRy4h85UeQrXvdtZN/exec";
    
    const SCHOOL_LAT = 18.862105; const SCHOOL_LON = 99.0872654;

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="flex h-screen items-center justify-center bg-slate-50 p-6 text-center">
              <div className="bg-white p-10 rounded-[2rem] shadow-xl max-w-md w-full border border-rose-100">
                <i className="fa-solid fa-triangle-exclamation text-6xl text-rose-500 mb-6"></i>
                <h1 className="text-2xl font-black text-slate-800 mb-2">ระบบขัดข้องชั่วคราว</h1>
                <p className="text-slate-500 mb-8 text-sm">ข้อมูลปลอดภัย กรุณากดโหลดหน้าเว็บใหม่อีกครั้ง</p>
                <button className="w-full bg-slate-900 text-white font-bold py-4 rounded-full btn-press" onClick={() => window.location.reload()}>โหลดหน้าเว็บใหม่</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const api = {
      async get(action, params = {}) {
        const q = new URLSearchParams({ action, t: Date.now(), ...params }).toString();
        try { const r = await fetch(`${SCRIPT_URL}?${q}`, { cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
      },
      async post(body) {
        try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" }, cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
      }
    };

    const getVal = (obj, key) => {
      if (!obj || typeof obj !== 'object') return "";
      const k = Object.keys(obj).find(x => String(x).toLowerCase().trim() === String(key).toLowerCase().trim());
      return k && obj[k] !== undefined && obj[k] !== null ? String(obj[k]).trim() : "";
    };

    const compareId = (id1, id2) => String(id1 || "").replace(/^0+/, '').trim() === String(id2 || "").replace(/^0+/, '').trim();

    const getVisitStatus = (visits, studentNo) => {
      if (!visits || !studentNo || !Array.isArray(visits)) return "ยังไม่เยี่ยม";
      const v = [...visits].reverse().find(v => compareId(getVal(v, 'studentNo'), studentNo));
      return v ? (getVal(v, 'visitStatus') || "ยังไม่เยี่ยม") : "ยังไม่เยี่ยม";
    };

    const checkIsAdmin = (lvl) => {
      const c = String(lvl || "").toLowerCase().trim();
      return c === "แอดมิน" || c === "admin" || c === "ทั้งหมด" || c === "ผู้บริหาร";
    };

    const safeDateForDisplay = (dateVal) => {
      if (!dateVal || String(dateVal).trim() === "") return "-";
      try {
        const d = new Date(dateVal);
        if (isNaN(d.getTime())) return String(dateVal); 
        return d.toLocaleDateString('th-TH', {year:'numeric', month:'short', day:'numeric'});
      } catch(e) { return "-"; }
    };

    const safeDateForInput = (dateStr) => {
      if (!dateStr || String(dateStr).trim() === "") return new Date().toISOString().split("T")[0];
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return new Date().toISOString().split("T")[0];
        return d.toISOString().split("T")[0];
      } catch(e) { return new Date().toISOString().split("T")[0]; }
    };

    const PremiumInput = ({ label, value, onChange, type="text", placeholder="", icon, disabled=false }) => (
      <div className="mb-6 pop-in">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">{label}</label>
        <div className={`input-wrapper flex items-center overflow-hidden ${disabled ? 'opacity-60 bg-slate-100' : ''}`}>
          {icon && <div className="pl-5 text-slate-400"><i className={`fa-solid ${icon} text-lg`}></i></div>}
          <input type={type} value={value || ""} onChange={onChange} disabled={disabled} placeholder={placeholder} className={`premium-input ${icon ? 'pl-4' : ''}`} />
        </div>
      </div>
    );

    const PremiumSelect = ({ label, value, onChange, options, icon, disabled=false }) => (
      <div className="mb-6 pop-in">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">{label}</label>
        <div className={`input-wrapper flex items-center overflow-hidden relative ${disabled ? 'opacity-60 bg-slate-100' : ''}`}>
          {icon && <div className="pl-5 text-slate-400"><i className={`fa-solid ${icon} text-lg`}></i></div>}
          <select value={value || ""} onChange={onChange} disabled={disabled} className={`premium-input appearance-none cursor-pointer ${icon ? 'pl-4' : ''} bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[position:right_1.5rem_center] bg-[length:0.8rem_auto]`}>
            <option value="">- กรุณาเลือก -</option>
            {options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        </div>
      </div>
    );

    const PremiumTextarea = ({ label, value, onChange, rows=3, placeholder="" }) => (
      <div className="mb-6 pop-in col-span-full">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">{label}</label>
        <div className="input-wrapper">
          <textarea rows={rows} value={value || ""} onChange={onChange} placeholder={placeholder} className="premium-input resize-none rounded-[1.25rem]"></textarea>
        </div>
      </div>
    );

    const CheckboxGroup = ({ label, options, selectedStr, onChange }) => {
      const selectedArr = selectedStr ? selectedStr.split(', ') : [];
      const handleToggle = (opt) => {
        let newArr = [...selectedArr];
        if (newArr.includes(opt)) newArr = newArr.filter(x => x !== opt);
        else newArr.push(opt);
        onChange(newArr.join(', '));
      };
      return (
        <div className="mb-6 pop-in col-span-full">
          <label className="block text-sm font-bold text-slate-500 mb-3 pl-4">{label} (เลือกได้มากกว่า 1)</label>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3 pl-4">
            {options.map(o => (
              <label key={o} className="flex items-center space-x-3 cursor-pointer group">
                <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${selectedArr.includes(o) ? 'bg-blue-500 border-blue-500' : 'bg-white border-slate-300 group-hover:border-blue-400'}`}>
                  {selectedArr.includes(o) && <i className="fa-solid fa-check text-white text-xs"></i>}
                </div>
                <span className="text-slate-700 font-medium">{o}</span>
              </label>
            ))}
          </div>
        </div>
      );
    };

    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
      return ReactDOM.createPortal(
        <div className={`fixed top-6 right-6 z-[999999] px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 slide-up ${type === 'success' ? 'bg-emerald-500 text-white shadow-emerald-500/40' : type === 'warning' ? 'bg-amber-500 text-white shadow-amber-500/40' : 'bg-rose-500 text-white shadow-rose-500/40'}`}>
          <i className={`fa-solid ${type === 'success' ? 'fa-check' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-xmark'} text-xl`}></i><span className="font-bold tracking-wide">{msg}</span>
        </div>,
        document.body
      );
    };

    const GpsPopup = ({ status, distance }) => {
      if (!status) return null;
      return ReactDOM.createPortal(
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[99999] flex items-center justify-center fade-in" style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0 }}>
          <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl flex flex-col items-center bounce-in w-[340px]">
            {status === "loading" && (
              <>
                <div className="relative flex justify-center items-center w-24 h-24 bg-blue-50 rounded-full mb-6">
                  <div className="absolute inset-0 border-[4px] border-blue-300 rounded-full animate-[ping_1.5s_cubic-bezier(0,0,0.2,1)_infinite] opacity-70"></div>
                  <i className="fa-solid fa-location-crosshairs text-4xl text-blue-500"></i>
                </div>
                <h3 className="font-black text-slate-800 text-2xl mb-1">คำนวณพิกัด</h3>
                <p className="font-medium text-slate-500 text-center">ค้นหาระยะทางจากสถานศึกษา...</p>
              </>
            )}
            {status === "success" && (
              <>
                <div className="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mb-6"><i className="fa-solid fa-check text-5xl text-emerald-500 bounce-in"></i></div>
                <h3 className="font-black text-slate-800 text-2xl mb-1">สำเร็จ!</h3>
                <p className="font-medium text-slate-500 text-center">ระยะห่างจากสถานศึกษา <span className="font-black text-emerald-600 text-xl">{distance} กม.</span></p>
              </>
            )}
            {status === "error" && (
              <>
                <div className="w-24 h-24 bg-rose-50 rounded-full flex items-center justify-center mb-6"><i className="fa-solid fa-xmark text-5xl text-rose-500 bounce-in"></i></div>
                <h3 className="font-black text-slate-800 text-2xl mb-1">ข้อผิดพลาด</h3>
                <p className="font-medium text-slate-500 text-center">เบราว์เซอร์ไม่รองรับ หรือไม่ได้เปิดการเข้าถึงตำแหน่ง</p>
              </>
            )}
          </div>
        </div>,
        document.body
      );
    };

    const WelcomeModal = ({ onClose }) => {
      return ReactDOM.createPortal(
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[99999] flex items-center justify-center p-4 fade-in" style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0 }}>
          <div className="bg-white rounded-[2rem] p-8 md:p-10 w-full max-w-lg shadow-2xl bounce-in text-center relative border-4 border-blue-50">
            <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner">
              <i className="fa-solid fa-hand-sparkles"></i>
            </div>
            <h2 className="text-2xl font-black text-slate-800 mb-2">ยินดีต้อนรับเข้าสู่ระบบ!</h2>
            <p className="text-slate-500 mb-8 font-medium leading-relaxed">
              หากบุคลากรเพิ่งเข้าใช้งานระบบนี้เป็นครั้งแรก<br/>
              <span className="text-blue-600 font-bold">"โปรดอ่านคู่มือการใช้งานที่เมนูด้านซ้ายก่อน"</span><br/>
              เพื่อให้เข้าใจวิธีการทำงานและการพิมพ์รายงาน นร.01 อย่างถูกต้องครับ
            </p>
            <button onClick={onClose} className="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 rounded-full btn-press shadow-xl transition-colors text-lg">รับทราบ เริ่มใช้งาน</button>
          </div>
        </div>,
        document.body
      );
    };

    // ============= Main Dashboard App =============
    function DashboardApp() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState("dashboard"); 
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [toast, setToast] = useState(null);
      const [showWelcome, setShowWelcome] = useState(false);
      
      const [globalStudents, setGlobalStudents] = useState([]);
      const [globalVisits, setGlobalVisits] = useState([]);
      
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth >= 768);

      const [adminClassFilter, setAdminClassFilter] = useState("ทั้งหมด");
      const [sidebarSearch, setSidebarSearch] = useState("");

      const [printStudents, setPrintStudents] = useState(null);
      const [printImages, setPrintImages] = useState({});
      
      const showToast = useCallback((msg, type = "success") => setToast({ msg, type }), []);

      useEffect(() => {
        const u = localStorage.getItem("hv_user_nr01_final");
        if (u) { 
          const parsed = JSON.parse(u);
          setUser(parsed); 
          loadAllData(parsed); 
        }
      }, []);

      useEffect(() => {
        if (printStudents && printStudents.length > 0) {
          const timer = setTimeout(() => {
            window.print();
            setPrintStudents(null); 
            setPrintImages({});
          }, 800);
          return () => clearTimeout(timer);
        }
      }, [printStudents]);

      const loadAllData = async (u) => {
        setIsDataLoaded(false);
        const [sRes, vRes] = await Promise.all([
          api.get("getStudents", { classLevel: u.classLevel }),
          api.get("getVisitsFull", { classLevel: u.classLevel })
        ]);
        if (sRes.success && Array.isArray(sRes.data)) setGlobalStudents(sRes.data);
        if (vRes.success && Array.isArray(vRes.data)) setGlobalVisits(vRes.data);
        setIsDataLoaded(true);
      };

      const handleLogin = async (code, stopLoading) => {
        const res = await api.post({ action: "getTeacherByCode", code });
        if (res.success && res.data) {
          localStorage.setItem("hv_user_nr01_final", JSON.stringify(res.data));
          setUser(res.data); 
          loadAllData(res.data);
          setShowWelcome(true);
        } else {
          showToast("คุณครูน่าจะกรอกรหัสผิดนะครับ ไม่พบรหัสในฐานข้อมูล รบกวนกรอกรหัสอีกครั้งนะครับ", "error");
          if(stopLoading) stopLoading();
        }
      };

      const saveVisit = async (formData) => {
        setIsSaving(true);
        const data = { ...formData, teacherCode: user.code, teacherName: user.fullName, classLevel: formData.classLevel || user.classLevel };
        
        const res = await api.post({ action: "saveVisit", data });
        if (res.success) {
          showToast("บันทึกข้อมูลเรียบร้อย!", "success");
          
          setGlobalVisits(prev => {
            const arr = Array.isArray(prev) ? [...prev] : [];
            const idx = arr.findIndex(v => compareId(getVal(v, "studentNo"), data.studentNo) && getVal(v,"classLevel") === data.classLevel);
            const newData = {...data, timestamp: new Date().toISOString()};
            if(idx > -1) arr[idx] = newData; else arr.push(newData);
            return arr;
          });

          api.get("getVisitsFull", { classLevel: user.classLevel }).then(r => { if(r.success) setGlobalVisits(r.data); });
          setView("profile"); 
        } else {
          showToast(res.message || "เกิดข้อผิดพลาดในการบันทึก", "error");
        }
        setIsSaving(false);
      };

      const deleteVisitRecord = async (studentNo, classLevel) => {
        if(!confirm(`⚠️ คำเตือน!\n\nท่านกำลังดำเนินการลบข้อมูล นร.01 ของนักเรียนเลขที่ ${studentNo}\nเมื่อลบแล้ว สถานะจะกลับเป็น "ยังไม่บันทึก" ทันที\n\nยืนยันการดำเนินการลบข้อมูลหรือไม่?`)) return;
        
        setIsSaving(true);
        const res = await api.post({ action: "deleteVisitRecord", studentNo, classLevel });
        if(res.success) {
          showToast("ดำเนินการล้างข้อมูลเรียบร้อย", "success");
          setGlobalVisits(prev => prev.filter(v => !(compareId(getVal(v, "studentNo"), studentNo) && getVal(v, "classLevel") === classLevel)));
          setView("students");
          setSelectedStudent(null);
        } else {
          showToast(res.message || "ระบบไม่สามารถดำเนินการลบข้อมูลได้", "error");
        }
        setIsSaving(false);
      };

      if (!user) return <Login onLogin={handleLogin} />;

      const isAdmin = checkIsAdmin(user.classLevel);
      const uniqueClasses = [...new Set(globalStudents.map(s => getVal(s, 'classLevel', 'classlevel')))].filter(Boolean).sort();
      
      const displayedStudents = isAdmin && adminClassFilter !== "ทั้งหมด" 
          ? globalStudents.filter(s => getVal(s, 'classLevel', 'classlevel') === adminClassFilter) 
          : globalStudents;
          
      const displayedVisits = isAdmin && adminClassFilter !== "ทั้งหมด"
          ? globalVisits.filter(v => getVal(v, 'classLevel', 'classlevel') === adminClassFilter)
          : globalVisits;

      const sidebarSearchResults = sidebarSearch 
        ? displayedStudents.filter(s => 
            String(s.studentName).includes(sidebarSearch) || 
            String(s.studentNo).includes(sidebarSearch) || 
            (s.nickname && String(s.nickname).includes(sidebarSearch))
          ).slice(0, 5) 
        : [];

      return (
        <>
          {/* 🖨️ โซนกระดาษสำหรับสั่ง Print นร.01 (ซ่อนในโหมดหน้าจอปกติ) 🖨️ */}
          {printStudents && (
            <div className="print-only bg-white text-black font-[Sarabun] w-full">
              {printStudents.map((s, index) => {

          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <StatBox icon="fa-users" label="นักเรียนทั้งหมด" count={students.length} color="text-blue-600" bg="bg-blue-50" />
            <StatBox icon="fa-check-circle" label="คัดกรองแล้ว" count={actVisited} color="text-emerald-600" bg="bg-emerald-50" />
            <StatBox icon="fa-clock" label="รอคัดกรอง" count={students.length - actVisited} color="text-rose-600" bg="bg-rose-50" />
          </div>
          
          <div className="soft-card p-10 mb-10 flex flex-col md:flex-row items-center justify-between">
             <div className="mb-8 md:mb-0 text-center md:text-left">
                <h3 className="text-2xl font-black text-slate-800">ความคืบหน้าการบันทึก</h3>
                <p className="text-slate-500 font-medium mt-2">บันทึก นร.01 เสร็จสมบูรณ์ {actVisited} จาก {students.length} คน</p>
             </div>
             <div className="w-full md:w-1/2">
                <div className="flex justify-between items-end mb-3"><span className="text-sm font-bold text-slate-400 uppercase tracking-widest">Progress</span><span className="text-5xl font-black text-blue-600">{pct}%</span></div>
                <div className="h-5 bg-slate-100 rounded-full p-1 overflow-hidden"><div className="h-full bg-gradient-to-r from-blue-400 to-blue-600 rounded-full transition-all duration-1000 shadow-sm" style={{width:`${pct}%`}}></div></div>
             </div>
          </div>

          <h3 className="font-bold text-slate-800 text-2xl mb-6">บันทึกล่าสุด</h3>
          <div className="space-y-5">
             {recent.length===0 ? <p className="text-center py-12 bg-white rounded-[2.5rem] border border-dashed border-slate-200 text-slate-400 font-medium text-lg">ยังไม่มีข้อมูล</p> : recent.map((v,i) => {
               const st = getVal(v, "visitStatus");
               return (
                 <div key={i} onClick={() => {
                   const targetStudent = students.find(s => compareId(s.studentNo, getVal(v,"studentNo")) && getVal(s, "classLevel") === getVal(v, "classLevel"));
                   if(targetStudent) onSelect(targetStudent);
                 }} className="soft-card p-6 flex flex-col sm:flex-row items-start sm:items-center justify-between cursor-pointer hover:border-blue-300 btn-press group gap-4">
                   <div className="flex items-center gap-6">
                     <div className="w-16 h-16 rounded-full bg-slate-50 text-slate-500 flex items-center justify-center font-black text-xl shadow-inner group-hover:bg-blue-600 group-hover:text-white transition-colors flex-shrink-0">{getVal(v,"studentNo")}</div>
                     <div>
                       <p className="font-black text-slate-800 text-xl">{getVal(v,"studentName")}</p>
                       <div className="flex items-center gap-3 mt-1.5 flex-wrap">
                         <p className="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md">ชั้น {getVal(v, "classLevel")}</p>
                         <p className="text-xs font-bold text-slate-400"><i className="fa-regular fa-clock mr-1"></i>{safeDateForDisplay(getVal(v, "timestamp"))}</p>
                       </div>
                     </div>
                   </div>
                   <div className="flex items-center gap-4 self-end sm:self-auto">
                     <span className={`text-sm font-bold px-5 py-2.5 rounded-full shadow-sm ${st==="เยี่ยมแล้ว" ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-slate-50 text-slate-600 border border-slate-100'}`}>{st === "เยี่ยมแล้ว" ? "บันทึกแล้ว" : "ยังไม่บันทึก"}</span>
                     <i className="fa-solid fa-chevron-right text-slate-300 group-hover:text-blue-500 text-lg hidden sm:block"></i>
                   </div>
                 </div>
               )
             })}
          </div>
        </div>
      );
    }

    const StatBox = ({ icon, label, count, color, bg }) => (
      <div className="soft-card p-8 flex flex-col items-center justify-center text-center">
        <div className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center ${bg} ${color} mb-5 shadow-sm`}><i className={`fa-solid ${icon} text-3xl`}></i></div>
        <p className="text-5xl font-black text-slate-800 leading-none tracking-tighter">{count}</p>
        <p className="text-xs font-bold text-slate-400 mt-3 uppercase tracking-wider">{label}</p>
      </div>
    );

    function Students({ students, visits, isLoaded, onSelect }) {
      const [filter, setFilter] = useState("all");
      const [search, setSearch] = useState("");

      const filtered = students.filter(s => {
        const matchStr = !search || String(s.studentName).includes(search) || String(s.studentNo).includes(search) || (s.nickname && String(s.nickname).includes(search));
        const st = getVisitStatus(visits, s.studentNo);
        if (filter === "visited") return matchStr && st === "เยี่ยมแล้ว";
        if (filter === "not_visited") return matchStr && st === "ยังไม่เยี่ยม";
        return matchStr;
      });

      if(!isLoaded) return <div className="text-center mt-32"><div className="w-16 h-16 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin mx-auto"></div></div>;

      return (
        <div className="slide-up">
          <div className="mb-10">
            <h2 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">รายชื่อนักเรียนทั้งหมด</h2>
            <p className="text-slate-500 font-medium mt-2 text-lg">พบข้อมูลนักเรียน {filtered.length} รายการ</p>
          </div>

          <div className="soft-card p-4 mb-10 flex flex-col lg:flex-row gap-4 items-center">
             <div className="flex bg-slate-50 p-1.5 rounded-full overflow-x-auto hide-scroll w-full lg:w-auto border border-slate-100">
               {[{id:"all", l:"ทั้งหมด"}, {id:"not_visited", l:"ยังไม่บันทึก"}, {id:"visited", l:"บันทึกแล้ว"}].map(f => (
                 <button key={f.id} onClick={()=>setFilter(f.id)} className={`flex-1 px-6 py-3.5 rounded-full text-sm font-bold transition-all whitespace-nowrap btn-press cursor-pointer ${filter===f.id ? "bg-white shadow-md text-blue-600" : "text-slate-400 hover:text-slate-700 hover:bg-slate-100"}`}>{f.l}</button>
               ))}
             </div>
             <div className="input-wrapper flex-1 flex items-center px-6 rounded-full w-full">
               <i className="fa-solid fa-search text-slate-400 text-lg"></i>
               <input type="text" value={search} onChange={e=>setSearch(e.target.value)} className="premium-input bg-transparent py-4 text-base" placeholder="ค้นหาชื่อ, เลขที่..." />
             </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {filtered.length===0 ? <p className="col-span-full text-center py-20 bg-white rounded-[2.5rem] border border-dashed border-slate-200 text-slate-400 font-medium text-lg">ไม่พบข้อมูลนักเรียน</p> : filtered.map((s,i) => {
              const st = getVisitStatus(visits, s.studentNo);
              return (
                <div key={i} onClick={()=>onSelect(s)} className="soft-card p-6 flex items-center justify-between cursor-pointer hover:border-blue-400 btn-press group">
                  <div className="flex items-center gap-5 overflow-hidden">
                     <div className={`w-16 h-16 rounded-[1.2rem] flex items-center justify-center font-black text-xl shadow-inner transition-colors flex-shrink-0 ${st==="เยี่ยมแล้ว"?'bg-emerald-50 text-emerald-600':'bg-slate-50 text-slate-400 group-hover:bg-blue-600 group-hover:text-white'}`}>{s.studentNo}</div>
                     <div className="truncate">
                        <h4 className="font-black text-slate-800 text-lg leading-tight group-hover:text-blue-600 transition-colors truncate">{s.studentName}</h4>
                        <div className="flex items-center gap-2 mt-1.5">
                           <span className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded">ชั้น {getVal(s, "classLevel")}</span>
                           <span className="text-xs font-bold text-slate-400">{st === "เยี่ยมแล้ว" ? "บันทึกแล้ว" : "ยังไม่บันทึก"}</span>
                        </div>
                     </div>
                  </div>
                  <div className="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-blue-50 transition-colors flex-shrink-0 ml-2">
                     <i className="fa-solid fa-chevron-right text-slate-300 group-hover:text-blue-500"></i>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function ReportExport({ students, visits, user, onPrint }) {
      const [selectedStudents, setSelectedStudents] = useState(new Set());
      const [images, setImages] = useState({});

      const toggleStudent = (no) => {
        const n = new Set(selectedStudents);
        if(n.has(no)) n.delete(no); else n.add(no);
        setSelectedStudents(n);
      };

      const handleImage = (studentNo, num, file) => {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => setImages(p => ({...p, [`${studentNo}_${num}`]: e.target.result}));
        reader.readAsDataURL(file);
      };

      const doPrint = () => {
        if(selectedStudents.size === 0) return alert("กรุณาเลือกนักเรียนก่อนครับ");
        const list = students.filter(s => selectedStudents.has(s.studentNo));
        onPrint(list, images);
      };

      const visitedList = students.filter(s => getVisitStatus(visits, s.studentNo) === "เยี่ยมแล้ว");

      return (
        <div className="fade-in max-w-4xl mx-auto">
          <div className="mb-6">
            <h2 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">ส่งออก / พิมพ์รายงาน นร.01</h2>
            <p className="text-slate-500 mt-2 text-lg">เลือกรหัสนักเรียน แนบรูปถ่ายจากอุปกรณ์ และกดสั่งพิมพ์ (หน้าต่างจะเด้งขึ้นมาใหม่)</p>
          </div>

          <div className="bg-yellow-50 border border-yellow-200 p-5 rounded-2xl mb-8">
            <p className="font-bold text-yellow-800 text-base"><i className="fa-solid fa-lightbulb mr-2"></i>ระบบแนบรูปภาพก่อนพิมพ์ (Local Image Injection)</p>
            <p className="text-sm text-yellow-700 mt-1">เพื่อให้ PDF สมบูรณ์และตรงตามแบบฟอร์ม 100% ให้บุคลากร <span className="font-bold text-rose-500">"เลือกรูปจากอุปกรณ์ ณ ตอนนี้ได้เลย"</span> (รูปจะไม่ถูกอัปโหลดขึ้นเน็ต ทำให้โหลดเร็ว ไม่ค้าง และปลอดภัยต่อข้อมูลส่วนตัว) และจะถูกประทับลงบนกระดาษ PDF โดยอัตโนมัติเมื่อกดสั่งพิมพ์ครับ</p>
          </div>

          <div className="grid grid-cols-1 gap-5 mb-8">
            {visitedList.length === 0 ? <p className="text-center py-10 bg-white rounded-2xl text-slate-400 font-bold">ยังไม่มีรายชื่อนักเรียนที่บันทึก นร.01 แล้ว</p> : visitedList.map(s => (
              <div key={s.studentNo} className={`soft-card p-6 transition-colors ${selectedStudents.has(s.studentNo) ? 'bg-blue-50 border-blue-400' : 'bg-white hover:border-blue-200'}`}>
                <div className="flex items-center justify-between cursor-pointer btn-press" onClick={() => toggleStudent(s.studentNo)}>
                   <div className="flex items-center gap-4">
                       <div className={`w-8 h-8 rounded-lg flex items-center justify-center border-2 ${selectedStudents.has(s.studentNo) ? 'bg-blue-500 border-blue-500 text-white' : 'border-slate-300'}`}>
                          {selectedStudents.has(s.studentNo) && <i className="fa-solid fa-check text-sm"></i>}
                       </div>
                       <div><h4 className="font-bold text-slate-800 text-lg">{s.studentNo}. {s.studentName}</h4><p className="text-sm font-bold text-slate-400 mt-0.5">ชั้น {getVal(s,"classLevel")}</p></div>
                   </div>
                </div>
                
                {selectedStudents.has(s.studentNo) && (
                  <div className="mt-5 pt-5 border-t border-blue-100 flex flex-col md:flex-row gap-6 slide-up">
                    <div className="flex-1 bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                       <p className="text-sm font-bold text-slate-700 mb-2"><i className="fa-solid fa-image text-blue-500 mr-2"></i> รูปที่ 1: สภาพบ้านนักเรียน (หลังคา/ฝาผนัง)</p>
                       <input type="file" accept="image/*" className="text-sm w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" onChange={e => handleImage(s.studentNo, 1, e.target.files[0])} />
                       {images[`${s.studentNo}_1`] && <img src={images[`${s.studentNo}_1`]} className="mt-3 h-32 w-full object-cover rounded-lg border border-slate-200" />}
                    </div>
                    <div className="flex-1 bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                       <p className="text-sm font-bold text-slate-700 mb-2"><i className="fa-solid fa-image text-emerald-500 mr-2"></i> รูปที่ 2: ภายในบ้านนักเรียน</p>
                       <input type="file" accept="image/*" className="text-sm w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer" onChange={e => handleImage(s.studentNo, 2, e.target.files[0])} />
                       {images[`${s.studentNo}_2`] && <img src={images[`${s.studentNo}_2`]} className="mt-3 h-32 w-full object-cover rounded-lg border border-slate-200" />}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {visitedList.length > 0 && (
              <button onClick={doPrint} className="w-full py-5 bg-slate-900 text-white font-bold rounded-full text-lg hover:bg-rose-500 shadow-xl btn-press flex justify-center items-center gap-3 sticky bottom-5 z-50">
                  <i className="fa-solid fa-print text-xl"></i> สั่งพิมพ์ / เซฟ PDF นร.01 (เปิดแท็บใหม่)
              </button>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ErrorBoundary><DashboardApp /></ErrorBoundary>);
  </script>
</body>
</html>
