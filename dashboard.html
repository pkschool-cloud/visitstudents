<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบคัดกรองนักเรียนยากจน (นร.01)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; color: #334155; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    
    .soft-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(241, 245, 249, 1); box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05); border-radius: 2rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .soft-card:hover { transform: translateY(-2px); box-shadow: 0 15px 40px -10px rgba(0, 0, 0, 0.08); }
    
    .input-wrapper { position: relative; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 1.25rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .input-wrapper:focus-within { background: #ffffff; border-color: #60a5fa; box-shadow: 0 10px 25px -5px rgba(96, 165, 250, 0.2), 0 0 0 4px rgba(96, 165, 250, 0.1); transform: translateY(-2px); }
    .premium-input { width: 100%; background: transparent; border: none; padding: 1.2rem 1.5rem; font-family: 'Prompt', sans-serif; font-weight: 500; color: #1e293b; outline: none; }
    
    .btn-press { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 9999px; cursor: pointer; }
    .btn-press:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -6px rgba(0,0,0,0.15); }
    .btn-press:active { transform: scale(0.96); box-shadow: 0 2px 5px -2px rgba(0,0,0,0.1); }
    
    .hide-scroll::-webkit-scrollbar { display: none; }

    /* 🌟 ระบบ Print ด้วย Browser Native 🌟 */
    @media print {
      @page { size: A4 portrait; margin: 20mm 15mm; } 
      body { background-color: #ffffff !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .screen-only { display: none !important; }
      .print-only { display: block !important; }
      .break-after-page { page-break-after: always; }
      .avoid-break { page-break-inside: avoid; }
    }
    @media screen {
      .print-only { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwu0Dw9TUcLFhNyQ0wSI_8efgKyeaJrJBXdDV2_WuCUkWY10SZkTI4XtwYdTgR0YHjE/exec";
    
    const SCHOOL_LAT = 18.862105; const SCHOOL_LON = 99.0872654;
    const VISIT_STAT = ["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"];
    const RESULT_OPTS = ["ปกติ","ต้องเฝ้าระวัง","ต้องช่วยเหลือเร่งด่วน","ส่งต่อ"];

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="flex h-screen items-center justify-center bg-slate-50 p-6 text-center">
              <div className="bg-white p-10 rounded-[2rem] shadow-xl max-w-md w-full border border-rose-100">
                <i className="fa-solid fa-triangle-exclamation text-6xl text-rose-500 mb-6"></i>
                <h1 className="text-2xl font-black text-slate-800 mb-2">ระบบขัดข้องชั่วคราว</h1>
                <p className="text-slate-500 mb-8 text-sm">ข้อมูลปลอดภัย กรุณากดโหลดหน้าเว็บใหม่อีกครั้ง</p>
                <button className="w-full bg-slate-900 text-white font-bold py-4 rounded-full btn-press" onClick={() => window.location.reload()}>โหลดหน้าเว็บใหม่</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const api = {
      async get(action, params = {}) {
        const q = new URLSearchParams({ action, t: Date.now(), ...params }).toString();
        try { const r = await fetch(`${SCRIPT_URL}?${q}`, { cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
      },
      async post(body) {
        try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" }, cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
      }
    };

    const getVal = (obj, key) => {
      if (!obj || typeof obj !== 'object') return "";
      const k = Object.keys(obj).find(x => String(x).toLowerCase().trim() === String(key).toLowerCase().trim());
      return k && obj[k] !== undefined && obj[k] !== null ? String(obj[k]).trim() : "";
    };

    const compareId = (id1, id2) => String(id1 || "").replace(/^0+/, '').trim() === String(id2 || "").replace(/^0+/, '').trim();

    const getVisitStatus = (visits, studentNo) => {
      if (!visits || !studentNo || !Array.isArray(visits)) return "ยังไม่เยี่ยม";
      const v = [...visits].reverse().find(v => compareId(getVal(v, 'studentNo'), studentNo));
      return v ? (getVal(v, 'visitStatus') || "ยังไม่เยี่ยม") : "ยังไม่เยี่ยม";
    };

    const checkIsAdmin = (lvl) => {
      const c = String(lvl || "").toLowerCase().trim();
      return c === "แอดมิน" || c === "admin" || c === "ทั้งหมด" || c === "ผู้บริหาร";
    };

    const safeDateForDisplay = (dateVal) => {
      if (!dateVal || String(dateVal).trim() === "") return "-";
      try {
        const d = new Date(dateVal);
        if (isNaN(d.getTime())) return String(dateVal); 
        return d.toLocaleDateString('th-TH', {year:'numeric', month:'short', day:'numeric'});
      } catch(e) { return "-"; }
    };

    const safeDateForInput = (dateStr) => {
      if (!dateStr || String(dateStr).trim() === "") return new Date().toISOString().split("T")[0];
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return new Date().toISOString().split("T")[0];
        return d.toISOString().split("T")[0];
      } catch(e) { return new Date().toISOString().split("T")[0]; }
    };

    const PremiumInput = ({ label, value, onChange, type="text", placeholder="", icon, disabled=false }) => (
      <div className="mb-6 pop-in">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">{label}</label>
        <div className={`input-wrapper flex items-center overflow-hidden ${disabled ? 'opacity-60 bg-slate-100' : ''}`}>
          {icon && <div className="pl-5 text-slate-400"><i className={`fa-solid ${icon} text-lg`}></i></div>}
          <input type={type} value={value || ""} onChange={onChange} disabled={disabled} placeholder={placeholder} className={`premium-input ${icon ? 'pl-4' : ''}`} />
        </div>
      </div>
    );

    const PremiumSelect = ({ label, value, onChange, options, icon, disabled=false }) => (
      <div className="mb-6 pop-in">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">{label}</label>
        <div className={`input-wrapper flex items-center overflow-hidden relative ${disabled ? 'opacity-60 bg-slate-100' : ''}`}>
          {icon && <div className="pl-5 text-slate-400"><i className={`fa-solid ${icon} text-lg`}></i></div>}
          <select value={value || ""} onChange={onChange} disabled={disabled} className={`premium-input appearance-none cursor-pointer ${icon ? 'pl-4' : ''} bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[position:right_1.5rem_center] bg-[length:0.8rem_auto]`}>
            <option value="">- กรุณาเลือก -</option>
            {options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        </div>
      </div>
    );

    const PremiumTextarea = ({ label, value, onChange, rows=3, placeholder="" }) => (
      <div className="mb-6 pop-in">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">{label}</label>
        <div className="input-wrapper">
          <textarea rows={rows} value={value || ""} onChange={onChange} placeholder={placeholder} className="premium-input resize-none rounded-[1.25rem]"></textarea>
        </div>
      </div>
    );

    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
      return (
        <div className={`fixed top-6 right-6 z-[999999] px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 slide-up ${type === 'success' ? 'bg-emerald-500 text-white shadow-emerald-500/40' : type === 'warning' ? 'bg-amber-500 text-white shadow-amber-500/40' : 'bg-rose-500 text-white shadow-rose-500/40'}`}>
          <i className={`fa-solid ${type === 'success' ? 'fa-check' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-xmark'} text-xl`}></i><span className="font-bold tracking-wide">{msg}</span>
        </div>
      );
    };

    const CheckboxGroup = ({ label, options, selectedStr, onChange }) => {
      const selectedArr = selectedStr ? selectedStr.split(', ') : [];
      const handleToggle = (opt) => {
        let newArr = [...selectedArr];
        if (newArr.includes(opt)) newArr = newArr.filter(x => x !== opt);
        else newArr.push(opt);
        onChange(newArr.join(', '));
      };
      return (
        <div className="mb-6 pop-in col-span-full">
          <label className="block text-sm font-bold text-slate-500 mb-3 pl-4">{label} (เลือกได้มากกว่า 1)</label>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3 pl-4">
            {options.map(o => (
              <label key={o} className="flex items-center space-x-3 cursor-pointer group">
                <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${selectedArr.includes(o) ? 'bg-blue-500 border-blue-500' : 'bg-white border-slate-300 group-hover:border-blue-400'}`}>
                  {selectedArr.includes(o) && <i className="fa-solid fa-check text-white text-xs"></i>}
                </div>
                <span className="text-slate-700 font-medium">{o}</span>
              </label>
            ))}
          </div>
        </div>
      );
    };

    const GpsPopup = ({ status, distance }) => {
      if (!status) return null;
      return ReactDOM.createPortal(
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[99999] flex items-center justify-center fade-in" style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0 }}>
          <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl flex flex-col items-center bounce-in w-[340px]">
            {status === "loading" && (
              <>
                <div className="relative flex justify-center items-center w-24 h-24 bg-blue-50 rounded-full mb-6">
                  <div className="absolute inset-0 border-[4px] border-blue-300 rounded-full animate-[ping_1.5s_cubic-bezier(0,0,0.2,1)_infinite] opacity-70"></div>
                  <i className="fa-solid fa-location-crosshairs text-4xl text-blue-500"></i>
                </div>
                <h3 className="font-black text-slate-800 text-2xl mb-1">คำนวณพิกัด</h3>
                <p className="font-medium text-slate-500 text-center">ค้นหาระยะทางจากสถานศึกษา...</p>
              </>
            )}
            {status === "success" && (
              <>
                <div className="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mb-6"><i className="fa-solid fa-check text-5xl text-emerald-500 bounce-in"></i></div>
                <h3 className="font-black text-slate-800 text-2xl mb-1">สำเร็จ!</h3>
                <p className="font-medium text-slate-500 text-center">ระยะห่างจากสถานศึกษา <span className="font-black text-emerald-600 text-xl">{distance} กม.</span></p>
              </>
            )}
            {status === "error" && (
              <>
                <div className="w-24 h-24 bg-rose-50 rounded-full flex items-center justify-center mb-6"><i className="fa-solid fa-xmark text-5xl text-rose-500 bounce-in"></i></div>
                <h3 className="font-black text-slate-800 text-2xl mb-1">ข้อผิดพลาด</h3>
                <p className="font-medium text-slate-500 text-center">เบราว์เซอร์ไม่รองรับ หรือไม่ได้เปิดการเข้าถึงตำแหน่ง</p>
              </>
            )}
          </div>
        </div>,
        document.body
      );
    };

    const WelcomeModal = ({ onClose }) => {
      return ReactDOM.createPortal(
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[99999] flex items-center justify-center p-4 fade-in" style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0 }}>
          <div className="bg-white rounded-[2rem] p-8 md:p-10 w-full max-w-lg shadow-2xl bounce-in text-center relative border-4 border-blue-50">
            <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner">
              <i className="fa-solid fa-hand-sparkles"></i>
            </div>
            <h2 className="text-2xl font-black text-slate-800 mb-2">ยินดีต้อนรับเข้าสู่ระบบ!</h2>
            <p className="text-slate-500 mb-8 font-medium leading-relaxed">
              หากบุคลากรเพิ่งเข้าใช้งานระบบนี้เป็นครั้งแรก<br/>
              <span className="text-blue-600 font-bold">"โปรดอ่านคู่มือการใช้งานที่เมนูด้านซ้ายก่อน"</span><br/>
              เพื่อให้เข้าใจวิธีการทำงานและการพิมพ์รายงานอย่างถูกต้องครับ
            </p>
            <button onClick={onClose} className="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 rounded-full btn-press shadow-xl transition-colors text-lg">รับทราบ เริ่มใช้งาน</button>
          </div>
        </div>,
        document.body
      );
    };

    // ============= การจัดรูปแบบแถวตารางในหน้าพิมพ์ =============
    const PrintSectionHeader = ({ title }) => (
      <tr className="bg-[#f1f5f9] border-y border-[#cbd5e1]">
        <td colSpan="2" className="py-2 px-4 font-bold text-[#0f172a] text-[13px]">{title}</td>
      </tr>
    );

    const PrintDataRow = ({ label, value, highlight }) => (
      <tr className="border-b border-[#e2e8f0]">
        <td className="py-2 px-4 font-bold text-[#475569] bg-[#fafbfc] border-r border-[#e2e8f0] w-[40%] text-[13px] align-top">{label}</td>
        <td className={`py-2 px-4 text-[13px] align-top ${highlight ? 'font-bold text-[#1e40af]' : 'text-[#0f172a]'}`}>{value || '-'}</td>
      </tr>
    );

    // ============= Main Dashboard App =============
    function DashboardApp() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState("dashboard"); 
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [toast, setToast] = useState(null);
      const [showWelcome, setShowWelcome] = useState(false);
      
      const [globalStudents, setGlobalStudents] = useState([]);
      const [globalVisits, setGlobalVisits] = useState([]);
      
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth >= 768);

      const [adminClassFilter, setAdminClassFilter] = useState("ทั้งหมด");
      const [sidebarSearch, setSidebarSearch] = useState("");

      const [printStudents, setPrintStudents] = useState(null);
      const [printImages, setPrintImages] = useState({});
      
      const showToast = useCallback((msg, type = "success") => setToast({ msg, type }), []);

      useEffect(() => {
        const u = localStorage.getItem("hv_user_nr01_final");
        if (u) { 
          const parsed = JSON.parse(u);
          setUser(parsed); 
          loadAllData(parsed); 
        }
      }, []);

      useEffect(() => {
        if (printStudents && printStudents.length > 0) {
          const timer = setTimeout(() => {
            window.print();
            setPrintStudents(null); 
            setPrintImages({});
          }, 800);
          return () => clearTimeout(timer);
        }
      }, [printStudents]);

      const loadAllData = async (u) => {
        setIsDataLoaded(false);
        const [sRes, vRes] = await Promise.all([
          api.get("getStudents", { classLevel: u.classLevel }),
          api.get("getVisitsFull", { classLevel: u.classLevel })
        ]);
        if (sRes.success && Array.isArray(sRes.data)) setGlobalStudents(sRes.data);
        if (vRes.success && Array.isArray(vRes.data)) setGlobalVisits(vRes.data);
        setIsDataLoaded(true);
      };

      const handleLogin = async (code, stopLoading) => {
        const res = await api.post({ action: "getTeacherByCode", code });
        if (res.success && res.data) {
          localStorage.setItem("hv_user_nr01_final", JSON.stringify(res.data));
          setUser(res.data); 
          loadAllData(res.data);
          setShowWelcome(true);
        } else {
          showToast("คุณครูน่าจะกรอกรหัสผิดนะครับ ไม่พบรหัสในฐานข้อมูล รบกวนกรอกรหัสอีกครั้งนะครับ", "error");
          if(stopLoading) stopLoading();
        }
      };

      const saveVisit = async (formData) => {
        setIsSaving(true);
        const data = { ...formData, teacherCode: user.code, teacherName: user.fullName, classLevel: formData.classLevel || user.classLevel };
        
        const res = await api.post({ action: "saveVisit", data });
        if (res.success) {
          showToast("บันทึกข้อมูลเรียบร้อย!", "success");
          
          setGlobalVisits(prev => {
            const arr = Array.isArray(prev) ? [...prev] : [];
            const idx = arr.findIndex(v => compareId(getVal(v, "studentNo"), data.studentNo) && getVal(v,"classLevel") === data.classLevel);
            const newData = {...data, timestamp: new Date().toISOString()};
            if(idx > -1) arr[idx] = newData; else arr.push(newData);
            return arr;
          });

          api.get("getVisitsFull", { classLevel: user.classLevel }).then(r => { if(r.success) setGlobalVisits(r.data); });
          setView("profile"); 
        } else {
          showToast(res.message || "เกิดข้อผิดพลาดในการบันทึก", "error");
        }
        setIsSaving(false);
      };

      const deleteVisitRecord = async (studentNo, classLevel) => {
        if(!confirm(`⚠️ คำเตือน!\n\nท่านกำลังดำเนินการลบข้อมูลการเยี่ยมบ้านของนักเรียนเลขที่ ${studentNo}\nเมื่อลบแล้ว สถานะจะกลับเป็น "ยังไม่เยี่ยม" ทันที\n\nยืนยันการดำเนินการลบข้อมูลหรือไม่?`)) return;
        
        setIsSaving(true);
        const res = await api.post({ action: "deleteVisitRecord", studentNo, classLevel });
        if(res.success) {
          showToast("ดำเนินการล้างข้อมูลเรียบร้อย", "success");
          setGlobalVisits(prev => prev.filter(v => !(compareId(getVal(v, "studentNo"), studentNo) && getVal(v, "classLevel") === classLevel)));
          setView("students");
          setSelectedStudent(null);
        } else {
          showToast(res.message || "ระบบไม่สามารถดำเนินการลบข้อมูลได้", "error");
        }
        setIsSaving(false);
      };

      if (!user) return <Login onLogin={handleLogin} />;

      const isAdmin = checkIsAdmin(user.classLevel);
      const uniqueClasses = [...new Set(globalStudents.map(s => getVal(s, 'classLevel', 'classlevel')))].filter(Boolean).sort();
      
      const displayedStudents = isAdmin && adminClassFilter !== "ทั้งหมด" 
          ? globalStudents.filter(s => getVal(s, 'classLevel', 'classlevel') === adminClassFilter)

        emerald: "bg-emerald-500 text-white shadow-lg shadow-emerald-500/30",
        slate: "bg-slate-700 text-white shadow-lg shadow-slate-500/30",
        rose: "bg-rose-500 text-white shadow-lg shadow-rose-500/30"

      return (
        <button onClick={onClick} className={`w-full flex items-center btn-press font-bold transition-all cursor-pointer ${active ? colors[color] : 'text-slate-500 hover:bg-white hover:shadow-sm hover:text-slate-800'} ${open ? 'px-6 py-4 rounded-[1.25rem]' : 'justify-center py-4 rounded-[1.25rem]'}`}>

      );

      const [code, setCode] = useState("");
      const [loading, setLoading] = useState(false);
      
      const submitLogin = () => {
        if(code) {
          setLoading(true);
          onLogin(code, () => setLoading(false)); 
        }
      };

      return (
        <div className="h-screen flex items-center justify-center bg-[#f4f7fb] p-4 relative overflow-hidden">
          <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-400/20 blur-[100px] rounded-full"></div>

             </div>
             
             <button onClick={submitLogin} disabled={!code || loading} className="w-full bg-slate-900 text-white font-bold py-5 rounded-full btn-press shadow-xl hover:bg-blue-600 hover:shadow-blue-500/30 transition-all text-lg flex items-center justify-center gap-3 disabled:opacity-50 cursor-pointer">
               {loading ? <><i className="fa-solid fa-circle-notch fa-spin"></i> กำลังตรวจสอบข้อมูล...</> : <><i className="fa-solid fa-arrow-right-to-bracket"></i> เริ่มใช้งาน</>}
             </button>

    // 🌟 หน้าฟอร์มกรอก นร.01 เต็มรูปแบบ 🌟
    function VisitForm({ student, visits, onBack, onSave }) {
      const exist = visits.slice().reverse().find(v => compareId(getVal(v,"studentNo"), student.studentNo) && getVal(v,"classLevel") === getVal(student,"classLevel")) || {};
      
      const [form, setForm] = useState({
        studentNo: student.studentNo, studentName: student.studentName, classLevel: getVal(student, "classLevel"),
        visitStatus: getVal(exist,"visitStatus")||"เยี่ยมแล้ว", 
        idCard: getVal(exist,"idCard"), familyStatus: getVal(exist,"familyStatus"), livingWith: getVal(exist,"livingWith"),
        parentName: getVal(exist,"parentName"), parentRel: getVal(exist,"parentRel"), parentPhone: getVal(exist,"parentPhone"),
        parentIdCard: getVal(exist,"parentIdCard"), parentEdu: getVal(exist,"parentEdu"), parentJob: getVal(exist,"parentJob"), welfare: getVal(exist,"welfare"),
        familyCount: getVal(exist,"familyCount"), familyIncome: getVal(exist,"familyIncome"),
        dependency: getVal(exist,"dependency"), housingType: getVal(exist,"housingType"), houseRent: getVal(exist,"houseRent"),
        floorMat: getVal(exist,"floorMat"), wallMat: getVal(exist,"wallMat"), roofMat: getVal(exist,"roofMat"), toilet: getVal(exist,"toilet"),
        agriculture: getVal(exist,"agriculture"), drinkingWater: getVal(exist,"drinkingWater"), electricity: getVal(exist,"electricity"),
        vehicles: getVal(exist,"vehicles"), appliances: getVal(exist,"appliances"),
        travelMethod: getVal(exist,"travelMethod"), distanceKm: getVal(exist,"distanceKm"), distanceM: getVal(exist,"distanceM"),
        travelHours: getVal(exist,"travelHours"), travelMins: getVal(exist,"travelMins"), travelCost: getVal(exist,"travelCost"),
        dailyAllowance: getVal(exist,"dailyAllowance"), address: getVal(exist,"address"), visitResult: getVal(exist,"visitResult"), teacherNotes: getVal(exist,"teacherNotes"), observations: getVal(exist,"observations")
      });
      
      const [step, setStep] = useState(0);
      const [gpsStatus, setGpsStatus] = useState(null);
      const [gpsDist, setGpsDist] = useState("");
      
      const STEPS = ["ข้อมูลนักเรียน", "ครอบครัว & รายได้", "สภาพที่อยู่อาศัย", "การเดินทาง", "สรุปผล"];
      const update = (k, v) => setForm(p => ({...p, [k]:v}));

      const getGPS = () => {
        setGpsStatus("loading");
        if("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(pos => {
            const R=6371; const dLat=(SCHOOL_LAT-pos.coords.latitude)*Math.PI/180; const dLon=(SCHOOL_LON-pos.coords.longitude)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(pos.coords.latitude*Math.PI/180)*Math.cos(SCHOOL_LAT*Math.PI/180)*Math.sin(dLon/2)**2;
            const dist = (R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2);
            update("distanceKm", dist); setGpsDist(dist); setGpsStatus("success");
            setTimeout(() => setGpsStatus(null), 2500);
          }, () => { setGpsStatus("error"); setTimeout(() => setGpsStatus(null), 2500); }, {enableHighAccuracy:true, timeout:10000});
        } else { setGpsStatus("error"); setTimeout(() => setGpsStatus(null), 2500); }
      };

      return (
        <div className="slide-up max-w-4xl mx-auto">
          <GpsPopup status={gpsStatus} distance={gpsDist} />

          <div className="flex items-center gap-6 mb-8">
            <button onClick={onBack} className="w-14 h-14 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-500 btn-press shadow-sm hover:border-blue-400 hover:text-blue-600 transition-colors cursor-pointer"><i className="fa-solid fa-arrow-left text-xl"></i></button>
            <div><h2 className="text-3xl font-black text-slate-800 tracking-tight">{student.studentName}</h2><p className="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full inline-block mt-2 shadow-sm">เลขที่ {student.studentNo} • ชั้น {getVal(student, "classLevel")}</p></div>
          </div>

          <div className="bg-white p-3 rounded-full mb-8 shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-slate-100 flex justify-between relative mx-2 overflow-x-auto hide-scroll">
            <div className="absolute top-1/2 left-[10%] right-[10%] h-2 bg-slate-100 -translate-y-1/2 -z-10 rounded-full min-w-[500px]"><div className="h-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-700 ease-out rounded-full shadow-sm" style={{ width: `${(step/(STEPS.length-1))*100}%` }}></div></div>
            <div className="flex w-full min-w-[500px]">
              {STEPS.map((s, i) => (
                <div key={i} onClick={() => setStep(i)} className="flex flex-col items-center cursor-pointer group btn-press w-1/5">
                  <div className={`w-12 h-12 rounded-full flex items-center justify-center text-sm font-black mb-2 transition-all border-[4px] ${step === i ? "bg-white border-blue-600 text-blue-600 scale-110 shadow-lg" : step > i ? "bg-blue-500 border-blue-500 text-white" : "bg-slate-50 border-slate-50 text-slate-400 group-hover:bg-slate-100 group-hover:border-slate-100"}`}>
                    {step > i ? <i className="fa-solid fa-check text-lg"></i> : i+1}
                  </div>
                  <span className={`text-[10px] sm:text-sm font-bold text-center ${step===i ? "text-blue-600" : "text-slate-400"}`}>{s}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="soft-card p-8 md:p-12 mb-6 min-h-[500px]">
            {step === 0 && <div className="space-y-2 fade-in">
              <h3 className="text-xl font-bold text-blue-700 mb-6 border-b pb-2">1. ข้อมูลนักเรียน และผู้ปกครอง</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                 <PremiumInput label="เลขประจำตัวประชาชนนักเรียน" value={form.idCard} onChange={e=>update("idCard", e.target.value)} icon="fa-id-card" />
                 <PremiumSelect label="สถานภาพครอบครัว" icon="fa-people-roof" value={form.familyStatus} onChange={e=>update("familyStatus", e.target.value)} options={["พ่อแม่อยู่ด้วยกัน","พ่อแม่แยกกันอยู่","พ่อแม่หย่าร้าง","พ่อเสียชีวิต","แม่เสียชีวิต","เสียชีวิตทั้งคู่","พ่อแม่ทอดทิ้ง"]} />
                 <PremiumSelect label="นักเรียนอาศัยอยู่กับ" icon="fa-child" value={form.livingWith} onChange={e=>update("livingWith", e.target.value)} options={["พ่อ/แม่","ญาติ","อยู่ลำพัง","ผู้อุปการะ/นายจ้าง","ครัวเรือนสถาบัน"]} />
                 <PremiumInput label="ชื่อ-นามสกุล ผู้ปกครอง" value={form.parentName} onChange={e=>update("parentName", e.target.value)} icon="fa-user" />
                 <PremiumInput label="ความสัมพันธ์กับนักเรียน" value={form.parentRel} onChange={e=>update("parentRel", e.target.value)} icon="fa-link" />
                 <PremiumInput label="เบอร์โทรติดต่อ" value={form.parentPhone} onChange={e=>update("parentPhone", e.target.value)} icon="fa-phone" />
                 <PremiumInput label="เลข ปชช. ผู้ปกครอง" value={form.parentIdCard} onChange={e=>update("parentIdCard", e.target.value)} icon="fa-id-card-clip" placeholder="หากไม่มีให้พิมพ์ 'ไม่มี'" />
                 <PremiumInput label="การศึกษาสูงสุด ผปค." value={form.parentEdu} onChange={e=>update("parentEdu", e.target.value)} icon="fa-graduation-cap" />
                 <PremiumInput label="อาชีพ ผปค." value={form.parentJob} onChange={e=>update("parentJob", e.target.value)} icon="fa-briefcase" />
                 <PremiumSelect label="สวัสดิการแห่งรัฐ (บัตรคนจน)" icon="fa-credit-card" value={form.welfare} onChange={e=>update("welfare", e.target.value)} options={["มี","ไม่มี"]} />
              </div>
            </div>}

            {step === 1 && <div className="space-y-2 fade-in">
              <h3 className="text-xl font-bold text-blue-700 mb-6 border-b pb-2">2. สมาชิกในครัวเรือน และรายได้</h3>
              <div className="bg-blue-50 p-4 rounded-xl mb-6 text-sm text-blue-800">
                <i className="fa-solid fa-info-circle mr-2"></i> ระบบออกแบบให้สรุปจำนวนสมาชิกและรายได้รวม เพื่อความรวดเร็วในการจัดเก็บข้อมูลของครูครับ
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                 <PremiumInput label="จำนวนสมาชิกในบ้านรวมทั้งหมด (คน)" type="number" icon="fa-users" value={form.familyCount} onChange={e=>update("familyCount", e.target.value)} />
                 <PremiumInput label="รายได้ครอบครัวรวมเฉลี่ย (บาท/เดือน)" type="number" icon="fa-sack-dollar" value={form.familyIncome} onChange={e=>update("familyIncome", e.target.value)} />
              </div>
            </div>}

            {step === 2 && <div className="space-y-2 fade-in">

              <CheckboxGroup label="3.1 ภาระพึ่งพิงในครอบครัว" selectedStr={form.dependency} onChange={v=>update("dependency", v)} options={["ไม่มีภาระพึ่งพิง","มีคนพิการ","มีผู้สูงอายุ 60 ปีขึ้นไป","ว่างงาน (15-65ปี)","พ่อ/แม่เลี้ยงเดี่ยว","มีโรคเรื้อรัง"]} />
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 mt-6">
                <PremiumSelect label="3.2 การอยู่อาศัย" icon="fa-house-user" value={form.housingType} onChange={e=>update("housingType", e.target.value)} options={["อยู่บ้านตนเอง","อยู่บ้านเช่า","อยู่กับผู้อื่น/อยู่ฟรี","หอพัก"]} />
                <PremiumInput label="ค่าเช่า (บาท/เดือน)" type="number" icon="fa-coins" value={form.houseRent} onChange={e=>update("houseRent", e.target.value)} placeholder="ถ้าไม่ได้เช่า ให้ปล่อยว่าง" />
                <PremiumSelect label="วัสดุทำพื้น" icon="fa-layer-group" value={form.floorMat} onChange={e=>update("floorMat", e.target.value)} options={["กระเบื้อง/เซรามิค","ปาเก้/ไม้ขัดเงา","ซีเมนต์เปลือย","ไวนิล/กระเบื้องยาง","ไม้กระดาน","ดิน/ทราย","อื่นๆ"]} />
                <PremiumSelect label="วัสดุทำฝาบ้าน" icon="fa-border-all" value={form.wallMat} onChange={e=>update("wallMat", e.target.value)} options={["ฉาบซีเมนต์","อิฐ/ก้อนปูน","สังกะสี","ไม้กระดาน","ไม้อัด","สมาร์ทบอร์ด","ไม้ไผ่/เศษไม้","ดิน","ไวนิล","อื่นๆ"]} />
                <PremiumSelect label="วัสดุทำหลังคา" icon="fa-house" value={form.roofMat} onChange={e=>update("roofMat", e.target.value)} options={["โลหะ (สังกะสี/เมทัลชีท)","กระเบื้อง/เซรามิค","ใบไม้/วัสดุธรรมชาติ","ไวนิล/แผ่นพลาสติก","อื่นๆ"]} />
                <PremiumSelect label="มีห้องส้วม" icon="fa-restroom" value={form.toilet} onChange={e=>update("toilet", e.target.value)} options={["มี","ไม่มี"]} />
                <PremiumSelect label="ที่ดินทำการเกษตร" icon="fa-tractor" value={form.agriculture} onChange={e=>update("agriculture", e.target.value)} options={["ไม่ทำเกษตร","น้อยกว่า 1 ไร่","1 ถึง 5 ไร่","มากกว่า 5 ไร่"]} />
                <PremiumSelect label="แหล่งน้ำดื่ม" icon="fa-glass-water" value={form.drinkingWater} onChange={e=>update("drinkingWater", e.target.value)} options={["น้ำบรรจุขวด/ตู้หยอดน้ำ","น้ำประปา","น้ำบ่อ/บาดาล","น้ำฝน/ภูเขา"]} />
                <PremiumSelect label="แหล่งไฟฟ้า" icon="fa-lightbulb" value={form.electricity} onChange={e=>update("electricity", e.target.value)} options={["มีไฟบ้าน/มิเตอร์","ไฟต่อพ่วง","เครื่องปั่นไฟ/โซล่าเซลล์","ไม่มีไฟฟ้า"]} />

              <CheckboxGroup label="ของใช้ในครัวเรือน (ใช้งานได้)" selectedStr={form.appliances} onChange={v=>update("appliances", v)} options={["ไม่มี","คอมพิวเตอร์","แอร์","ทีวีจอแบน","เครื่องซักผ้า","ตู้เย็น"]} />
            </div>}

            {step === 3 && <div className="space-y-2 fade-in">
              <h3 className="text-xl font-bold text-blue-700 mb-6 border-b pb-2">4. การเดินทางและที่อยู่</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                <PremiumSelect label="วิธีเดินทางหลัก" icon="fa-person-walking" value={form.travelMethod} onChange={e=>update("travelMethod", e.target.value)} options={["เดิน","จักรยาน","รถโรงเรียน","จักรยานยนต์ส่วนตัว","รถส่วนตัว","เรือส่วนตัว","มอเตอร์ไซค์รับจ้าง","รถโดยสารประจำทาง","เรือรับจ้าง"]} />
                <div className="relative mb-5 pop-in">

                <div className="flex gap-3">
                   <div className="flex-1"><PremiumInput label="ใช้เวลา (ชั่วโมง)" type="number" icon="fa-hourglass" value={form.travelHours} onChange={e=>update("travelHours", e.target.value)} /></div>
                   <div className="flex-1"><PremiumInput label="ใช้เวลา (นาที)" type="number" icon="fa-clock" value={form.travelMins} onChange={e=>update("travelMins", e.target.value)} /></div>
                </div>
                <PremiumInput label="ค่าเดินทาง (บาท/เดือน)" type="number" icon="fa-bus" value={form.travelCost} onChange={e=>update("travelCost", e.target.value)} />
                <PremiumInput label="ได้เงินมาโรงเรียน (บาท/วัน)" type="number" icon="fa-wallet" value={form.dailyAllowance} onChange={e=>update("dailyAllowance", e.target.value)} />
                <div className="col-span-full"><PremiumTextarea label="ที่อยู่ปัจจุบัน (บ้านเลขที่ หมู่ ซอย ถนน ตำบล อำเภอ รหัสไปรษณีย์)" value={form.address} onChange={e=>update("address", e.target.value)} /></div>
              </div>
            </div>}

            {step === 4 && <div className="space-y-2 fade-in">
              <h3 className="text-xl font-bold text-blue-700 mb-6 border-b pb-2">5. สรุปผลจากครูประจำชั้น</h3>
              <div className="grid grid-cols-1 gap-x-6">
                 <PremiumSelect label="สรุปความเห็นของครู" icon="fa-clipboard-user" value={form.visitResult} onChange={e=>update("visitResult", e.target.value)} options={RESULT_OPTS} />
                 <PremiumTextarea label="บันทึกเพิ่มเติมจากครู" value={form.teacherNotes} onChange={e=>update("teacherNotes", e.target.value)} rows={3} />
                 <PremiumTextarea label="การสังเกตเบื้องต้น" value={form.observations} onChange={e=>update("observations", e.target.value)} rows={3} />
              </div>
            </div>}

            <div className="flex justify-between mt-12 pt-8 border-t border-slate-100">
              <button onClick={() => setStep(step-1)} disabled={step===0} className="px-8 py-4 rounded-full font-bold text-slate-500 bg-slate-50 hover:bg-slate-100 disabled:opacity-0 btn-press transition-all cursor-pointer"><i className="fa-solid fa-arrow-left mr-3"></i>ย้อนกลับ</button>
              {step < STEPS.length-1 ? (
                <button onClick={() => setStep(step+1)} className="px-12 py-4 rounded-full font-black text-white bg-slate-900 hover:bg-blue-600 shadow-xl shadow-slate-300 btn-press transition-all text-lg cursor-pointer">ถัดไป <i className="fa-solid fa-arrow-right ml-3"></i></button>
              ) : (
                <button onClick={() => onSave(form)} className="px-12 py-4 rounded-full font-black text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 shadow-xl shadow-blue-500/40 btn-press transition-all text-lg cursor-pointer"><i className="fa-solid fa-cloud-arrow-up mr-3"></i> บันทึกข้อมูล นร.01</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // 🌟 ระบบ PDF + แนบรูปภาพก่อนพิมพ์ (Local Image Injection) 🌟
    function ReportExport({ user, students, visits, showToast, isLoaded, onPrint }) {
      const [selectedStudents, setSelectedStudents] = useState(new Set());
      const [images, setImages] = useState({});

      const toggleStudent = (no) => {
        const newSet = new Set(selectedStudents);
        if (newSet.has(no)) newSet.delete(no); else newSet.add(no);
        setSelectedStudents(newSet);
      };

      const selectAll = () => {
        const allVisisted = students.filter(s => getVisitStatus(visits, s.studentNo) === "เยี่ยมแล้ว").map(s => s.studentNo);
        setSelectedStudents(new Set(allVisisted));
      };

      const handleImage = (studentNo, num, file) => {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => setImages(p => ({...p, [`${studentNo}_${num}`]: e.target.result}));
        reader.readAsDataURL(file);
      };

      const exportExcel = () => {
        // ... (โค้ด Export Excel เดิม)
        showToast("ส่งออก Excel สำเร็จ", "success");
      };

      const handlePrint = () => {
        if (selectedStudents.size === 0) { showToast("กรุณาเลือกนักเรียนก่อนพิมพ์", "warning"); return; }
        const targetStudents = students.filter(s => selectedStudents.has(s.studentNo));
        onPrint(targetStudents, images); // ส่งรายชื่อและรูปภาพ ไปให้ Dashboard จัดการพิมพ์
        setSelectedStudents(new Set());
      };

      if(!isLoaded) return <div className="text-center mt-32"><div className="w-16 h-16 border-4 border-slate-200 border-t-rose-500 rounded-full animate-spin mx-auto"></div></div>;

      const visitedList = students.filter(s => getVisitStatus(visits, s.studentNo) === "เยี่ยมแล้ว");

      return (
        <div className="slide-up">
           <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
             <div><h2 className="text-3xl font-black text-slate-800 tracking-tight">ส่งออกรายงาน นร.01</h2></div>
             <button onClick={exportExcel} className="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-4 rounded-full font-bold shadow-lg shadow-emerald-500/30 btn-press flex items-center cursor-pointer">
               <i className="fa-solid fa-file-excel mr-3 text-xl"></i> ส่งออก Excel ภาพรวม
             </button>
           </div>

           <div className="border-t border-slate-200 pt-8 mb-6 flex justify-between items-end">
              <div>
                <h3 className="text-2xl font-black text-slate-800 mb-2">พิมพ์รายงานรายบุคคล (PDF)</h3>
                <p className="text-slate-500 font-medium">เพื่อความเสถียร ระบบให้ <span className="text-rose-500 font-bold">แนบรูปภาพก่อนพิมพ์</span> (รูปจะไม่บันทึกขึ้นเน็ต และจะถูกประทับลง PDF ทันที)</p>
              </div>
              <div className="flex gap-3">
                <button onClick={selectAll} className="text-sm font-bold text-blue-600 hover:text-blue-800 cursor-pointer">เลือกทั้งหมด</button>
                <button onClick={() => setSelectedStudents(new Set())} className="text-sm font-bold text-slate-400 hover:text-slate-600 cursor-pointer">ยกเลิก</button>
              </div>
           </div>

           {visitedList.length === 0 ? <div className="text-center py-16 bg-white rounded-[2rem] border border-dashed border-slate-200 text-slate-400 font-medium text-lg">ยังไม่มีข้อมูลนักเรียนที่ดำเนินการบันทึก นร.01 เสร็จสิ้น</div> : (
             <div className="grid grid-cols-1 gap-5 mb-8">
               {visitedList.map((s, i) => (
                 <div key={i} className={`soft-card p-5 transition-colors ${selectedStudents.has(s.studentNo) ? 'bg-blue-50 border-blue-400' : 'hover:border-blue-200'}`}>
                   
                   {/* แถบกดเลือกชื่อ */}
                   <div className="flex items-center justify-between cursor-pointer btn-press" onClick={() => toggleStudent(s.studentNo)}>
                     <div className="flex items-center gap-4">
                       <div className={`w-6 h-6 rounded flex items-center justify-center border-2 ${selectedStudents.has(s.studentNo) ? 'bg-blue-500 border-blue-500 text-white' : 'border-slate-300'}`}>
                          {selectedStudents.has(s.studentNo) && <i className="fa-solid fa-check text-xs"></i>}
                       </div>
                       <div><h4 className="font-bold text-slate-800">{s.studentName}</h4><p className="text-xs font-bold text-slate-400 mt-0.5">เลขที่ {s.studentNo} • ชั้น {getVal(s,"classLevel")}</p></div>
                     </div>
                   </div>

                   {/* โซนแนบรูป (จะโชว์ก็ต่อเมื่อติ๊กเลือกคนนี้) */}
                   {selectedStudents.has(s.studentNo) && (
                     <div className="mt-5 pt-5 border-t border-blue-100 flex flex-col md:flex-row gap-6 slide-up">
                       <div className="flex-1 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                         <p className="text-sm font-bold text-slate-700 mb-2"><i className="fa-solid fa-image text-blue-500 mr-2"></i> รูปที่ 1: สภาพบ้าน</p>
                         <input type="file" accept="image/*" className="text-sm w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" onChange={e => handleImage(s.studentNo, 1, e.target.files[0])} />
                         {images[`${s.studentNo}_1`] && <img src={images[`${s.studentNo}_1`]} className="mt-3 h-24 object-cover rounded-lg border border-slate-200" />}
                       </div>
                       <div className="flex-1 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                         <p className="text-sm font-bold text-slate-700 mb-2"><i className="fa-solid fa-image text-emerald-500 mr-2"></i> รูปที่ 2: ภายในบ้าน</p>
                         <input type="file" accept="image/*" className="text-sm w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer" onChange={e => handleImage(s.studentNo, 2, e.target.files[0])} />
                         {images[`${s.studentNo}_2`] && <img src={images[`${s.studentNo}_2`]} className="mt-3 h-24 object-cover rounded-lg border border-slate-200" />}
                       </div>
                     </div>
                   )}

                 </div>
               ))}
             </div>
           )}

           {visitedList.length > 0 && (
             <div className="text-center sticky bottom-5 z-50">
               <button onClick={handlePrint} disabled={selectedStudents.size === 0} className="px-10 py-5 rounded-full font-black text-white bg-slate-900 hover:bg-blue-600 disabled:opacity-50 btn-press shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)] transition-all text-lg flex items-center justify-center mx-auto gap-3 cursor-pointer border-4 border-white">
                 <i className="fa-solid fa-print text-xl"></i> สั่งพิมพ์ / เซฟ PDF นร.01 (เปิดแท็บใหม่)
               </button>
             </div>
           )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <ErrorBoundary>
        <DashboardApp />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
