<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเยี่ยมบ้านนักเรียนอัจฉริยะ (Soft UI)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; color: #475569; }
    
    /* Animations */
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    
    /* 🌟 Soft UI Design (นวลตา ไม่กระด้าง) 🌟 */
    .soft-card { 
      background: rgba(255, 255, 255, 0.95); 
      backdrop-filter: blur(16px);
      border: 1px solid rgba(241, 245, 249, 1); 
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.04);
      border-radius: 2rem;
    }
    
    .soft-input {
      background-color: #f8fafc;
      border: 1.5px solid #f1f5f9;
      border-radius: 1.2rem;
      padding: 1rem 1.25rem;
      color: #475569;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
      transition: all 0.3s ease;
      font-weight: 500;
    }
    .soft-input:focus {
      background-color: #ffffff;
      border-color: #bfdbfe;
      box-shadow: 0 0 0 4px rgba(191, 219, 254, 0.3), inset 0 2px 4px rgba(0, 0, 0, 0.01);
      outline: none;
    }

    .btn-soft {
      border-radius: 1.2rem;
      transition: all 0.2s ease;
    }
    .btn-soft:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -6px rgba(0,0,0,0.1); }
    .btn-soft:active { transform: scale(0.97); box-shadow: 0 2px 5px -2px rgba(0,0,0,0.1); }
    
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .hide-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="h-screen overflow-hidden bg-slate-50">
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 🔴 ใส่ URL จากการทำ New Deployment ตัวล่าสุดตรงนี้ 🔴
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzC_KX9FHvCa_H5Fe7i0F5U3befMSOTl8aG7X5L18gZpbVQDn0CqDQCBf0bQg81QuYi/exec";
    
    const SCHOOL_LAT = 18.862105; const SCHOOL_LON = 99.0872654;
    const HOUSE_COND = ["ดีมาก","ดี","ปานกลาง","ทรุดโทรม","ไม่ปลอดภัย"];
    const REL_OPTS = ["อบอุ่นดีมาก","อบอุ่นดี","ปานกลาง","ไม่ค่อยอบอุ่น","มีปัญหา"];
    const VISIT_STAT = ["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"];
    const RESULT_OPTS = ["ปกติ","ต้องเฝ้าระวัง","ต้องช่วยเหลือเร่งด่วน","ส่งต่อ"];

    const api = {
      async get(action, params = {}) {
        const q = new URLSearchParams({ action, t: Date.now(), ...params }).toString();
        try { const r = await fetch(`${SCRIPT_URL}?${q}`, { cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
      },
      async post(body) {
        try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" }, cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
      }
    };

    const getVal = (obj, key) => {
      const k = Object.keys(obj).find(x => String(x).toLowerCase().trim() === String(key).toLowerCase().trim());
      return k ? String(obj[k]).trim() : "";
    };

    // --- Components ---
    const SoftInputField = ({ label, value, onChange, type="text", placeholder="" }) => (
      <div className="mb-5">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-2">{label}</label>
        <input type={type} value={value} onChange={onChange} placeholder={placeholder} className="w-full soft-input" />
      </div>
    );

    const SoftSelectField = ({ label, value, onChange, options }) => (
      <div className="mb-5">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-2">{label}</label>
        <select value={value} onChange={onChange} className="w-full soft-input appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[position:right_1.2rem_center] bg-[length:0.8rem_auto]">
          <option value="">- เลือก -</option>
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      </div>
    );

    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      return (
        <div className={`fixed top-6 right-6 z-[9999] px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 slide-up ${type === 'success' ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`}>
          <i className={`fa-solid ${type === 'success' ? 'fa-check' : 'fa-xmark'} text-xl`}></i><span className="font-bold text-sm">{msg}</span>
        </div>
      );
    };

    // 📍 POPUP GPS อนิเมชันสวยงาม
    const GpsPopup = ({ status, distance }) => {
      if (!status) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center fade-in">
          <div className="bg-white p-10 rounded-[2rem] shadow-2xl flex flex-col items-center bounce-in w-[340px]">
            {status === "loading" && (
              <>
                <div className="relative flex justify-center items-center w-24 h-24 bg-blue-50 rounded-full mb-6">
                  <div className="absolute inset-0 border-[4px] border-blue-300 rounded-full animate-[ping_1.5s_cubic-bezier(0,0,0.2,1)_infinite] opacity-70"></div>
                  <i className="fa-solid fa-location-crosshairs text-4xl text-blue-500"></i>
                </div>
                <h3 className="font-black text-slate-800 text-xl mb-1">กำลังคำนวณพิกัด</h3>
                <p className="text-sm font-medium text-slate-500 text-center">ค้นหาระยะทางจากโรงเรียน...</p>
              </>
            )}
            {status === "success" && (
              <>
                <div className="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mb-6">
                  <i className="fa-solid fa-check text-5xl text-emerald-500 bounce-in"></i>
                </div>
                <h3 className="font-black text-slate-800 text-xl mb-1">ปักหมุดสำเร็จ!</h3>
                <p className="text-sm font-medium text-slate-500 text-center">ห่างจากโรงเรียน <span className="font-black text-emerald-600 text-lg">{distance} กม.</span></p>
              </>
            )}
            {status === "error" && (
              <>
                <div className="w-24 h-24 bg-rose-50 rounded-full flex items-center justify-center mb-6">
                  <i className="fa-solid fa-xmark text-5xl text-rose-500 bounce-in"></i>
                </div>
                <h3 className="font-black text-slate-800 text-xl mb-1">ข้อผิดพลาด</h3>
                <p className="text-sm font-medium text-slate-500 text-center">เบราว์เซอร์ไม่รองรับ หรือปิด GPS ไว้</p>
              </>
            )}
          </div>
        </div>
      );
    };

    // ============= Main App =============
    function DashboardApp() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState("students"); 
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [toast, setToast] = useState(null);
      const [students, setStudents] = useState([]);
      const [visits, setVisits] = useState([]);
      const [stats, setStats] = useState({ percent: 0, visited: 0, total: 0 });
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [isSaving, setIsSaving] = useState(false);

      useEffect(() => {
        const u = localStorage.getItem("hv_user_v7");
        if (u) { setUser(JSON.parse(u)); loadAllData(JSON.parse(u)); }
      }, []);

      const loadAllData = async (u) => {
        setIsDataLoaded(false);
        const [sRes, vRes, stRes] = await Promise.all([
          api.get("getStudents", { classLevel: u.classLevel }),
          api.get("getVisitsFull", { classLevel: u.classLevel }),
          api.get("getStats", { classLevel: u.classLevel })
        ]);
        if (sRes.success) setStudents(sRes.data);
        if (vRes.success) setVisits(vRes.data);
        if (stRes.success) setStats(stRes.data);
        setIsDataLoaded(true);
      };

      const handleLogin = async (code) => {
        const res = await api.post({ action: "getTeacherByCode", code });
        if (res.success) {
          localStorage.setItem("hv_user_v7", JSON.stringify(res.data));
          setUser(res.data); loadAllData(res.data);
        } else setToast({msg: "รหัสไม่ถูกต้อง", type: "error"});
      };

      // 🔴 แก้ปัญหาการซิงค์: Optimistic Update + หน่วงเวลาดึงข้อมูลใหม่
      const saveVisit = async (formData, images) => {
        setIsSaving(true);
        const data = { ...formData, teacherCode: user.code, classLevel: user.classLevel, imagesBase64: images.filter(i=>i.startsWith("data:")), existingImageUrls: images.filter(i=>!i.startsWith("data:")) };
        
        const res = await api.post({ action: "saveVisit", data });
        if (res.success) {
          setToast({msg: "บันทึกและลิงก์ข้อมูลสำเร็จ!", type: "success"});
          
          // เปลี่ยน UI ทันทีให้เห็นคาตา
          setVisits(prev => {
            const arr = [...prev];
            const idx = arr.findIndex(v => getVal(v, "studentNo") === data.studentNo);
            if(idx > -1) arr[idx] = {...data, visitStatus: data.visitStatus};
            else arr.push({...data, visitStatus: data.visitStatus});
            return arr;
          });

          // หน่วงเวลา 2 วินาทีให้ Google ประมวลผลเสร็จ แล้วดึงข้อมูลใหม่
          setTimeout(() => loadAllData(user), 2000); 

          setView("dashboard");
          setSelectedStudent(null);
        } else {
          setToast({msg: "เกิดข้อผิดพลาดในการบันทึก", type: "error"});
        }
        setIsSaving(false);
      };

      if (!user) return <Login onLogin={handleLogin} />;

      return (
        <div className="flex h-screen bg-slate-50 fade-in">
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          {isSaving && (
            <div className="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-50 flex items-center justify-center">
               <div className="bg-white px-8 py-6 rounded-[2rem] shadow-2xl flex flex-col items-center">
                  <i className="fa-solid fa-cloud-arrow-up text-4xl text-blue-500 animate-bounce mb-3"></i>
                  <p className="font-bold text-slate-800">กำลังซิงค์ข้อมูลลงฐานระบบ...</p>
               </div>
            </div>
          )}
          
          <aside className="w-[280px] bg-white border-r border-slate-100 flex flex-col shadow-sm hidden md:flex">
             <div className="p-8 border-b border-slate-50 flex flex-col items-center">
                <div className="w-20 h-20 bg-gradient-to-tr from-blue-100 to-indigo-50 rounded-[1.5rem] mb-4 flex items-center justify-center"><i className="fa-solid fa-chalkboard-user text-3xl text-blue-600"></i></div>
                <h2 className="font-black text-slate-800">{user.fullName}</h2>
                <p className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full mt-2">ชั้น {user.classLevel}</p>
             </div>
             <nav className="flex-1 p-4 space-y-3">
                <button onClick={()=>setView("dashboard")} className={`w-full flex items-center px-6 py-4 rounded-[1.2rem] font-bold btn-soft ${view==="dashboard" ? "bg-blue-600 text-white shadow-lg shadow-blue-500/30" : "text-slate-500 hover:bg-slate-50"}`}><i className="fa-solid fa-chart-pie mr-4"></i>สรุปภาพรวม</button>
                <button onClick={()=>setView("students")} className={`w-full flex items-center px-6 py-4 rounded-[1.2rem] font-bold btn-soft ${view==="students" ? "bg-blue-600 text-white shadow-lg shadow-blue-500/30" : "text-slate-500 hover:bg-slate-50"}`}><i className="fa-solid fa-users mr-4"></i>บันทึกเยี่ยมบ้าน</button>
             </nav>
             <div className="p-6"><button onClick={()=>{localStorage.removeItem("hv_user_v7"); window.location.reload();}} className="w-full py-4 rounded-[1.2rem] font-bold text-rose-500 bg-rose-50 hover:bg-rose-100 btn-soft"><i className="fa-solid fa-power-off mr-2"></i> ออกจากระบบ</button></div>
          </aside>

          <main className="flex-1 flex flex-col h-full overflow-hidden relative">
            <header className="h-20 bg-white/60 backdrop-blur-xl px-8 flex items-center justify-between border-b border-slate-100 z-10">
               <h1 className="font-black text-xl text-slate-800">ระบบเยี่ยมบ้านอัจฉริยะ</h1>
               <button onClick={()=>loadAllData(user)} className="bg-white border border-slate-200 hover:border-blue-300 text-slate-600 hover:text-blue-600 px-5 py-2.5 rounded-[1rem] font-bold text-sm btn-soft flex items-center gap-2"><i className={`fa-solid fa-rotate-right ${!isDataLoaded ? 'fa-spin' : ''}`}></i>ซิงค์ข้อมูล</button>
            </header>
            <div className="flex-1 overflow-y-auto p-6 md:p-10 custom-scroll">
              <div className="max-w-4xl mx-auto pb-20">
                {view === "dashboard" && <Dashboard stats={stats} visits={visits} students={students} isLoaded={isDataLoaded} />}
                {view === "students" && <Students students={students} visits={visits} isLoaded={isDataLoaded} onSelect={s=>{setSelectedStudent(s); setView("form");}} />}
                {view === "form" && selectedStudent && <Form student={selectedStudent} visits={visits} onBack={()=>{setSelectedStudent(null); setView("students");}} onSave={saveVisit} />}
              </div>
            </div>
          </main>
        </div>
      );
    }

    const Login = ({ onLogin }) => {
      const [code, setCode] = useState("");
      return (
        <div className="h-screen flex items-center justify-center bg-slate-50 p-4">
          <div className="soft-card p-10 w-full max-w-sm text-center bounce-in">
             <div className="w-20 h-20 bg-blue-600 rounded-[1.5rem] mx-auto flex items-center justify-center mb-6 shadow-lg shadow-blue-500/40"><i className="fa-solid fa-house-chimney-user text-3xl text-white"></i></div>
             <h2 className="text-2xl font-black text-slate-800 mb-8">เข้าสู่ระบบ</h2>
             <input type="password" value={code} onChange={e=>setCode(e.target.value)} className="w-full bg-slate-100 border border-slate-200 rounded-[1.2rem] px-6 py-4 text-center text-xl font-black tracking-[0.5em] mb-6 focus:border-blue-400 focus:bg-white outline-none transition-colors" placeholder="รหัสครู" />
             <button onClick={()=>onLogin(code)} className="w-full bg-slate-900 text-white font-bold py-4 rounded-[1.2rem] btn-soft shadow-lg hover:bg-blue-600 transition-colors">เข้าใช้งาน</button>
          </div>
        </div>
      );
    };

    function Dashboard({ stats, visits, students, isLoaded }) {
      if(!isLoaded) return <div className="text-center mt-20"><i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500"></i></div>;
      const actVisited = visits.filter(v => getVal(v, "visitStatus") === "เยี่ยมแล้ว").length;
      const pct = students.length > 0 ? Math.round((actVisited/students.length)*100) : 0;
      return (
        <div className="slide-up">
          <h2 className="text-3xl font-black text-slate-800 mb-8">สรุปภาพรวม</h2>
          <div className="soft-card p-8 md:p-10 mb-8 flex flex-col md:flex-row items-center justify-between">
             <div className="mb-6 md:mb-0 text-center md:text-left">
                <h3 className="text-lg font-bold text-slate-600">ความคืบหน้าของชั้นเรียน</h3>
                <p className="text-sm font-medium text-slate-400 mt-1">ทำเสร็จไปแล้ว {actVisited} จาก {students.length} คน</p>
             </div>
             <div className="w-full md:w-1/2">
                <div className="flex justify-between items-end mb-2"><span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Progress</span><span className="text-4xl font-black text-blue-600">{pct}%</span></div>
                <div className="h-4 bg-slate-100 rounded-full p-1"><div className="h-full bg-blue-500 rounded-full transition-all duration-1000" style={{width:`${pct}%`}}></div></div>
             </div>
          </div>
        </div>
      );
    }

    function Students({ students, visits, isLoaded, onSelect }) {
      if(!isLoaded) return <div className="text-center mt-20"><i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500"></i></div>;
      return (
        <div className="slide-up">
          <h2 className="text-3xl font-black text-slate-800 mb-8">รายชื่อนักเรียน</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {students.map((s, i) => {
              const st = getVisitStatus(visits, s.studentNo);
              return (
                <div key={i} onClick={()=>onSelect(s)} className="soft-card p-6 flex items-center justify-between cursor-pointer hover:border-blue-300 btn-soft group">
                  <div className="flex items-center gap-5">
                     <div className={`w-14 h-14 rounded-full flex items-center justify-center font-bold text-lg transition-colors ${st==="เยี่ยมแล้ว"?'bg-emerald-50 text-emerald-600':st==="นัดหมายแล้ว"?'bg-amber-50 text-amber-600':'bg-slate-50 text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600'}`}>{s.studentNo}</div>
                     <div><h4 className="font-bold text-slate-800 text-lg leading-tight group-hover:text-blue-600">{s.studentName}</h4><p className="text-xs font-bold text-slate-400 mt-1">{st}</p></div>
                  </div>
                  <i className="fa-solid fa-chevron-right text-slate-300 group-hover:text-blue-500"></i>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Form({ student, visits, onBack, onSave }) {
      const exist = visits.find(v => getVal(v, "studentNo") === String(student.studentNo)) || {};
      const [form, setForm] = useState({
        studentNo: student.studentNo, studentName: student.studentName,
        semester: getVal(exist,"semester")||"1", visitStatus: getVal(exist,"visitStatus")||"เยี่ยมแล้ว", visitDate: getVal(exist,"visitDate")?new Date(getVal(exist,"visitDate")).toISOString().split("T")[0]:new Date().toISOString().split("T")[0], appointmentDate: getVal(exist,"appointmentDate")?new Date(getVal(exist,"appointmentDate")).toISOString().split("T")[0]:"",
        houseType: getVal(exist,"houseType"), distanceKm: getVal(exist,"distanceKm"), visitResult: getVal(exist,"visitResult"), teacherNotes: getVal(exist,"teacherNotes"), images: getVal(exist,"images")?getVal(exist,"images").split(",").filter(Boolean):[]
      });
      const [gpsStatus, setGpsStatus] = useState(null);
      const [gpsDist, setGpsDist] = useState("");

      const update = (k, v) => setForm(p => ({...p, [k]:v}));

      const getGPS = () => {
        setGpsStatus("loading");
        if("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(pos => {
            const R=6371; const dLat=(SCHOOL_LAT-pos.coords.latitude)*Math.PI/180; const dLon=(SCHOOL_LON-pos.coords.longitude)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(pos.coords.latitude*Math.PI/180)*Math.cos(SCHOOL_LAT*Math.PI/180)*Math.sin(dLon/2)**2;
            const dist = (R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2);
            update("distanceKm", dist); setGpsDist(dist); setGpsStatus("success");
            setTimeout(() => setGpsStatus(null), 3000);
          }, () => { setGpsStatus("error"); setTimeout(() => setGpsStatus(null), 3000); }, {enableHighAccuracy:true, timeout:10000});
        }
      };

      return (
        <div className="slide-up">
          <GpsPopup status={gpsStatus} distance={gpsDist} />
          <div className="flex items-center gap-5 mb-8">
            <button onClick={onBack} className="w-12 h-12 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-500 btn-soft hover:text-blue-600"><i className="fa-solid fa-arrow-left"></i></button>
            <div><h2 className="text-2xl font-black text-slate-800">{student.studentName}</h2><p className="text-sm font-bold text-blue-600 mt-1">เลขที่ {student.studentNo}</p></div>
          </div>

          <div className="soft-card p-8 md:p-12 mb-8">
            <h3 className="font-black text-xl text-slate-800 mb-6 border-b border-slate-100 pb-4">แบบฟอร์มการเยี่ยมบ้าน</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
               <SoftSelectField label="สถานะการเยี่ยม" value={form.visitStatus} onChange={e=>update("visitStatus", e.target.value)} options={["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"]} />
               <SoftInputField type="date" label="วันที่บันทึก" value={form.visitStatus === "นัดหมายแล้ว" ? form.appointmentDate : form.visitDate} onChange={e=>update(form.visitStatus === "นัดหมายแล้ว" ? "appointmentDate" : "visitDate", e.target.value)} />
               <SoftInputField label="ลักษณะที่พัก" value={form.houseType} onChange={e=>update("houseType", e.target.value)} placeholder="เช่น บ้านไม้, หอพัก" />
               
               <div className="mb-5 relative">
                  <label className="block text-sm font-bold text-slate-500 mb-2 pl-2">ระยะทาง (กม.)</label>
                  <div className="flex gap-3">
                     <input type="number" value={form.distanceKm} onChange={e=>update("distanceKm", e.target.value)} className="w-full soft-input" placeholder="0.00" />
                     <button onClick={getGPS} className="bg-slate-900 text-white px-6 rounded-[1.2rem] font-bold btn-soft flex items-center whitespace-nowrap hover:bg-blue-600"><i className="fa-solid fa-location-dot mr-2"></i>ดึง GPS</button>
                  </div>
               </div>
               
               <div className="col-span-full mt-4"><SoftSelectField label="สรุปผลการเยี่ยม" value={form.visitResult} onChange={e=>update("visitResult", e.target.value)} options={RESULT_OPTS} /></div>
            </div>

            <div className="mt-10 pt-8 border-t border-slate-100 text-right">
              <button onClick={()=>onSave(form, form.images)} className="px-12 py-5 rounded-full font-black text-white bg-blue-600 hover:bg-blue-700 shadow-xl shadow-blue-500/30 btn-soft text-lg"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> บันทึกเข้าระบบจริง</button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<DashboardApp />);
  </script>
</body>
</html>
