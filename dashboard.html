<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเยี่ยมบ้านนักเรียน - Production</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; color: #334155; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .fade-in { animation: fadeIn 0.6s forwards; }
    .slide-up { animation: slideUp 0.6s forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .glass-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.03); }
    .luxury-input { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 0.875rem; padding: 0.875rem; font-size: 1rem; }
    .luxury-input:focus { background: #fff; border-color: #3b82f6; outline: none; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
    .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: bold; }
    .badge-success { background: #ecfdf5; color: #065f46; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body class="h-screen bg-slate-50">
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNDoujpfKH_LMvPiW78Y1UzCgbV65tbBrva-BN5P8EORD9lMOfxllf8QXhsPf18QfH/exec";

    const api = {
      async get(action, params = {}) {
        const q = new URLSearchParams({ action, t: Date.now(), ...params }).toString();
        try { const r = await fetch(`${SCRIPT_URL}?${q}`); return await r.json(); } 
        catch (e) { return { success: false, message: e.message }; }
      },
      async post(body) {
        try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" } }); return await r.json(); } 
        catch (e) { return { success: false, message: e.message }; }
      }
    };

    const HOUSE_COND = ["ดีมาก","ดี","ปานกลาง","ทรุดโทรม","ไม่ปลอดภัย"];
    const REL_OPTS = ["อบอุ่นดีมาก","อบอุ่นดี","ปานกลาง","ไม่ค่อยอบอุ่น","มีปัญหา"];
    const VISIT_STAT = ["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"];
    const RESULT_OPTS = ["ปกติ","ต้องเฝ้าระวัง","ต้องช่วยเหลือเร่งด่วน","ส่งต่อ"];

    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, [onClose]);
      return (
        <div className={`fixed top-4 right-4 z-50 px-6 py-3 rounded-xl shadow-lg text-white font-semibold flex items-center gap-2 ${type === 'success' ? 'bg-emerald-500' : type === 'warning' ? 'bg-amber-500' : 'bg-rose-500'}`}>
          <i className={`fa-solid ${type === 'success' ? 'fa-check' : type === 'warning' ? 'fa-exclamation' : 'fa-xmark'}`}></i>
          {msg}
        </div>
      );
    };

    function DashboardApp() {
      const [user, setUser] = useState(null);
      const [code, setCode] = useState("");
      const [codeInput, setCodeInput] = useState("");
      const [showCodeModal, setShowCodeModal] = useState(false);
      const [students, setStudents] = useState([]);
      const [visits, setVisits] = useState([]);
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [view, setView] = useState("list");
      const [toast, setToast] = useState(null);
      const [formData, setFormData] = useState({});
      const [images, setImages] = useState([]);
      const [draftSaved, setDraftSaved] = useState(false);
      const draftTimer = useRef(null);
      const [selectedForReport, setSelectedForReport] = useState(new Set());
      const [showReportModal, setShowReportModal] = useState(false);

      // ✅ ตรวจสอบ code ที่บันทึก
      useEffect(() => {
        const savedCode = localStorage.getItem("hv_teacher_code");
        const savedUser = localStorage.getItem("hv_user");
        if (savedCode && savedUser) {
          setCode(savedCode);
          setUser(JSON.parse(savedUser));
          setShowCodeModal(false);
          loadData(JSON.parse(savedUser));
        } else {
          setShowCodeModal(true);
        }
      }, []);

      // ✅ Auto-save Draft ทุก 1 วินาที (เมื่อหยุดพิมพ์)
      useEffect(() => {
        if (!selectedStudent || !formData.studentNo) return;

        clearTimeout(draftTimer.current);
        draftTimer.current = setTimeout(() => {
          const draftKey = `draft_${selectedStudent.studentNo}`;
          localStorage.setItem(draftKey, JSON.stringify({ ...formData, images }));
          setDraftSaved(true);
          setTimeout(() => setDraftSaved(false), 2000);
        }, 1000);

        return () => clearTimeout(draftTimer.current);
      }, [formData, selectedStudent, images]);

      const loadData = async (u) => {
        try {
          const [sRes, vRes] = await Promise.all([
            api.get("getStudents", { classLevel: u.classLevel }),
            api.get("getVisitsFull", { classLevel: u.classLevel })
          ]);
          setStudents(sRes.data || []);
          setVisits(vRes.data || []);
        } catch (e) {
          showToast("❌ ไม่สามารถโหลดข้อมูล", "error");
        }
      };

      const handleCodeSubmit = async () => {
        if (codeInput.length !== 4 || !/^\d+$/.test(codeInput)) {
          showToast("⚠️ กรอกรหัส 4 ตัวเลข", "warning");
          return;
        }

        const res = await api.post({ action: "getTeacherByCode", code: codeInput });
        if (res.success) {
          localStorage.setItem("hv_teacher_code", codeInput);
          localStorage.setItem("hv_user", JSON.stringify(res.data));
          setCode(codeInput);
          setUser(res.data);
          setShowCodeModal(false);
          loadData(res.data);
          showToast(`👋 ยินดีต้อนรับ ${res.data.fullName}`, "success");
        } else {
          showToast("❌ " + res.message, "error");
        }
      };

      const openStudent = (student) => {
        const draftKey = `draft_${student.studentNo}`;
        const draft = localStorage.getItem(draftKey);
        
        if (draft) {
          const { images: draftImages, ...draftForm } = JSON.parse(draft);
          setFormData(draftForm);
          setImages(draftImages || []);
        } else {
          setFormData({
            studentNo: student.studentNo,
            studentName: student.studentName,
            nickname: student.nickname,
            semester: "1",
            visitStatus: "เยี่ยมแล้ว",
            visitDate: new Date().toISOString().split("T")[0],
            observations: "",
            houseType: "",
            distanceKm: "",
            travelMethod: "",
            houseCondition: "",
            utilities: "",
            environment: "",
            familyMembers: "",
            siblings: "",
            familyRelationship: "",
            familyIncome: "",
            studentDuties: "",
            familyActivities: "",
            riskHealth: "",
            riskSafety: "",
            riskTravel: "",
            riskWork: "",
            riskSocial: "",
            riskSubstance: "",
            parentConcerns: "",
            visitResult: "",
            teacherNotes: "",
          });
          setImages([]);
        }
        
        setSelectedStudent(student);
        setView("form");
      };

      const saveForm = async () => {
        const data = {
          ...formData,
          teacherUsername: user.username,
          teacherName: user.fullName,
          classLevel: user.classLevel,
          imagesBase64: images.filter(i => i && i.startsWith("data:")),
          existingImageUrls: images.filter(i => i && !i.startsWith("data:"))
        };

        const res = await api.post({ action: "saveVisit", data });
        if (res.success) {
          localStorage.removeItem(`draft_${selectedStudent.studentNo}`);
          showToast("✅ บันทึกสำเร็จ", "success");
          loadData(user);
          setView("list");
          setSelectedStudent(null);
        } else {
          showToast("❌ " + res.message, "error");
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = 800;
            canvas.height = (img.height / img.width) * 800;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const filename = `${selectedStudent.studentNo}_${selectedStudent.studentName}_${Date.now()}.jpg`;
            setImages([...images, { data: canvas.toDataURL("image/jpeg", 0.8), name: filename }]);
            showToast("✅ เพิ่มรูปสำเร็จ", "success");
          };
        };
        reader.readAsDataURL(file);
      };

      const generateReport = async (type) => {
        let reportData = [];

        if (type === "single" && selectedStudent) {
          const visit = visits.find(v => v.studentName === selectedStudent.studentName);
          reportData = [{ ...selectedStudent, ...visit }];
        } else if (type === "selected") {
          reportData = students
            .filter(s => selectedForReport.has(s.studentNo))
            .map(s => ({ ...s, ...visits.find(v => v.studentName === s.studentName) }));
        } else {
          reportData = students.map(s => ({ ...s, ...visits.find(v => v.studentName === s.studentName) }));
        }

        if (reportData.length === 0) {
          showToast("⚠️ ไม่มีข้อมูลที่เลือก", "warning");
          return;
        }

        // สร้าง PDF
        const html = generateReportHTML(reportData);
        const element = document.createElement("div");
        element.innerHTML = html;
        
        const opt = {
          margin: 10,
          filename: `report_${type}_${new Date().toISOString().split("T")[0]}.pdf`,
          image: { type: "jpeg", quality: 0.95 },
          html2canvas: { scale: 2 },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
        };

        html2pdf().set(opt).from(element).save();
        showToast("✅ ดาวน์โหลดรายงานเสร็จ", "success");
      };

      const generateReportHTML = (data) => {
        const date = new Date().toLocaleDateString("th-TH");
        let html = `
          <div style="font-family: 'Sarabun', sans-serif; padding: 20px; max-width: 800px;">
            <h2 style="text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 10px;">
              รายงานผลการเยี่ยมบ้านนักเรียน
            </h2>
            <p style="text-align: center; color: #666; margin: 10px 0;">
              โรงเรียนป่าก้าง - วันที่ ${date}
            </p>
            <p style="text-align: center; color: #666; margin: 10px 0;">
              ครู: ${user.fullName} | ชั้น: ${user.classLevel}
            </p>
        `;

        data.forEach((item, idx) => {
          const visitDate = item.visitDate ? new Date(item.visitDate).toLocaleDateString("th-TH") : "-";
          html += `
            <div style="page-break-inside: avoid; border: 1px solid #e2e8f0; padding: 15px; margin: 15px 0; border-radius: 8px;">
              <h3 style="color: #1e40af; margin: 0 0 10px 0;">
                ${idx + 1}. ${item.studentNo} - ${item.studentName} (${item.nickname || "-"})
              </h3>
              <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
                <tr style="background: #f0f9ff;">
                  <td style="padding: 8px; border: 1px solid #e2e8f0; font-weight: bold; width: 40%;">ข้อมูล</td>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">รายละเอียด</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">วันที่เยี่ยม</td>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">${visitDate}</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">สถานะ</td>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">${item.visitStatus || "-"}</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">ที่พัก</td>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">${item.houseType || "-"}</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">สภาพบ้าน</td>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">${item.houseCondition || "-"}</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">ความเห็น</td>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">${item.visitResult || "-"}</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">หมายเหตุ</td>
                  <td style="padding: 8px; border: 1px solid #e2e8f0;">${item.teacherNotes || "-"}</td>
                </tr>
              </table>
            </div>
          `;
        });

        html += `</div>`;
        return html;
      };

      const showToast = (msg, type = "success") => {
        setToast({ msg, type });
      };

      const logout = () => {
        localStorage.removeItem("hv_teacher_code");
        localStorage.removeItem("hv_user");
        setUser(null);
        setCode("");
        setShowCodeModal(true);
      };

      // ✅ Code Input Modal
      if (showCodeModal) {
        return (
          <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
            <div className="bg-white rounded-3xl p-8 w-96 shadow-2xl">
              <div className="text-center mb-8">
                <div className="w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                  <i className="fa-solid fa-badge text-2xl text-white"></i>
                </div>
                <h2 className="text-2xl font-bold text-slate-800">กรอกรหัสครู</h2>
              </div>

              <input
                type="password"
                maxLength="4"
                inputMode="numeric"
                value={codeInput}
                onChange={e => setCodeInput(e.target.value.slice(0, 4))}
                onKeyPress={e => e.key === "Enter" && handleCodeSubmit()}
                className="w-full text-center text-4xl font-bold tracking-widest luxury-input mb-6 placeholder:text-slate-300"
                placeholder="• • • •"
              />

              <button
                onClick={handleCodeSubmit}
                disabled={codeInput.length !== 4}
                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-2xl disabled:opacity-50"
              >
                เข้าใช้งาน
              </button>
            </div>
          </div>
        );
      }

      if (!user) return <div className="flex items-center justify-center h-screen"><div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div></div>;

      return (
        <div className="flex h-full">
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}

          {/* Sidebar */}
          <aside className="w-64 bg-white border-r border-slate-100 p-6 flex flex-col">
            <div className="text-center mb-8">
              <h1 className="text-xl font-bold text-slate-800">{user.fullName}</h1>
              <p className="text-sm text-slate-500">รหัส: {code}</p>
              <p className="text-xs text-slate-400 mt-1">ชั้น: {user.classLevel}</p>
            </div>

            <nav className="flex-1 space-y-2">
              <button
                onClick={() => setView("list")}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition ${view === "list" ? "bg-blue-50 text-blue-600 font-bold" : "text-slate-600 hover:bg-slate-50"}`}
              >
                <i className="fa-solid fa-list"></i> รายชื่อนักเรียน
              </button>
              <button
                onClick={() => setView("report")}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition ${view === "report" ? "bg-emerald-50 text-emerald-600 font-bold" : "text-slate-600 hover:bg-slate-50"}`}
              >
                <i className="fa-solid fa-file-pdf"></i> รายงาน
              </button>
            </nav>

            <button
              onClick={logout}
              className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-100 transition font-semibold"
            >
              <i className="fa-solid fa-sign-out-alt"></i> เปลี่ยนรหัส
            </button>
          </aside>

          {/* Main Content */}
          <main className="flex-1 overflow-y-auto p-8">
            {view === "list" && (
              <div className="max-w-6xl mx-auto">
                <h2 className="text-3xl font-bold text-slate-800 mb-6">รายชื่อนักเรียน</h2>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                  <div className="glass-card p-6">
                    <p className="text-slate-500 text-sm mb-1">รวมทั้งหมด</p>
                    <h3 className="text-3xl font-bold text-blue-600">{students.length}</h3>
                  </div>
                  <div className="glass-card p-6">
                    <p className="text-slate-500 text-sm mb-1">เยี่ยมแล้ว</p>
                    <h3 className="text-3xl font-bold text-emerald-600">{visits.filter(v => v.visitStatus === "เยี่ยมแล้ว").length}</h3>
                  </div>
                  <div className="glass-card p-6">
                    <p className="text-slate-500 text-sm mb-1">ยังไม่เยี่ยม</p>
                    <h3 className="text-3xl font-bold text-amber-600">{students.length - visits.filter(v => v.visitStatus === "เยี่ยมแล้ว").length}</h3>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {students.map((s, i) => {
                    const visit = visits.find(v => v.studentName === s.studentName);
                    const status = visit?.visitStatus || "ยังไม่เยี่ยม";
                    const statusColor = status === "เยี่ยมแล้ว" ? "badge-success" : status === "นัดหมายแล้ว" ? "badge-warning" : "badge-danger";

                    return (
                      <div key={i} className="glass-card p-6 hover:shadow-lg transition cursor-pointer" onClick={() => openStudent(s)}>
                        <div className="flex items-start justify-between mb-4">
                          <div>
                            <h3 className="font-bold text-slate-800">{s.studentNo} - {s.studentName}</h3>
                            <p className="text-sm text-slate-500">{s.nickname || "-"}</p>
                          </div>
                          <span className={`badge ${statusColor}`}>{status}</span>
                        </div>
                        <button className="w-full bg-blue-50 text-blue-600 py-2 rounded-lg hover:bg-blue-100 font-semibold">
                          <i className="fa-solid fa-edit mr-2"></i> แก้ไข
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {view === "form" && selectedStudent && (
              <div className="max-w-4xl mx-auto">
                <div className="flex items-center justify-between mb-8">
                  <h2 className="text-3xl font-bold text-slate-800">เลขที่ {selectedStudent.studentNo} - {selectedStudent.studentName}</h2>
                  <div className="flex items-center gap-2">
                    {draftSaved && <span className="badge badge-success"><i className="fa-solid fa-cloud-check mr-1"></i> บันทึกแล้ว</span>}
                    <button
                      onClick={() => { setView("list"); setSelectedStudent(null); }}
                      className="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200"
                    >
                      ย้อนกลับ
                    </button>
                  </div>
                </div>

                <div className="glass-card p-8 space-y-6 max-h-[70vh] overflow-y-auto">
                  {/* ข้อมูลเบื้องต้น */}
                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-slate-800 border-b pb-2">ข้อมูลเบื้องต้น</h3>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold text-slate-600 mb-2">ภาคเรียน</label>
                        <select value={formData.semester || "1"} onChange={e => setFormData({...formData, semester: e.target.value})} className="luxury-input w-full">
                          <option>1</option>
                          <option>2</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-slate-600 mb-2">วันที่</label>
                        <input type="date" value={formData.visitDate || ""} onChange={e => setFormData({...formData, visitDate: e.target.value})} className="luxury-input w-full" />
                      </div>
                      <div className="col-span-2">
                        <label className="block text-sm font-semibold text-slate-600 mb-2">สถานะการเยี่ยม</label>
                        <select value={formData.visitStatus || ""} onChange={e => setFormData({...formData, visitStatus: e.target.value})} className="luxury-input w-full">
                          <option value="">-- เลือก --</option>
                          {VISIT_STAT.map(s => <option key={s}>{s}</option>)}
                        </select>
                      </div>
                    </div>
                  </div>

                  {/* ที่พัก */}
                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-slate-800 border-b pb-2">ข้อมูลที่พัก</h3>
                    <div className="grid grid-cols-2 gap-4">
                      <input type="text" placeholder="ลักษณะที่พัก" value={formData.houseType || ""} onChange={e => setFormData({...formData, houseType: e.target.value})} className="luxury-input" />
                      <input type="number" placeholder="ระยะทาง (กม.)" value={formData.distanceKm || ""} onChange={e => setFormData({...formData, distanceKm: e.target.value})} className="luxury-input" />
                      <input type="text" placeholder="วิธีเดินทาง" value={formData.travelMethod || ""} onChange={e => setFormData({...formData, travelMethod: e.target.value})} className="luxury-input" />
                      <select value={formData.houseCondition || ""} onChange={e => setFormData({...formData, houseCondition: e.target.value})} className="luxury-input">
                        <option value="">-- สภาพบ้าน --</option>
                        {HOUSE_COND.map(c => <option key={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>

                  {/* ครอบครัว */}
                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-slate-800 border-b pb-2">ข้อมูลครอบครัว</h3>
                    <div className="grid grid-cols-2 gap-4">
                      <input type="number" placeholder="จำนวนสมาชิก" value={formData.familyMembers || ""} onChange={e => setFormData({...formData, familyMembers: e.target.value})} className="luxury-input" />
                      <input type="number" placeholder="จำนวนพี่น้อง" value={formData.siblings || ""} onChange={e => setFormData({...formData, siblings: e.target.value})} className="luxury-input" />
                      <select value={formData.familyRelationship || ""} onChange={e => setFormData({...formData, familyRelationship: e.target.value})} className="luxury-input col-span-2">
                        <option value="">-- ความสัมพันธ์ --</option>
                        {REL_OPTS.map(r => <option key={r}>{r}</option>)}
                      </select>
                    </div>
                  </div>

                  {/* ความเสี่ยง */}
                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-slate-800 border-b pb-2">ความเสี่ยง</h3>
                    <div className="grid grid-cols-2 gap-4">
                      <input type="text" placeholder="ด้านสุขภาพ" value={formData.riskHealth || ""} onChange={e => setFormData({...formData, riskHealth: e.target.value})} className="luxury-input" />
                      <input type="text" placeholder="ด้านความปลอดภัย" value={formData.riskSafety || ""} onChange={e => setFormData({...formData, riskSafety: e.target.value})} className="luxury-input" />
                      <input type="text" placeholder="ด้านการเดินทาง" value={formData.riskTravel || ""} onChange={e => setFormData({...formData, riskTravel: e.target.value})} className="luxury-input" />
                      <input type="text" placeholder="ด้านสารเสพติด" value={formData.riskSubstance || ""} onChange={e => setFormData({...formData, riskSubstance: e.target.value})} className="luxury-input" />
                    </div>
                  </div>

                  {/* บันทึกครู */}
                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-slate-800 border-b pb-2">บันทึกเพิ่มเติม</h3>
                    <select value={formData.visitResult || ""} onChange={e => setFormData({...formData, visitResult: e.target.value})} className="luxury-input w-full">
                      <option value="">-- ความเห็นของครู --</option>
                      {RESULT_OPTS.map(r => <option key={r}>{r}</option>)}
                    </select>
                    <textarea placeholder="หมายเหตุ" value={formData.teacherNotes || ""} onChange={e => setFormData({...formData, teacherNotes: e.target.value})} className="luxury-input w-full h-24" />
                  </div>

                  {/* อัปโหลดรูป */}
                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-slate-800 border-b pb-2">รูปภาพ</h3>
                    <label className="border-2 border-dashed border-blue-300 rounded-lg p-6 text-center cursor-pointer hover:bg-blue-50 transition">
                      <i className="fa-solid fa-cloud-arrow-up text-3xl text-blue-500 mb-2 block"></i>
                      <p className="font-semibold text-blue-600">คลิกเพื่ออัปโหลดรูป</p>
                      <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                    </label>
                    {images.length > 0 && (
                      <div className="grid grid-cols-4 gap-2">
                        {images.map((img, i) => (
                          <div key={i} className="relative group">
                            <img src={img.data || img} alt={img.name} className="w-full h-20 object-cover rounded" />
                            <button
                              onClick={() => setImages(images.filter((_, idx) => idx !== i))}
                              className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center rounded transition"
                            >
                              <i className="fa-solid fa-trash text-white"></i>
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* ปุ่มบันทึก */}
                  <div className="flex gap-4 pt-6 border-t">
                    <button
                      onClick={saveForm}
                      className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition"
                    >
                      <i className="fa-solid fa-save mr-2"></i> บันทึก
                    </button>
                    <button
                      onClick={() => {
                        const draftKey = `draft_${selectedStudent.studentNo}`;
                        localStorage.removeItem(draftKey);
                        setView("list");
                        setSelectedStudent(null);
                      }}
                      className="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-lg transition"
                    >
                      <i className="fa-solid fa-times mr-2"></i> ยกเลิก
                    </button>
                  </div>
                </div>
              </div>
            )}

            {view === "report" && (
              <div className="max-w-4xl mx-auto">
                <h2 className="text-3xl font-bold text-slate-800 mb-8">สร้างรายงาน</h2>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                  <button
                    onClick={() => generateReport("single")}
                    className="glass-card p-6 hover:shadow-lg transition text-center"
                  >
                    <i className="fa-solid fa-file text-3xl text-blue-600 mb-4 block"></i>
                    <h3 className="font-bold text-slate-800 mb-2">รายงานคนเดียว</h3>
                    <p className="text-sm text-slate-500">ส่งออกรายงานเฉพาะที่เลือก</p>
                  </button>

                  <button
                    onClick={() => setShowReportModal(true)}
                    className="glass-card p-6 hover:shadow-lg transition text-center"
                  >
                    <i className="fa-solid fa-files text-3xl text-amber-600 mb-4 block"></i>
                    <h3 className="font-bold text-slate-800 mb-2">รายงานแบบเลือก</h3>
                    <p className="text-sm text-slate-500">เลือกหลายคน ({selectedForReport.size})</p>
                  </button>

                  <button
                    onClick={() => generateReport("all")}
                    className="glass-card p-6 hover:shadow-lg transition text-center"
                  >
                    <i className="fa-solid fa-book text-3xl text-emerald-600 mb-4 block"></i>
                    <h3 className="font-bold text-slate-800 mb-2">รายงานทั้งหมด</h3>
                    <p className="text-sm text-slate-500">ส่งออกทั้ง {students.length} คน</p>
                  </button>
                </div>

                {/* เลือกนักเรียน */}
                <h3 className="text-lg font-bold text-slate-800 mb-4">เลือกนักเรียน</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {students.map((s) => (
                    <div
                      key={s.studentNo}
                      onClick={() => {
                        const newSet = new Set(selectedForReport);
                        if (newSet.has(s.studentNo)) {
                          newSet.delete(s.studentNo);
                        } else {
                          newSet.add(s.studentNo);
                        }
                        setSelectedForReport(newSet);
                      }}
                      className={`glass-card p-4 cursor-pointer transition ${selectedForReport.has(s.studentNo) ? "bg-blue-50 border-blue-500 border-2" : "hover:shadow-lg"}`}
                    >
                      <input type="checkbox" checked={selectedForReport.has(s.studentNo)} readOnly className="mr-2" />
                      <label className="cursor-pointer">
                        <p className="font-bold text-slate-800">{s.studentNo} - {s.studentName}</p>
                        <p className="text-sm text-slate-500">{s.nickname || "-"}</p>
                      </label>
                    </div>
                  ))}
                </div>

                {showReportModal && (
                  <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                    <div className="bg-white rounded-lg p-8 max-w-md">
                      <h3 className="text-lg font-bold mb-4">เลือก {selectedForReport.size} คน</h3>
                      <div className="space-y-2 mb-6">
                        <button
                          onClick={() => {
                            generateReport("selected");
                            setShowReportModal(false);
                          }}
                          className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded"
                        >
                          สร้างรายงาน
                        </button>
                        <button
                          onClick={() => setShowReportModal(false)}
                          className="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 rounded"
                        >
                          ยกเลิก
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<DashboardApp />);
  </script>
</body>
</html>
