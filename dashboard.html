<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ระบบเยี่ยมบ้านนักเรียนอัจฉริยะ</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; color: #334155; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f8fafc; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .slide-up { animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .glass-card { 
      background: #ffffff; 
      border: 1px solid rgba(226, 232, 240, 0.8); 
      box-shadow: 0 4px 20px -2px rgba(15, 23, 42, 0.03), 0 0 3px rgba(15, 23, 42, 0.02);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      box-shadow: 0 12px 30px -4px rgba(15, 23, 42, 0.06), 0 4px 6px -2px rgba(15, 23, 42, 0.02);
      transform: translateY(-2px);
      border-color: rgba(148, 163, 184, 0.3);
    }

    .luxury-input {
      background-color: #f8fafc;
      border: 1.5px solid #e2e8f0;
      transition: all 0.25s ease;
    }
    .luxury-input:focus {
      background-color: #ffffff;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    
    #pdf-report-container { 
      position: fixed; left: 0; top: 0; width: 794px; background: white; padding: 40px; 
      font-family: 'Sarabun', sans-serif; color: #000; z-index: -9999; visibility: hidden; pointer-events: none;
    }
    #pdf-report-container.pdf-rendering { visibility: visible; z-index: -1; }
    .pdf-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
    .pdf-table th, .pdf-table td { border: 1px solid #333; padding: 8px 10px; text-align: left; vertical-align: top; }
    .pdf-table th { background-color: #e8f0fe; font-weight: bold; color: #1e3a8a; }
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .hide-scroll { scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="h-screen overflow-hidden text-slate-700 bg-slate-50">
  <div id="root" class="h-full w-full"></div>
  <div id="pdf-report-container"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ✅ Google Apps Script URL (NEW)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJRvQg1NVTXB_u4wnOwzRV4axFwZdb4QahJOQyW8moEH2uxGwbYnBSXWkT2LTNJ8qx/exec";

    const api = {
      async get(action, params = {}) {
        const q = new URLSearchParams({ action, t: Date.now(), ...params }).toString();
        try { const r = await fetch(`${SCRIPT_URL}?${q}`); return await r.json(); } 
        catch { return { success: false, message: "เชื่อมต่อขัดข้อง" }; }
      },
      async post(body) {
        try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" } }); return await r.json(); } 
        catch { return { success: false, message: "เชื่อมต่อขัดข้อง" }; }
      }
    };

    const SCHOOL_LAT = 18.862105; const SCHOOL_LON = 99.0872654;
    const HOUSE_COND = ["ดีมาก","ดี","ปานกลาง","ทรุดโทรม","ไม่ปลอดภัย"];
    const REL_OPTS = ["อบอุ่นดีมาก","อบอุ่นดี","ปานกลาง","ไม่ค่อยอบอุ่น","มีปัญหา"];
    const VISIT_STAT = ["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"];
    const RESULT_OPTS = ["ปกติ","ต้องเฝ้าระวัง","ต้องช่วยเหลือเร่งด่วน","ส่งต่อ"];

    const getVal = (obj, ...keys) => {
      if (!obj) return '';
      const objKeys = Object.keys(obj);
      for (let key of keys) {
        const foundKey = objKeys.find(k => String(k).trim().toLowerCase() === String(key).trim().toLowerCase());
        if (foundKey && obj[foundKey] !== undefined && obj[foundKey] !== null) return String(obj[foundKey]).trim();
      }
      return '';
    };

    const findVisitForStudent = (visits, studentName) => {
      if (!visits || !studentName) return null;
      const target = String(studentName).trim().toLowerCase();
      return visits.find(v => {
        const name = (getVal(v, 'studentName', 'studentname') || '').trim().toLowerCase();
        return name === target;
      });
    };

    const getVisitStatus = (visits, studentName) => {
      const v = findVisitForStudent(visits, studentName);
      if (!v) return "ยังไม่เยี่ยม";
      return getVal(v, 'visitStatus', 'visitstatus') || "ยังไม่เยี่ยม";
    };

    const FormInput = ({ label, type="text", value, onChange, placeholder="", disabled=false, action=null }) => (
      <div className="mb-6">
        <div className="flex items-center justify-between mb-2">
          <label className="block text-sm font-semibold text-slate-600 ml-1">{label}</label>
          {action && <button onClick={action.onClick} disabled={action.loading} className="text-xs font-bold text-blue-600 hover:text-blue-700 disabled:opacity-50"><i className={`fa-solid fa-location-dot mr-1 ${action.loading ? 'fa-spin' : ''}`}></i>{action.label}</button>}
        </div>
        <input type={type} value={value || ""} onChange={onChange} className="w-full luxury-input rounded-2xl px-5 py-3.5 outline-none font-medium text-slate-700" placeholder={placeholder} disabled={disabled}/>
      </div>
    );
    
    const FormSelect = ({ label, value, onChange, options }) => (
      <div className="mb-6">
        <label className="block text-sm font-semibold text-slate-600 mb-2 ml-1">{label}</label>
        <select value={value || ""} onChange={onChange} className="w-full luxury-input rounded-2xl px-5 py-3.5 outline-none font-medium text-slate-700 cursor-pointer appearance-none">
          <option value="">-- กรุณาเลือก --</option>
          {options.map(o=><option key={o} value={o}>{o}</option>)}
        </select>
      </div>
    );
    
    const FormTextarea = ({ label, value, onChange, rows=3 }) => (
      <div className="mb-6">
        <label className="block text-sm font-semibold text-slate-600 mb-2 ml-1">{label}</label>
        <textarea rows={rows} value={value || ""} onChange={onChange} className="w-full luxury-input rounded-2xl px-5 py-3.5 outline-none font-medium text-slate-700 resize-y"/>
      </div>
    );

    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, [onClose]);
      const isSuccess = type === 'success';
      return (
        <div className={`fixed top-6 right-6 z-[100] px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 slide-up bg-white/95 backdrop-blur-xl border ${isSuccess ? 'border-emerald-100' : 'border-rose-100'}`}>
          <div className={`w-10 h-10 rounded-full flex items-center justify-center ${isSuccess ? 'bg-emerald-100 text-emerald-500' : 'bg-rose-100 text-rose-500'}`}>
            <i className={`fa-solid ${isSuccess ? 'fa-check' : 'fa-xmark'} text-lg`}></i>
          </div>
          <span className="font-semibold text-slate-700">{msg}</span>
        </div>
      );
    };

    const CodeInputModal = ({ onSubmit, loading }) => {
      const [code, setCode] = useState("");
      const [error, setError] = useState("");

      const handleSubmit = () => {
        if (code.length !== 4 || !/^\d+$/.test(code)) {
          setError("กรุณากรอกรหัสสี่ตัว (ตัวเลขเท่านั้น)");
          return;
        }
        onSubmit(code);
      };

      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
          <div className="bg-white rounded-3xl p-8 w-96 shadow-2xl animate-[slideUp_0.4s_ease-out]">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i className="fa-solid fa-badge text-2xl text-white"></i>
              </div>
              <h2 className="text-2xl font-bold text-slate-800">กรอกรหัสครู</h2>
              <p className="text-sm text-slate-500 mt-2">4 ตัวเลขเพื่อเข้าใช้งาน</p>
            </div>

            <div className="mb-6">
              <input
                type="password"
                value={code}
                onChange={e => { setCode(e.target.value.slice(0, 4)); setError(""); }}
                maxLength="4"
                inputMode="numeric"
                className="w-full text-center text-4xl font-bold tracking-widest luxury-input rounded-2xl px-5 py-4 outline-none"
                placeholder="• • • •"
                disabled={loading}
                onKeyPress={e => e.key === "Enter" && handleSubmit()}
              />
            </div>

            {error && (
              <div className="bg-rose-50 text-rose-600 px-4 py-3 rounded-xl text-sm font-bold text-center mb-4 border border-rose-100">
                <i className="fa-solid fa-circle-exclamation mr-2"></i>{error}
              </div>
            )}

            <button
              onClick={handleSubmit}
              disabled={loading || code.length !== 4}
              className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 rounded-2xl shadow-lg shadow-blue-500/30 transition-all disabled:opacity-50"
            >
              {loading ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-arrow-right mr-2"></i>}
              เข้าใช้งาน
            </button>
          </div>
        </div>
      );
    };

    function DashboardApp() {
      const [user, setUser] = useState(null);
      const [teacherCode, setTeacherCode] = useState("");
      const [showCodeInput, setShowCodeInput] = useState(false);
      const [codeLoading, setCodeLoading] = useState(false);
      const [view, setView] = useState("list"); 
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [toast, setToast] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      const [globalStudents, setGlobalStudents] = useState([]);
      const [globalVisits, setGlobalVisits] = useState([]);
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [gpsLoading, setGpsLoading] = useState(false);
      const [formData, setFormData] = useState({});
      const [images, setImages] = useState([]);
      const [draftSaved, setDraftSaved] = useState(false);
      const [selectedForReport, setSelectedForReport] = useState(new Set());
      const [showReportModal, setShowReportModal] = useState(false);
      const draftTimer = useRef(null);

      useEffect(() => {
        const handleResize = () => {
          const mobile = window.innerWidth < 768;
          setIsMobile(mobile);
          setIsSidebarOpen(!mobile);
        };
        window.addEventListener('resize', handleResize);
        handleResize();
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        const savedCode = localStorage.getItem("hv_teacher_code");
        const savedUser = localStorage.getItem("hv_user");
        
        if (savedCode && savedUser) {
          const u = JSON.parse(savedUser);
          setUser(u);
          setTeacherCode(savedCode);
          setShowCodeInput(false);
          fetchInitialData(u);
        } else {
          setShowCodeInput(true);
        }
      }, []);

      // ✅ Auto-Draft Save
      useEffect(() => {
        if (!selectedStudent || !formData.studentNo) return;
        clearTimeout(draftTimer.current);
        draftTimer.current = setTimeout(() => {
          const draftKey = `draft_${selectedStudent.studentNo}`;
          localStorage.setItem(draftKey, JSON.stringify({ ...formData, images }));
          setDraftSaved(true);
          setTimeout(() => setDraftSaved(false), 2000);
        }, 1000);
        return () => clearTimeout(draftTimer.current);
      }, [formData, selectedStudent, images]);

      const handleCodeSubmit = async (code) => {
        setCodeLoading(true);
        try {
          const res = await api.post({ action: "getTeacherByCode", code });
          
          if (res.success && res.data) {
            const userData = {
              code: code,
              fullName: res.data.fullName,
              classLevel: res.data.classLevel,
              username: res.data.username
            };
            
            localStorage.setItem("hv_teacher_code", code);
            localStorage.setItem("hv_user", JSON.stringify(userData));
            
            setUser(userData);
            setTeacherCode(code);
            setShowCodeInput(false);
            showToast(`👋 ยินดีต้อนรับ ${res.data.fullName}`, "success");
            fetchInitialData(userData);
          } else {
            showToast("❌ รหัสครูไม่ถูกต้อง", "error");
          }
        } catch (err) {
          showToast("❌ " + err.message, "error");
        }
        setCodeLoading(false);
      };

      const fetchInitialData = async (u) => {
        setIsDataLoaded(false);
        try {
          const [sRes, vRes] = await Promise.all([
            api.get("getStudents", { classLevel: u.classLevel }),
            api.get("getVisitsFull", { classLevel: u.classLevel })
          ]);
          
          setGlobalStudents(sRes.success && sRes.data ? sRes.data : []);
          setGlobalVisits(vRes.success && vRes.data ? vRes.data : []);
          setIsDataLoaded(true);
        } catch (e) {
          console.error("API Error:", e);
          setGlobalStudents([]);
          setGlobalVisits([]);
          setIsDataLoaded(true);
          showToast("⚠️ ไม่สามารถโหลดข้อมูล", "error");
        }
      };

      const handleChange = (k, v) => setFormData(prev => ({ ...prev, [k]: v }));

      const getGPS = () => {
        setGpsLoading(true);
        if ("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const R = 6371; 
              const dLat = (SCHOOL_LAT - pos.coords.latitude) * Math.PI / 180; 
              const dLon = (SCHOOL_LON - pos.coords.longitude) * Math.PI / 180;
              const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(pos.coords.latitude * Math.PI / 180) * Math.cos(SCHOOL_LAT * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
              const dist = (R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)))).toFixed(2);
              handleChange("distanceKm", dist);
              setGpsLoading(false);
              showToast(`✅ ดึงพิกัดสำเร็จ (${dist} กม.)`, "success");
            },
            (err) => { setGpsLoading(false); showToast("❌ ไม่สามารถดึงตำแหน่ง GPS", "error"); },
            { enableHighAccuracy: true, timeout: 10000 }
          );
        } else { setGpsLoading(false); showToast("❌ เบราว์เซอร์ไม่รองรับ GPS", "error"); }
      };

      const openStudent = (student) => {
        const draftKey = `draft_${student.studentNo}`;
        const draft = localStorage.getItem(draftKey);
        
        if (draft) {
          const { images: draftImages, ...draftForm } = JSON.parse(draft);
          setFormData(draftForm);
          setImages(draftImages || []);
        } else {
          setFormData({
            studentNo: student.studentNo,
            studentName: student.studentName,
            nickname: student.nickname,
            semester: "1",
            visitStatus: "เยี่ยมแล้ว",
            visitDate: new Date().toISOString().split("T")[0],
            observations: "",
            houseType: "",
            distanceKm: "",
            travelMethod: "",
            houseCondition: "",
            utilities: "",
            environment: "",
            familyMembers: "",
            siblings: "",
            familyRelationship: "",
            familyIncome: "",
            studentDuties: "",
            familyActivities: "",
            riskHealth: "",
            riskSafety: "",
            riskTravel: "",
            riskWork: "",
            riskSocial: "",
            riskSubstance: "",
            parentConcerns: "",
            visitResult: "",
            teacherNotes: "",
          });
          setImages([]);
        }
        
        setSelectedStudent(student);
        setView("form");
      };

      const saveForm = async () => {
        const data = {
          ...formData,
          teacherUsername: user.username,
          teacherName: user.fullName,
          classLevel: user.classLevel,
          imagesBase64: images.filter(i => i && typeof i === 'string' && i.startsWith("data:")),
          existingImageUrls: images.filter(i => i && typeof i === 'string' && !i.startsWith("data:"))
        };

        const res = await api.post({ action: "saveVisit", data });
        if (res.success) {
          localStorage.removeItem(`draft_${selectedStudent.studentNo}`);
          showToast("✅ บันทึกสำเร็จ", "success");
          loadData(user);
          setView("list");
          setSelectedStudent(null);
        } else {
          showToast("❌ " + res.message, "error");
        }
      };

      const loadData = async (u) => {
        setIsDataLoaded(false);
        try {
          const [sRes, vRes] = await Promise.all([
            api.get("getStudents", { classLevel: u.classLevel }),
            api.get("getVisitsFull", { classLevel: u.classLevel })
          ]);
          setGlobalStudents(sRes.data || []);
          setGlobalVisits(vRes.data || []);
        } catch (e) {
          showToast("❌ ไม่สามารถโหลดข้อมูล", "error");
        }
        setIsDataLoaded(true);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = 800;
            canvas.height = (img.height / img.width) * 800;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            setImages([...images, canvas.toDataURL("image/jpeg", 0.8)]);
            showToast("✅ เพิ่มรูปสำเร็จ", "success");
          };
        };
        reader.readAsDataURL(file);
      };

      const generateReportHTML = (data) => {
        const date = new Date().toLocaleDateString("th-TH");
        let html = `
          <div style="font-family: 'Sarabun', sans-serif; padding: 20px;">
            <h2 style="text-align: center; border-bottom: 3px solid #3b82f6; padding-bottom: 10px; color: #1e40af;">
              รายงานผลการเยี่ยมบ้านนักเรียน
            </h2>
            <p style="text-align: center; color: #666; margin: 10px 0; font-size: 14px;">
              โรงเรียนป่าก้าง | วันที่ ${date} | ครู: ${user.fullName} | ชั้น: ${user.classLevel}
            </p>
        `;

        data.forEach((item, idx) => {
          const visitDate = item.visitDate ? new Date(item.visitDate).toLocaleDateString("th-TH") : "-";
          html += `
            <div style="page-break-inside: avoid; border: 2px solid #3b82f6; padding: 15px; margin: 15px 0; border-radius: 8px; background: #f0f9ff;">
              <h3 style="color: #1e40af; margin: 0 0 10px 0; border-bottom: 2px solid #3b82f6; padding-bottom: 5px;">
                ${idx + 1}. ${item.studentNo} - ${item.studentName}
              </h3>
              <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
                <tr style="background: #e0e7ff;">
                  <td style="padding: 8px; border: 1px solid #3b82f6; font-weight: bold; width: 35%;">ข้อมูล</td>
                  <td style="padding: 8px; border: 1px solid #3b82f6;">รายละเอียด</td>
                </tr>
                <tr><td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">ชื่อเล่น</td><td style="padding: 8px; border: 1px solid #ddd;">${item.nickname || "-"}</td></tr>
                <tr><td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">วันที่เยี่ยม</td><td style="padding: 8px; border: 1px solid #ddd;">${visitDate}</td></tr>
                <tr><td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">สถานะ</td><td style="padding: 8px; border: 1px solid #ddd;">${item.visitStatus || "-"}</td></tr>
                <tr><td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">ระยะทาง</td><td style="padding: 8px; border: 1px solid #ddd;">${item.distanceKm || "-"} กม.</td></tr>
                <tr><td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">ลักษณะที่พัก</td><td style="padding: 8px; border: 1px solid #ddd;">${item.houseType || "-"}</td></tr>
                <tr><td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">สภาพบ้าน</td><td style="padding: 8px; border: 1px solid #ddd;">${item.houseCondition || "-"}</td></tr>
                <tr><td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">ความเห็นครู</td><td style="padding: 8px; border: 1px solid #ddd;">${item.visitResult || "-"}</td></tr>
                <tr><td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">หมายเหตุ</td><td style="padding: 8px; border: 1px solid #ddd;">${(item.teacherNotes || "-").substring(0, 100)}</td></tr>
              </table>
            </div>
          `;
        });

        html += `</div>`;
        return html;
      };

      const generateReport = async (type) => {
        let reportData = [];

        if (type === "single" && selectedStudent) {
          const visit = globalVisits.find(v => v.studentName === selectedStudent.studentName);
          reportData = [{ ...selectedStudent, ...visit }];
        } else if (type === "selected") {
          reportData = globalStudents
            .filter(s => selectedForReport.has(s.studentNo))
            .map(s => ({ ...s, ...globalVisits.find(v => v.studentName === s.studentName) }));
        } else {
          reportData = globalStudents.map(s => ({ ...s, ...globalVisits.find(v => v.studentName === s.studentName) }));
        }

        if (reportData.length === 0) {
          showToast("⚠️ ไม่มีข้อมูลที่เลือก", "error");
          return;
        }

        const html = generateReportHTML(reportData);
        const element = document.createElement("div");
        element.innerHTML = html;
        
        const opt = {
          margin: 10,
          filename: `report_${type}_${new Date().toISOString().split("T")[0]}.pdf`,
          image: { type: "jpeg", quality: 0.95 },
          html2canvas: { scale: 2 },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
        };

        html2pdf().set(opt).from(element).save();
        showToast("✅ ดาวน์โหลดรายงานเสร็จ", "success");
        setShowReportModal(false);
      };

      const showToast = (msg, type = "success") => setToast({msg, type});
      const logout = () => {
        localStorage.removeItem("hv_teacher_code");
        localStorage.removeItem("hv_user");
        setUser(null);
        setTeacherCode("");
        setShowCodeInput(true);
      };

      if (showCodeInput) {
        return <CodeInputModal onSubmit={handleCodeSubmit} loading={codeLoading} />;
      }

      if (!user) return <div className="flex items-center justify-center h-screen"><div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div></div>;

      return (
        <div className="flex h-full w-full bg-[#f8fafc] text-slate-700 font-sans fade-in selection:bg-blue-100 selection:text-blue-900">
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          {isMobile && isSidebarOpen && <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 fade-in" onClick={() => setIsSidebarOpen(false)}></div>}

          {/* SIDEBAR */}
          <aside className={`fixed md:relative z-50 bg-white border-r border-slate-100 flex flex-col h-full flex-shrink-0 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0 w-[260px]' : '-translate-x-full md:translate-x-0 md:w-[88px]'} shadow-[4px_0_24px_rgba(0,0,0,0.02)]`}>
            <div className="p-6 flex flex-col items-center border-b border-slate-50">
              <div className={`rounded-full p-1 mb-3 bg-gradient-to-tr from-blue-100 to-indigo-50 transition-all duration-300 ${isSidebarOpen ? 'w-20 h-20' : 'w-12 h-12'}`}>
                <img src={`https://ui-avatars.com/api/?name=${user.fullName}&background=ffffff&color=2563EB&bold=true`} className="w-full h-full rounded-full object-cover shadow-sm border-2 border-white" />
              </div>
              {isSidebarOpen && (
                <div className="fade-in text-center">
                  <h2 className="text-base font-bold text-slate-800">{user.fullName}</h2>
                  <p className="text-xs text-slate-500 font-medium mt-1">รหัส: {teacherCode}</p>
                  <p className="text-xs text-slate-400 mt-0.5">ชั้น: {user.classLevel}</p>
                </div>
              )}
            </div>
            
            <div className="p-4 flex-1 overflow-y-auto custom-scroll space-y-2">
              <button
                onClick={() => {setView("list"); setSelectedStudent(null); if(isMobile) setIsSidebarOpen(false);}}
                className={`w-full flex items-center rounded-2xl transition-all duration-200 font-medium group ${view === "list" ? "bg-blue-50 text-blue-600" : "text-slate-500 hover:bg-slate-50"} ${isSidebarOpen ? 'justify-start px-4 py-3.5' : 'justify-center py-4'}`}
              >
                <i className={`fa-solid fa-house-user ${isSidebarOpen ? 'mr-3 text-lg' : 'text-xl'}`}></i>
                {isSidebarOpen && <span>บันทึกเยี่ยมบ้าน</span>}
              </button>
              <button
                onClick={() => {setView("report"); setSelectedStudent(null); if(isMobile) setIsSidebarOpen(false);}}
                className={`w-full flex items-center rounded-2xl transition-all duration-200 font-medium group ${view === "report" ? "bg-emerald-50 text-emerald-600" : "text-slate-500 hover:bg-slate-50"} ${isSidebarOpen ? 'justify-start px-4 py-3.5' : 'justify-center py-4'}`}
              >
                <i className={`fa-solid fa-file-pdf ${isSidebarOpen ? 'mr-3 text-lg' : 'text-xl'}`}></i>
                {isSidebarOpen && <span>รายงาน</span>}
              </button>
            </div>
            
            <div className="p-4 border-t border-slate-50">
              <button onClick={logout} className={`w-full flex items-center justify-center gap-3 py-3 rounded-2xl font-medium transition-all text-slate-500 hover:bg-rose-50 hover:text-rose-600 ${isSidebarOpen ? 'px-4' : 'px-0'}`}>
                <i className="fa-solid fa-arrow-right-from-bracket"></i>
                {isSidebarOpen && <span>เปลี่ยนรหัส</span>}
              </button>
            </div>
          </aside>

          {/* MAIN */}
          <main className="flex-1 flex flex-col h-full overflow-hidden relative">
            <header className="h-20 bg-white/80 backdrop-blur-xl border-b border-slate-100/50 px-6 flex items-center justify-between z-20 flex-shrink-0">
              <div className="flex items-center gap-4">
                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="w-10 h-10 rounded-xl hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors">
                  <i className="fa-solid fa-bars text-lg"></i>
                </button>
                <div>
                  <h1 className="text-xl font-bold text-slate-800 tracking-tight">ระบบเยี่ยมบ้านอัจฉริยะ</h1>
                  <p className="text-xs text-slate-400 font-medium hidden sm:block mt-0.5">โรงเรียนป่าก้าง</p>
                </div>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scroll relative">
              <div className="max-w-6xl mx-auto pb-20">
                {view === "list" && (
                  <div className="slide-up">
                    <h2 className="text-3xl font-bold text-slate-800 mb-8">รายชื่อนักเรียน</h2>

                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 stagger-1">
                      <div className="glass-card p-6 rounded-[2rem]"><p className="text-slate-400 font-medium text-sm mb-1">รวมทั้งหมด</p><h3 className="text-4xl font-bold text-blue-600">{globalStudents.length}</h3></div>
                      <div className="glass-card p-6 rounded-[2rem]"><p className="text-slate-400 font-medium text-sm mb-1">เยี่ยมแล้ว</p><h3 className="text-4xl font-bold text-emerald-600">{globalVisits.filter(v => v.visitStatus === "เยี่ยมแล้ว").length}</h3></div>
                      <div className="glass-card p-6 rounded-[2rem]"><p className="text-slate-400 font-medium text-sm mb-1">ยังไม่เยี่ยม</p><h3 className="text-4xl font-bold text-amber-500">{globalStudents.length - globalVisits.filter(v => v.visitStatus === "เยี่ยมแล้ว").length}</h3></div>
                    </div>

                    {!isDataLoaded && <div className="text-center py-32 fade-in"><div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div></div>}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 stagger-3">
                      {isDataLoaded && globalStudents.length === 0 && <div className="col-span-full text-center py-16"><p className="text-slate-400 font-medium">ไม่มีข้อมูลนักเรียน</p></div>}
                      
                      {globalStudents.map((s, i) => {
                        const status = getVisitStatus(globalVisits, s.studentName);
                        const isDone = status === "เยี่ยมแล้ว";
                        return (
                          <div key={i} onClick={() => openStudent(s)} className="glass-card p-5 rounded-[1.5rem] cursor-pointer group fade-in flex flex-col justify-between" style={{animationDelay: `${(i%10)*0.05}s`}}>
                            <div className="flex items-start gap-4 mb-4">
                              <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-lg flex-shrink-0 transition-colors ${isDone ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500 group-hover:bg-blue-50 group-hover:text-blue-600'}`}>{s.studentNo}</div>
                              <div className="overflow-hidden pt-1">
                                <h4 className="font-bold text-slate-800 text-base group-hover:text-blue-600 transition-colors truncate">{s.studentName}</h4>
                                <p className="text-sm text-slate-400 font-medium truncate mt-0.5">{s.nickname ? `${s.nickname}` : '\u00A0'}</p>
                              </div>
                            </div>
                            <div className="flex items-center justify-between pt-4 border-t border-slate-100/80">
                              <div className="text-xs font-semibold">
                                {isDone ? <span className="text-emerald-500 bg-emerald-50 px-3 py-1.5 rounded-lg"><i className="fa-solid fa-check mr-1"></i>เยี่ยมแล้ว</span> : <span className="text-slate-400 bg-slate-50 px-3 py-1.5 rounded-lg">ยังไม่เยี่ยม</span>}
                              </div>
                              <div className="w-8 h-8 rounded-full flex items-center justify-center text-slate-300 group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors"><i className="fa-solid fa-chevron-right text-sm"></i></div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {view === "form" && selectedStudent && (
                  <div className="slide-up max-w-4xl mx-auto">
                    <div className="flex items-center gap-4 mb-8">
                      <button onClick={() => { setView("list"); setSelectedStudent(null); }} className="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors shadow-sm"><i className="fa-solid fa-arrow-left"></i></button>
                      <div><h2 className="text-2xl font-bold text-slate-800 tracking-tight">{selectedStudent.studentName}</h2><p className="text-sm text-slate-500 mt-1 font-medium">เลขที่ {selectedStudent.studentNo}</p></div>
                      {draftSaved && <span className="ml-auto text-xs font-semibold bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg"><i className="fa-solid fa-cloud-check mr-1"></i>บันทึกแล้ว</span>}
                    </div>

                    <div className="glass-card p-8 rounded-[2.5rem] space-y-8 max-h-[70vh] overflow-y-auto custom-scroll">
                      {/* ข้อมูลเบื้องต้น */}
                      <div>
                        <h3 className="text-lg font-bold text-slate-800 mb-6 pb-3 border-b-2 border-blue-200"><i className="fa-solid fa-circle-info text-blue-600 mr-2"></i>ข้อมูลเบื้องต้น</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <FormSelect label="ภาคเรียน" value={formData.semester || "1"} onChange={e=>handleChange("semester", e.target.value)} options={["1","2"]}/>
                          <FormInput label="วันที่เยี่ยม" type="date" value={formData.visitDate} onChange={e=>handleChange("visitDate", e.target.value)}/>
                          <div className="md:col-span-2"><FormSelect label="สถานะการเยี่ยม" value={formData.visitStatus} onChange={e=>handleChange("visitStatus", e.target.value)} options={VISIT_STAT}/></div>
                          <FormTextarea label="หมายเหตุเบื้องต้น" value={formData.observations} onChange={e=>handleChange("observations", e.target.value)} rows={2}/>
                        </div>
                      </div>

                      {/* ที่พัก */}
                      <div>
                        <h3 className="text-lg font-bold text-slate-800 mb-6 pb-3 border-b-2 border-blue-200"><i className="fa-solid fa-house text-blue-600 mr-2"></i>ข้อมูลที่พัก & GPS</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <FormInput label="ลักษณะที่พัก" value={formData.houseType} onChange={e=>handleChange("houseType", e.target.value)} placeholder="เช่น บ้านไม้, บ้านอิฐ"/>
                          <FormInput label="ระยะทาง (กม.)" type="number" value={formData.distanceKm} onChange={e=>handleChange("distanceKm", e.target.value)} action={{label: "ดึง GPS", onClick: getGPS, loading: gpsLoading}}/>
                          <FormInput label="วิธีเดินทาง" value={formData.travelMethod} onChange={e=>handleChange("travelMethod", e.target.value)} placeholder="เช่น เดินทาง, รถมอเตอร์ไซค์"/>
                          <FormSelect label="สภาพบ้าน" value={formData.houseCondition} onChange={e=>handleChange("houseCondition", e.target.value)} options={HOUSE_COND}/>
                          <FormInput label="สิ่งอำนวยความสะดวก" value={formData.utilities} onChange={e=>handleChange("utilities", e.target.value)} placeholder="เช่น ไฟฟ้า, น้ำ"/>
                          <FormInput label="สภาพแวดล้อม" value={formData.environment} onChange={e=>handleChange("environment", e.target.value)} placeholder="เช่น สะอาด, โล่งแจ้ง"/>
                        </div>
                      </div>

                      {/* ครอบครัว */}
                      <div>
                        <h3 className="text-lg font-bold text-slate-800 mb-6 pb-3 border-b-2 border-blue-200"><i className="fa-solid fa-people-line text-blue-600 mr-2"></i>ข้อมูลครอบครัว</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <FormInput label="จำนวนสมาชิก" type="number" value={formData.familyMembers} onChange={e=>handleChange("familyMembers", e.target.value)}/>
                          <FormInput label="จำนวนพี่น้อง" type="number" value={formData.siblings} onChange={e=>handleChange("siblings", e.target.value)}/>
                          <FormSelect label="ความสัมพันธ์" value={formData.familyRelationship} onChange={e=>handleChange("familyRelationship", e.target.value)} options={REL_OPTS}/>
                          <FormInput label="รายได้ครอบครัว" value={formData.familyIncome} onChange={e=>handleChange("familyIncome", e.target.value)}/>
                          <FormTextarea label="หน้าที่ของนักเรียน" value={formData.studentDuties} onChange={e=>handleChange("studentDuties", e.target.value)} rows={2}/>
                          <FormTextarea label="กิจกรรมครอบครัว" value={formData.familyActivities} onChange={e=>handleChange("familyActivities", e.target.value)} rows={2}/>
                        </div>
                      </div>

                      {/* ความเสี่ยง */}
                      <div>
                        <h3 className="text-lg font-bold text-slate-800 mb-6 pb-3 border-b-2 border-blue-200"><i className="fa-solid fa-warning text-blue-600 mr-2"></i>ความเสี่ยง</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <FormInput label="ด้านสุขภาพ" value={formData.riskHealth} onChange={e=>handleChange("riskHealth", e.target.value)}/>
                          <FormInput label="ด้านความปลอดภัย" value={formData.riskSafety} onChange={e=>handleChange("riskSafety", e.target.value)}/>
                          <FormInput label="ด้านการเดินทาง" value={formData.riskTravel} onChange={e=>handleChange("riskTravel", e.target.value)}/>
                          <FormInput label="ด้านการทำงาน" value={formData.riskWork} onChange={e=>handleChange("riskWork", e.target.value)}/>
                          <FormInput label="ด้านสังคม" value={formData.riskSocial} onChange={e=>handleChange("riskSocial", e.target.value)}/>
                          <FormInput label="ด้านสารเสพติด" value={formData.riskSubstance} onChange={e=>handleChange("riskSubstance", e.target.value)}/>
                        </div>
                      </div>

                      {/* บันทึกครู */}
                      <div>
                        <h3 className="text-lg font-bold text-slate-800 mb-6 pb-3 border-b-2 border-blue-200"><i className="fa-solid fa-note text-blue-600 mr-2"></i>บันทึกเพิ่มเติม</h3>
                        <FormSelect label="ความเห็นของครู" value={formData.visitResult} onChange={e=>handleChange("visitResult", e.target.value)} options={RESULT_OPTS}/>
                        <FormInput label="ความเป็นห่วง" value={formData.parentConcerns} onChange={e=>handleChange("parentConcerns", e.target.value)}/>
                        <FormTextarea label="หมายเหตุโดยละเอียด" value={formData.teacherNotes} onChange={e=>handleChange("teacherNotes", e.target.value)} rows={4}/>
                      </div>

                      {/* รูปภาพ */}
                      <div>
                        <h3 className="text-lg font-bold text-slate-800 mb-6 pb-3 border-b-2 border-blue-200"><i className="fa-solid fa-image text-blue-600 mr-2"></i>รูปภาพ</h3>
                        <label className="border-2 border-dashed border-blue-300 rounded-2xl p-8 text-center cursor-pointer hover:bg-blue-50 transition-all block">
                          <i className="fa-solid fa-cloud-arrow-up text-4xl text-blue-500 mb-3 block"></i>
                          <p className="font-semibold text-blue-600 mb-1">คลิกเพื่ออัปโหลดรูป</p>
                          <p className="text-xs text-slate-500">รองรับ JPG, PNG (สูงสุด 8 MB)</p>
                          <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                        </label>
                        {images.length > 0 && (
                          <div className="grid grid-cols-4 gap-3 mt-6">
                            {images.map((img, i) => (
                              <div key={i} className="relative group">
                                <img src={img} alt={`img-${i}`} className="w-full h-24 object-cover rounded-lg shadow-sm" />
                                <button onClick={() => setImages(images.filter((_, idx) => idx !== i))} className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center rounded-lg transition"><i className="fa-solid fa-trash text-white text-lg"></i></button>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>

                      {/* ปุ่มบันทึก */}
                      <div className="flex gap-4 pt-6 border-t-2 border-slate-100">
                        <button onClick={saveForm} className="flex-1 bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-500/30 transition-all"><i className="fa-solid fa-save mr-2"></i>บันทึก</button>
                        <button onClick={() => {setView("list"); setSelectedStudent(null);}} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl transition-all"><i className="fa-solid fa-times mr-2"></i>ยกเลิก</button>
                      </div>
                    </div>
                  </div>
                )}

                {view === "report" && (
                  <div className="slide-up max-w-4xl mx-auto">
                    <h2 className="text-3xl font-bold text-slate-800 mb-8">สร้างรายงาน</h2>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 stagger-1">
                      <button onClick={() => generateReport("all")} className="glass-card p-8 hover:shadow-lg transition text-center rounded-[1.5rem] group">
                        <i className="fa-solid fa-book text-4xl text-emerald-600 mb-4 block group-hover:scale-110 transition"></i>
                        <h3 className="font-bold text-slate-800 mb-2 text-lg">ทั้งหมด</h3>
                        <p className="text-sm text-slate-500">{globalStudents.length} คน</p>
                      </button>

                      <button onClick={() => selectedStudent ? generateReport("single") : showToast("⚠️ กรุณาเลือกนักเรียน", "error")} className="glass-card p-8 hover:shadow-lg transition text-center rounded-[1.5rem] group">
                        <i className="fa-solid fa-file text-4xl text-blue-600 mb-4 block group-hover:scale-110 transition"></i>
                        <h3 className="font-bold text-slate-800 mb-2 text-lg">เดี่ยว</h3>
                        <p className="text-sm text-slate-500">คนที่เลือก</p>
                      </button>

                      <button onClick={() => setShowReportModal(true)} className="glass-card p-8 hover:shadow-lg transition text-center rounded-[1.5rem] group">
                        <i className="fa-solid fa-files text-4xl text-amber-600 mb-4 block group-hover:scale-110 transition"></i>
                        <h3 className="font-bold text-slate-800 mb-2 text-lg">เลือก</h3>
                        <p className="text-sm text-slate-500">{selectedForReport.size} คน</p>
                      </button>
                    </div>

                    <h3 className="text-lg font-bold text-slate-800 mb-6">เลือกนักเรียน</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                      {globalStudents.map((s) => (
                        <div
                          key={s.studentNo}
                          onClick={() => {
                            const newSet = new Set(selectedForReport);
                            if (newSet.has(s.studentNo)) {
                              newSet.delete(s.studentNo);
                            } else {
                              newSet.add(s.studentNo);
                            }
                            setSelectedForReport(newSet);
                          }}
                          className={`glass-card p-4 rounded-2xl cursor-pointer transition ${selectedForReport.has(s.studentNo) ? "bg-blue-50 border-2 border-blue-500" : "hover:shadow-lg"}`}
                        >
                          <input type="checkbox" checked={selectedForReport.has(s.studentNo)} readOnly className="mr-2" />
                          <label className="cursor-pointer">
                            <p className="font-bold text-slate-800">{s.studentNo} - {s.studentName}</p>
                            <p className="text-sm text-slate-500">{s.nickname || "-"}</p>
                          </label>
                        </div>
                      ))}
                    </div>

                    {showReportModal && (
                      <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                        <div className="bg-white rounded-3xl p-8 max-w-md shadow-2xl">
                          <h3 className="text-lg font-bold mb-4">ยืนยัน</h3>
                          <p className="text-slate-600 mb-6">ส่งออกรายงาน <strong>{selectedForReport.size} คน</strong> ใช่หรือไม่?</p>
                          <div className="flex gap-4">
                            <button onClick={() => generateReport("selected")} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition"><i className="fa-solid fa-check mr-2"></i>ตกลง</button>
                            <button onClick={() => setShowReportModal(false)} className="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl transition">ยกเลิก</button>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DashboardApp />);
  </script>
</body>
</html>
