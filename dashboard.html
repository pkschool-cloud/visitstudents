<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเยี่ยมบ้านนักเรียนอัจฉริยะ v4 (Stable)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; color: #334155; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* Smooth Animations */
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    
    /* Modern Glass UI */
    .glass-card { 
      background: #ffffff; 
      border: 1px solid rgba(226, 232, 240, 0.6); 
      box-shadow: 0 4px 15px -3px rgba(15, 23, 42, 0.03);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      box-shadow: 0 10px 25px -4px rgba(15, 23, 42, 0.06);
      transform: translateY(-2px);
      border-color: rgba(148, 163, 184, 0.2);
    }
    
    /* Inputs */
    .luxury-input {
      background-color: #f8fafc;
      border: 1.5px solid #e2e8f0;
      transition: all 0.2s ease;
    }
    .luxury-input:focus {
      background-color: #ffffff;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    
    .gradient-bg { background: linear-gradient(135deg, #eff6ff 0%, #e0e7ff 100%); }
    .code-input { letter-spacing: 0.8rem; text-align: center; font-size: 1.8rem; font-weight: 700; }
    .hide-scroll { scrollbar-width: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }

    /* Button Click Effect (หนึบมือ) */
    .btn-press { transition: transform 0.1s; }
    .btn-press:active { transform: scale(0.96); }
  </style>
</head>
<body class="h-screen overflow-hidden bg-slate-50">
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ✅ Google Apps Script URL (อัปเดตล่าสุด)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2qKrWCnBEPAW9InnV9OkOstoRAqA2OG6TdGkWWKftZJU0GdFcKq6ObP2ThicdX8_f/exec";
    
    const SCHOOL_LAT = 18.862105;
    const SCHOOL_LON = 99.0872654;
    const HOUSE_COND = ["ดีมาก","ดี","ปานกลาง","ทรุดโทรม","ไม่ปลอดภัย"];
    const REL_OPTS = ["อบอุ่นดีมาก","อบอุ่นดี","ปานกลาง","ไม่ค่อยอบอุ่น","มีปัญหา"];
    const VISIT_STAT = ["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"];
    const RESULT_OPTS = ["ปกติ","ต้องเฝ้าระวัง","ต้องช่วยเหลือเร่งด่วน","ส่งต่อ"];

    // ============= API =============
    const api = {
      async get(action, params = {}) {
        const q = new URLSearchParams({ action, t: Date.now(), ...params }).toString();
        try { const r = await fetch(`${SCRIPT_URL}?${q}`); return await r.json(); } 
        catch (e) { return { success: false, message: "เชื่อมต่อขัดข้อง: " + e.message }; }
      },
      async post(body) {
        try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" } }); return await r.json(); } 
        catch (e) { return { success: false, message: "เชื่อมต่อขัดข้อง: " + e.message }; }
      }
    };

    // ============= Helpers =============
    const getVal = (obj, ...keys) => {
      if (!obj) return '';
      const objKeys = Object.keys(obj);
      for (let key of keys) {
        const foundKey = objKeys.find(k => String(k).trim().toLowerCase() === String(key).trim().toLowerCase());
        if (foundKey && obj[foundKey] !== undefined && obj[foundKey] !== null) return String(obj[foundKey]).trim();
      }
      return '';
    };

    const findVisitForStudent = (visits, studentNo) => {
      if (!visits || !studentNo) return null;
      return visits.find(v => String(getVal(v, 'studentNo')).trim() === String(studentNo).trim());
    };

    const getVisitStatus = (visits, studentNo) => {
      const v = findVisitForStudent(visits, studentNo);
      return v ? (getVal(v, 'visitStatus') || "ยังไม่เยี่ยม") : "ยังไม่เยี่ยม";
    };

    // ============= Toast Notification =============
    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
      const styles = {
        success: 'border-emerald-200 bg-emerald-50 text-emerald-700',
        error: 'border-rose-200 bg-rose-50 text-rose-700',
        warning: 'border-amber-200 bg-amber-50 text-amber-700'
      };
      const icons = { success: 'fa-check-circle', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation' };
      
      return (
        <div className={`fixed top-6 right-6 z-[9999] px-5 py-3 rounded-2xl shadow-lg flex items-center gap-3 slide-up border ${styles[type]}`}>
          <i className={`fa-solid ${icons[type]} text-xl`}></i>
          <span className="font-bold">{msg}</span>
        </div>
      );
    };

    // ============= Full Screen Loading Overlay =============
    const LoadingOverlay = ({ text }) => (
      <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex flex-col items-center justify-center fade-in">
        <div className="bg-white p-6 rounded-3xl shadow-2xl flex flex-col items-center bounce-in">
          <div className="w-12 h-12 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-4"></div>
          <p className="text-slate-800 font-bold">{text}</p>
          <p className="text-xs text-slate-500 mt-1">กรุณารอสักครู่ ห้ามปิดหน้าต่างนี้</p>
        </div>
      </div>
    );

    // ============= Login Modal =============
    const CodeInputModal = ({ onSubmit, loading }) => {
      const [code, setCode] = useState("");
      const [previewName, setPreviewName] = useState(null);
      const [searchLoading, setSearchLoading] = useState(false);
      const searchTimer = useRef(null);

      useEffect(() => {
        if (!code) { setPreviewName(null); return; }
        clearTimeout(searchTimer.current);
        searchTimer.current = setTimeout(async () => {
          setSearchLoading(true);
          const res = await api.post({ action: "searchTeacherByPartialCode", partialCode: code });
          setSearchLoading(false);
          if (res.success && !res.multiple && res.data) setPreviewName(res.data.fullName);
          else setPreviewName(null);
        }, 300);
        return () => clearTimeout(searchTimer.current);
      }, [code]);

      return (
        <div className="fixed inset-0 gradient-bg flex items-center justify-center z-50 p-4">
          <div className="bg-white/90 backdrop-blur-xl rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl border border-white bounce-in">
            <div className="text-center mb-8">
              <div className="w-20 h-20 bg-blue-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-5 shadow-lg shadow-blue-500/30">
                <i className="fa-solid fa-house-user text-3xl text-white"></i>
              </div>
              <h2 className="text-2xl font-black text-slate-800 tracking-tight">ระบบเยี่ยมบ้าน</h2>
              <p className="text-sm font-bold text-slate-500 mt-1">โรงเรียนป่าก้าง</p>
            </div>

            <div className="mb-6 relative">
              <input
                type="password" value={code}
                onChange={e => setCode(e.target.value.replace(/[^0-9a-zA-Z]/g, ""))}
                inputMode="numeric" autoFocus
                className="w-full bg-slate-100 border-2 border-slate-200 rounded-2xl px-5 py-4 outline-none code-input focus:border-blue-500 focus:bg-white transition-colors"
                placeholder="รหัสประจำตัว"
                disabled={loading}
                onKeyPress={e => e.key === "Enter" && code && onSubmit(code)}
              />
              {searchLoading && <i className="fa-solid fa-spinner fa-spin absolute right-5 top-6 text-slate-400"></i>}
            </div>

            {previewName && !loading && (
              <div className="bg-emerald-50 border border-emerald-100 px-4 py-3 rounded-xl mb-6 slide-up text-center">
                <p className="text-emerald-700 font-bold">👋 สวัสดีคุณครู {previewName}</p>
              </div>
            )}

            <button
              onClick={() => onSubmit(code)} disabled={loading || !code}
              className="w-full bg-slate-800 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all disabled:opacity-30 btn-press flex justify-center items-center gap-2"
            >
              {loading ? <><i className="fa-solid fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...</> : <><i className="fa-solid fa-arrow-right-to-bracket"></i> เข้าใช้งาน</>}
            </button>
          </div>
        </div>
      );
    };

    // ============= Main Dashboard =============
    function DashboardApp() {
      const [user, setUser] = useState(null);
      const [showCodeInput, setShowCodeInput] = useState(true);
      const [codeLoading, setCodeLoading] = useState(false);
      const [view, setView] = useState("dashboard"); 
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [toast, setToast] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth >= 768);
      
      const [students, setStudents] = useState([]);
      const [visits, setVisits] = useState([]);
      const [stats, setStats] = useState({ total: 0, visited: 0, appointed: 0, notVisited: 0, percent: 0 });
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [isSavingSystem, setIsSavingSystem] = useState(false); // Global saving state

      const showToast = useCallback((msg, type = "success") => setToast({ msg, type }), []);

      useEffect(() => {
        const savedUser = localStorage.getItem("hv_user_v3");
        if (savedUser) {
          try {
            const u = JSON.parse(savedUser);
            setUser(u); setShowCodeInput(false); loadAllData(u);
          } catch (e) { localStorage.removeItem("hv_user_v3"); }
        }
      }, []);

      const loadAllData = async (u) => {
        if (!u) return;
        setIsDataLoaded(false);
        try {
          const [sRes, vRes, statsRes] = await Promise.all([
            api.get("getStudents", { classLevel: u.classLevel }),
            api.get("getVisitsFull", { classLevel: u.classLevel }),
            api.get("getStats", { classLevel: u.classLevel })
          ]);
          setStudents(sRes.success ? sRes.data : []);
          setVisits(vRes.success ? vRes.data : []);
          if (statsRes.success) setStats(statsRes.data);
        } catch (e) { showToast("โหลดข้อมูลล้มเหลว", "error"); }
        setIsDataLoaded(true);
      };

      const handleCodeSubmit = async (code) => {
        setCodeLoading(true);
        const res = await api.post({ action: "getTeacherByCode", code });
        setCodeLoading(false);
        if (res.success && res.data) {
          const userData = { code: res.data.code, fullName: res.data.fullName, classLevel: res.data.classLevel };
          localStorage.setItem("hv_user_v3", JSON.stringify(userData));
          setUser(userData); setShowCodeInput(false); showToast(`ยินดีต้อนรับ ครู${res.data.fullName}`, "success");
          loadAllData(userData);
        } else { showToast("รหัสไม่ถูกต้อง", "error"); }
      };

      const saveVisit = async (formData, images) => {
        setIsSavingSystem(true); // บล็อกหน้าจอ
        const data = {
          ...formData,
          teacherCode: user.code, teacherName: user.fullName, classLevel: user.classLevel,
          imagesBase64: images.filter(i => i && i.startsWith("data:")),
          existingImageUrls: images.filter(i => i && !i.startsWith("data:"))
        };

        const res = await api.post({ action: "saveVisit", data });
        
        if (res.success) {
          showToast("บันทึกข้อมูลเรียบร้อยแล้ว", "success");
          await loadAllData(user); // ดึงข้อมูลใหม่
          setView("students");
          setSelectedStudent(null);
        } else {
          showToast(res.message || "เกิดข้อผิดพลาดในการบันทึก", "error");
        }
        setIsSavingSystem(false); // ปลดบล็อก
      };

      if (showCodeInput) return <CodeInputModal onSubmit={handleCodeSubmit} loading={codeLoading} />;
      if (!user) return null;

      return (
        <div className="flex h-full w-full bg-slate-50 fade-in">
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          {isSavingSystem && <LoadingOverlay text="กำลังบันทึกและอัปโหลดรูปภาพ..." />}
          
          {window.innerWidth < 768 && isSidebarOpen && (
            <div className="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-40 fade-in" onClick={() => setIsSidebarOpen(false)}></div>
          )}

          {/* Sidebar */}
          <aside className={`fixed md:relative z-50 bg-white border-r border-slate-100 flex flex-col h-full transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0 w-[260px]' : '-translate-x-full md:translate-x-0 md:w-[88px]'}`}>
            <div className="p-6 border-b border-slate-50 flex flex-col items-center">
              <div className={`rounded-[1.5rem] bg-blue-50 p-3 mb-3 text-blue-600 ${isSidebarOpen ? 'w-16 h-16' : 'w-12 h-12'} flex items-center justify-center text-2xl`}>
                <i className="fa-solid fa-user-tie"></i>
              </div>
              {isSidebarOpen && (
                <div className="text-center fade-in">
                  <h2 className="font-bold text-slate-800">{user.fullName}</h2>
                  <p className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full mt-2">ชั้น {user.classLevel}</p>
                </div>
              )}
            </div>
            
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto hide-scroll">
              <NavBtn icon="fa-chart-pie" label="ภาพรวม" active={view === "dashboard"} open={isSidebarOpen} onClick={() => { setView("dashboard"); setIsSidebarOpen(window.innerWidth >= 768); }} />
              <NavBtn icon="fa-users" label="นักเรียน" active={view === "students"} open={isSidebarOpen} onClick={() => { setView("students"); setIsSidebarOpen(window.innerWidth >= 768); }} />
              <NavBtn icon="fa-calendar-check" label="นัดหมาย" active={view === "appointments"} open={isSidebarOpen} onClick={() => { setView("appointments"); setIsSidebarOpen(window.innerWidth >= 768); }} />
            </nav>
            
            <div className="p-4 border-t border-slate-50">
              <button onClick={() => { localStorage.removeItem("hv_user_v3"); window.location.reload(); }} className={`w-full flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-rose-500 hover:bg-rose-50 btn-press ${isSidebarOpen ? '' : 'px-0'}`}>
                <i className="fa-solid fa-power-off"></i> {isSidebarOpen && "ออกจากระบบ"}
              </button>
            </div>
          </aside>

          {/* Main Area */}
          <main className="flex-1 flex flex-col h-full overflow-hidden">
            <header className="h-16 bg-white/80 backdrop-blur-md border-b border-slate-100 px-4 md:px-8 flex items-center justify-between z-20">
              <div className="flex items-center gap-4">
                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="w-10 h-10 rounded-xl hover:bg-slate-100 flex items-center justify-center text-slate-500 btn-press">
                  <i className="fa-solid fa-bars"></i>
                </button>
                <h1 className="font-bold text-slate-800 hidden sm:block">ระบบเยี่ยมบ้าน <span className="text-slate-400 font-normal">| โรงเรียนป่าก้าง</span></h1>
              </div>
              <button onClick={() => loadAllData(user)} className="w-10 h-10 rounded-xl bg-slate-50 text-slate-500 hover:text-blue-600 flex items-center justify-center btn-press" title="รีเฟรชข้อมูล">
                <i className={`fa-solid fa-rotate-right ${!isDataLoaded ? 'fa-spin text-blue-500' : ''}`}></i>
              </button>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scroll">
              <div className="max-w-5xl mx-auto pb-12">
                {view === "dashboard" && <Dashboard stats={stats} students={students} visits={visits} isLoaded={isDataLoaded} onSelect={(s) => { setSelectedStudent(s); setView("form"); }} />}
                {view === "students" && <StudentsList students={students} visits={visits} isLoaded={isDataLoaded} onSelect={(s) => { setSelectedStudent(s); setView("form"); }} />}
                {view === "appointments" && <Appointments students={students} visits={visits} onSelect={(s) => { setSelectedStudent(s); setView("form"); }} />}
                {view === "form" && selectedStudent && <VisitForm student={selectedStudent} visits={visits} onSave={saveVisit} onBack={() => { setSelectedStudent(null); setView("students"); }} showToast={showToast} />}
              </div>
            </div>
          </main>
        </div>
      );
    }

    const NavBtn = ({ icon, label, active, open, onClick }) => (
      <button onClick={onClick} className={`w-full flex items-center rounded-xl transition-all btn-press font-bold ${active ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20' : 'text-slate-500 hover:bg-slate-100'} ${open ? 'justify-start px-4 py-3' : 'justify-center py-3'}`}>
        <i className={`fa-solid ${icon} ${open ? 'mr-3' : 'text-lg'}`}></i> {open && label}
      </button>
    );

    // ============= Views =============
    function Dashboard({ stats, visits, students, isLoaded, onSelect }) {
      if (!isLoaded) return <div className="text-center py-20"><i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500"></i></div>;
      const recent = visits.filter(v => v.timestamp).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 5);

      return (
        <div className="slide-up">
          <h2 className="text-2xl font-bold text-slate-800 mb-6">ภาพรวมความคืบหน้า</h2>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <StatBox icon="fa-users" label="ทั้งหมด" count={stats.total} color="text-blue-600" bg="bg-blue-50" />
            <StatBox icon="fa-check-circle" label="เยี่ยมแล้ว" count={stats.visited} color="text-emerald-600" bg="bg-emerald-50" />
            <StatBox icon="fa-calendar" label="นัดหมาย" count={stats.appointed} color="text-amber-600" bg="bg-amber-50" />
            <StatBox icon="fa-clock" label="ยังไม่เยี่ยม" count={stats.notVisited} color="text-rose-600" bg="bg-rose-50" />
          </div>
          
          <div className="glass-card p-6 rounded-3xl mb-8 border border-slate-100">
            <div className="flex justify-between items-end mb-2">
              <span className="font-bold text-slate-600">ความคืบหน้าภาพรวม</span>
              <span className="text-2xl font-black text-blue-600">{stats.percent}%</span>
            </div>
            <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
              <div className="h-full bg-blue-600 transition-all duration-1000" style={{ width: `${stats.percent}%` }}></div>
            </div>
          </div>

          <h3 className="font-bold text-slate-800 mb-4">บันทึกล่าสุด</h3>
          <div className="space-y-3">
            {recent.length === 0 ? <p className="text-slate-400 text-sm">ยังไม่มีข้อมูล</p> : recent.map((v, i) => (
              <div key={i} onClick={() => onSelect(students.find(s => s.studentNo === v.studentNo))} className="glass-card p-4 rounded-2xl flex items-center justify-between cursor-pointer hover:border-blue-300 btn-press">
                <div className="flex items-center gap-4">
                  <div className="w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center font-bold">{v.studentNo}</div>
                  <div><p className="font-bold text-slate-800">{v.studentName}</p><p className="text-xs text-slate-400">{new Date(v.timestamp).toLocaleDateString('th-TH')}</p></div>
                </div>
                <span className={`text-xs font-bold px-3 py-1 rounded-lg ${v.visitStatus === "เยี่ยมแล้ว" ? "bg-emerald-50 text-emerald-600" : "bg-amber-50 text-amber-600"}`}>{v.visitStatus}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    const StatBox = ({ icon, label, count, color, bg }) => (
      <div className="glass-card p-5 rounded-2xl">
        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${bg} ${color} mb-3`}><i className={`fa-solid ${icon} text-lg`}></i></div>
        <p className="text-3xl font-bold text-slate-800">{count}</p>
        <p className="text-sm font-medium text-slate-500 mt-1">{label}</p>
      </div>
    );

    function StudentsList({ students, visits, isLoaded, onSelect }) {
      const [filter, setFilter] = useState("all");
      const [search, setSearch] = useState("");

      const filtered = students.filter(s => {
        const matchStr = !search || s.studentName.includes(search) || s.studentNo.toString().includes(search);
        const st = getVisitStatus(visits, s.studentNo);
        if (filter === "visited") return matchStr && st === "เยี่ยมแล้ว";
        if (filter === "appointed") return matchStr && st === "นัดหมายแล้ว";
        if (filter === "not_visited") return matchStr && st === "ยังไม่เยี่ยม";
        return matchStr;
      });

      if (!isLoaded) return <div className="text-center py-20"><i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500"></i></div>;

      return (
        <div className="slide-up">
          <h2 className="text-2xl font-bold text-slate-800 mb-6">รายชื่อนักเรียน</h2>
          <div className="glass-card p-3 rounded-2xl mb-6 flex flex-col sm:flex-row gap-3">
            <div className="flex bg-slate-100 p-1 rounded-xl overflow-x-auto hide-scroll flex-1">
              {[{id:"all", l:"ทั้งหมด"}, {id:"not_visited", l:"ยังไม่เยี่ยม"}, {id:"appointed", l:"นัดหมาย"}, {id:"visited", l:"เยี่ยมแล้ว"}].map(f => (
                <button key={f.id} onClick={() => setFilter(f.id)} className={`flex-1 px-4 py-2 rounded-lg text-sm font-bold transition-all ${filter === f.id ? "bg-white shadow-sm text-slate-800" : "text-slate-500 hover:text-slate-700"}`}>{f.l}</button>
              ))}
            </div>
            <div className="relative flex-1">
              <i className="fa-solid fa-search absolute left-4 top-3 text-slate-400"></i>
              <input type="text" value={search} onChange={e => setSearch(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2 font-medium outline-none focus:border-blue-400" placeholder="ค้นหาชื่อ, เลขที่..." />
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {filtered.length === 0 ? <p className="col-span-full text-center text-slate-400 py-10">ไม่พบข้อมูล</p> : filtered.map((s, i) => {
              const st = getVisitStatus(visits, s.studentNo);
              return (
                <div key={i} onClick={() => onSelect(s)} className="glass-card p-4 rounded-2xl flex items-center justify-between cursor-pointer hover:border-blue-400 btn-press group">
                  <div className="flex items-center gap-4">
                    <div className={`w-12 h-12 rounded-[1rem] flex items-center justify-center font-bold text-lg ${st==="เยี่ยมแล้ว" ? 'bg-emerald-50 text-emerald-600' : st==="นัดหมายแล้ว" ? 'bg-amber-50 text-amber-600' : 'bg-slate-100 text-slate-500'}`}>{s.studentNo}</div>
                    <div><h4 className="font-bold text-slate-800 group-hover:text-blue-600 transition-colors">{s.studentName}</h4><p className="text-xs text-slate-400 mt-0.5">{st}</p></div>
                  </div>
                  <i className="fa-solid fa-chevron-right text-slate-300"></i>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Appointments({ students, visits, onSelect }) {
      const apps = visits.filter(v => v.visitStatus === "นัดหมายแล้ว" && v.appointmentDate).map(v => ({ ...v, student: students.find(s => s.studentNo === v.studentNo) })).filter(v => v.student).sort((a,b) => new Date(a.appointmentDate) - new Date(b.appointmentDate));
      
      return (
        <div className="slide-up">
          <h2 className="text-2xl font-bold text-slate-800 mb-6">ตารางนัดหมาย</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {apps.length === 0 ? <p className="col-span-full text-center text-slate-400 py-10">ไม่มีคิวนัดหมาย</p> : apps.map((a, i) => (
              <div key={i} onClick={() => onSelect(a.student)} className="glass-card p-5 rounded-2xl cursor-pointer btn-press border-l-4 border-l-amber-400">
                <div className="flex justify-between items-start">
                  <div><h4 className="font-bold text-slate-800">{a.student.studentName}</h4><p className="text-sm text-slate-500">เลขที่ {a.student.studentNo}</p></div>
                  <div className="bg-amber-50 text-amber-600 px-3 py-1 rounded-lg text-xs font-bold"><i className="fa-solid fa-calendar mr-1"></i>{new Date(a.appointmentDate).toLocaleDateString("th-TH")}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ============= THE FORM (No Draft, Strictly Backend/DB driven) =============
    function VisitForm({ student, visits, onSave, onBack, showToast }) {
      const existing = findVisitForStudent(visits, student.studentNo) || {};
      const [form, setForm] = useState({
        studentNo: student.studentNo, studentName: student.studentName, nickname: student.nickname || "",
        semester: existing.semester || "1", visitStatus: existing.visitStatus || "เยี่ยมแล้ว", visitDate: existing.visitDate ? new Date(existing.visitDate).toISOString().split("T")[0] : new Date().toISOString().split("T")[0], appointmentDate: existing.appointmentDate ? new Date(existing.appointmentDate).toISOString().split("T")[0] : "",
        observations: existing.observations || "", houseType: existing.houseType || "", distanceKm: existing.distanceKm || "", travelMethod: existing.travelMethod || "", houseCondition: existing.houseCondition || "", utilities: existing.utilities || "", environment: existing.environment || "",
        familyMembers: existing.familyMembers || "", siblings: existing.siblings || "", familyRelationship: existing.familyRelationship || "", familyIncome: existing.familyIncome || "", studentDuties: existing.studentDuties || "", familyActivities: existing.familyActivities || "",
        riskHealth: existing.riskHealth || "", riskSafety: existing.riskSafety || "", riskTravel: existing.riskTravel || "", riskWork: existing.riskWork || "", riskSocial: existing.riskSocial || "", riskSubstance: existing.riskSubstance || "", parentConcerns: existing.parentConcerns || "",
        visitResult: existing.visitResult || "", teacherNotes: existing.teacherNotes || "",
        images: existing.images ? existing.images.split(",").filter(Boolean) : []
      });
      
      const [step, setStep] = useState(0);
      const [gpsLoading, setGpsLoading] = useState(false);
      const STEPS = ["ข้อมูล", "ที่พัก", "ครอบครัว", "ความเสี่ยง", "รูปภาพ"];

      const update = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleImage = (e) => {
        Array.from(e.target.files).forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = new Image(); img.src = ev.target.result;
            img.onload = () => {
              const canvas = document.createElement("canvas");
              const ratio = Math.min(1, 800 / img.width); // ย่อขนาดเพื่อความเร็ว
              canvas.width = img.width * ratio; canvas.height = img.height * ratio;
              canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
              update("images", [...(form.images||[]), canvas.toDataURL("image/jpeg", 0.7)]);
            };
          };
          reader.readAsDataURL(file);
        });
        e.target.value = "";
      };

      const getGPS = () => {
        setGpsLoading(true);
        if("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(pos => {
            const R=6371; const dLat=(SCHOOL_LAT-pos.coords.latitude)*Math.PI/180; const dLon=(SCHOOL_LON-pos.coords.longitude)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(pos.coords.latitude*Math.PI/180)*Math.cos(SCHOOL_LAT*Math.PI/180)*Math.sin(dLon/2)**2;
            update("distanceKm", (R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2));
            setGpsLoading(false);
          }, () => { setGpsLoading(false); showToast("ไม่สามารถดึง GPS ได้", "error"); }, {enableHighAccuracy:true, timeout:10000});
        }
      };

      return (
        <div className="slide-up max-w-3xl mx-auto">
          {/* Header */}
          <div className="flex items-center gap-4 mb-6">
            <button onClick={onBack} className="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-500 btn-press shadow-sm hover:bg-slate-50"><i className="fa-solid fa-arrow-left"></i></button>
            <div><h2 className="text-xl font-bold text-slate-800">{student.studentName}</h2><p className="text-sm font-medium text-slate-500">เลขที่ {student.studentNo}</p></div>
          </div>

          {/* Stepper */}
          <div className="bg-white p-3 rounded-2xl mb-6 shadow-sm border border-slate-100 flex justify-between relative">
            <div className="absolute top-1/2 left-[10%] right-[10%] h-1 bg-slate-100 -translate-y-1/2 -z-10"><div className="h-full bg-blue-500 transition-all duration-500" style={{ width: `${(step/(STEPS.length-1))*100}%` }}></div></div>
            {STEPS.map((s, i) => (
              <div key={i} onClick={() => setStep(i)} className="flex flex-col items-center cursor-pointer group">
                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold mb-1 transition-all border-2 ${step === i ? "bg-white border-blue-600 text-blue-600 scale-110" : step > i ? "bg-blue-500 border-blue-500 text-white" : "bg-slate-50 border-slate-200 text-slate-400 group-hover:bg-slate-100"}`}>
                  {step > i ? <i className="fa-solid fa-check"></i> : i+1}
                </div>
                <span className={`text-[10px] font-bold ${step===i ? "text-blue-600" : "text-slate-400"}`}>{s}</span>
              </div>
            ))}
          </div>

          {/* Form Fields */}
          <div className="glass-card p-6 md:p-8 rounded-3xl mb-6 bg-white min-h-[400px]">
            {step === 0 && <div className="space-y-4 fade-in">
              <div className="grid grid-cols-2 gap-4">
                <div><label className="block text-sm font-bold text-slate-700 mb-2">ภาคเรียน</label><select value={form.semester} onChange={e=>update("semester", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"><option value="1">1</option><option value="2">2</option></select></div>
                <div><label className="block text-sm font-bold text-slate-700 mb-2">สถานะ *</label><select value={form.visitStatus} onChange={e=>update("visitStatus", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"><option value="ยังไม่เยี่ยม">ยังไม่เยี่ยม</option><option value="เยี่ยมแล้ว">เยี่ยมแล้ว</option><option value="นัดหมายแล้ว">นัดหมายแล้ว</option></select></div>
              </div>
              {form.visitStatus === "นัดหมายแล้ว" ? (
                <div><label className="block text-sm font-bold text-slate-700 mb-2">วันที่นัดหมาย</label><input type="date" value={form.appointmentDate} onChange={e=>update("appointmentDate", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"/></div>
              ) : (
                <div><label className="block text-sm font-bold text-slate-700 mb-2">วันที่เยี่ยม</label><input type="date" value={form.visitDate} onChange={e=>update("visitDate", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"/></div>
              )}
              <div><label className="block text-sm font-bold text-slate-700 mb-2">การสังเกตเบื้องต้น</label><textarea rows="3" value={form.observations} onChange={e=>update("observations", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"></textarea></div>
            </div>}
            
            {step === 1 && <div className="space-y-4 fade-in grid grid-cols-1 md:grid-cols-2 gap-x-4">
              <div className="col-span-full md:col-span-1"><label className="block text-sm font-bold text-slate-700 mb-2">ลักษณะที่พัก</label><input type="text" value={form.houseType} onChange={e=>update("houseType", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"/></div>
              <div className="col-span-full md:col-span-1"><div className="flex justify-between"><label className="block text-sm font-bold text-slate-700 mb-2">ระยะทาง (กม.)</label><button onClick={getGPS} disabled={gpsLoading} className="text-xs font-bold text-blue-600 mb-2"><i className={`fa-solid fa-location-crosshairs mr-1 ${gpsLoading?'fa-spin':''}`}></i> ดึง GPS</button></div><input type="number" value={form.distanceKm} onChange={e=>update("distanceKm", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"/></div>
              <div><label className="block text-sm font-bold text-slate-700 mb-2">การเดินทาง</label><input type="text" value={form.travelMethod} onChange={e=>update("travelMethod", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"/></div>
              <div><label className="block text-sm font-bold text-slate-700 mb-2">สภาพบ้าน</label><select value={form.houseCondition} onChange={e=>update("houseCondition", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"><option value="">-เลือก-</option>{HOUSE_COND.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
              <div className="col-span-full"><label className="block text-sm font-bold text-slate-700 mb-2">สภาพแวดล้อม</label><textarea rows="2" value={form.environment} onChange={e=>update("environment", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"></textarea></div>
            </div>}

            {step === 2 && <div className="space-y-4 fade-in grid grid-cols-1 md:grid-cols-2 gap-x-4">
              <div><label className="block text-sm font-bold text-slate-700 mb-2">จำนวนสมาชิกในบ้าน</label><input type="number" value={form.familyMembers} onChange={e=>update("familyMembers", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"/></div>
              <div><label className="block text-sm font-bold text-slate-700 mb-2">ความสัมพันธ์</label><select value={form.familyRelationship} onChange={e=>update("familyRelationship", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"><option value="">-เลือก-</option>{REL_OPTS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
              <div className="col-span-full"><label className="block text-sm font-bold text-slate-700 mb-2">ภาระงานนักเรียนเมื่ออยู่บ้าน</label><input type="text" value={form.studentDuties} onChange={e=>update("studentDuties", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"/></div>
            </div>}

            {step === 3 && <div className="space-y-4 fade-in grid grid-cols-1 md:grid-cols-2 gap-x-4">
              {[{k:"riskHealth",l:"สุขภาพ"},{k:"riskSafety",l:"ความปลอดภัย"},{k:"riskSubstance",l:"ยาเสพติด"},{k:"parentConcerns",l:"ข้อห่วงใยผู้ปกครอง"}].map(r => (
                <div key={r.k} className="col-span-full md:col-span-1"><label className="block text-sm font-bold text-slate-700 mb-2">{r.l}</label><input type="text" value={form[r.k]} onChange={e=>update(r.k, e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"/></div>
              ))}
            </div>}

            {step === 4 && <div className="space-y-4 fade-in">
              <div><label className="block text-sm font-bold text-slate-700 mb-2">สรุปผล</label><select value={form.visitResult} onChange={e=>update("visitResult", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"><option value="">-เลือก-</option>{RESULT_OPTS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
              <div><label className="block text-sm font-bold text-slate-700 mb-2">บันทึกเพิ่มเติม</label><textarea rows="3" value={form.teacherNotes} onChange={e=>update("teacherNotes", e.target.value)} className="w-full luxury-input rounded-xl px-4 py-3"></textarea></div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">รูปภาพ ({form.images.length} รูป)</label>
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                  {form.images.map((img, i) => (
                    <div key={i} className="relative aspect-square rounded-xl overflow-hidden group border">
                      <img src={img} className="w-full h-full object-cover" />
                      <button onClick={()=>update("images", form.images.filter((_,idx)=>idx!==i))} className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity"><i className="fa-solid fa-trash text-white text-xl"></i></button>
                    </div>
                  ))}
                  <label className="border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center aspect-square cursor-pointer hover:bg-slate-50 transition btn-press">
                    <i className="fa-solid fa-plus text-2xl text-slate-400 mb-1"></i><span className="text-xs font-bold text-slate-500">เพิ่มรูป</span>
                    <input type="file" accept="image/*" multiple onChange={handleImage} className="hidden"/>
                  </label>
                </div>
              </div>
            </div>}

            {/* Navigation Nav */}
            <div className="flex justify-between mt-8 pt-6 border-t border-slate-100">
              <button onClick={() => setStep(step-1)} disabled={step===0} className="px-5 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 disabled:opacity-30 btn-press"><i className="fa-solid fa-arrow-left mr-2"></i>ย้อนกลับ</button>
              {step < STEPS.length-1 ? (
                <button onClick={() => setStep(step+1)} className="px-8 py-3 rounded-xl font-bold text-white bg-slate-800 hover:bg-slate-700 shadow-md btn-press">ถัดไป <i className="fa-solid fa-arrow-right ml-2"></i></button>
              ) : (
                <button onClick={() => onSave(form, form.images)} className="px-8 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-500/30 btn-press"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> บันทึกข้อมูลจริง</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<DashboardApp />);
  </script>
</body>
</html>
