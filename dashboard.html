const api = {
async get(action, params = {}) {
const q = new URLSearchParams({ action, t: Date.now(), ...params }).toString();
try { const r = await fetch(`${SCRIPT_URL}?${q}`, { cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
},
async post(body) {
try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" }, cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
}
};

const getVal = (obj, key) => {
if (!obj || typeof obj !== 'object') return "";
const k = Object.keys(obj).find(x => String(x).toLowerCase().trim() === String(key).toLowerCase().trim());
return k && obj[k] !== undefined && obj[k] !== null ? String(obj[k]).trim() : "";
};

const compareId = (id1, id2) => String(id1 || "").replace(/^0+/, '').trim() === String(id2 || "").replace(/^0+/, '').trim();

const getVisitStatus = (visits, studentNo) => {
if (!visits || !studentNo || !Array.isArray(visits)) return "ยังไม่เยี่ยม";
const v = [...visits].reverse().find(v => compareId(getVal(v, 'studentNo'), studentNo));
return v ? (getVal(v, 'visitStatus') || "ยังไม่เยี่ยม") : "ยังไม่เยี่ยม";
};

const checkIsAdmin = (lvl) => {
const c = String(lvl || "").toLowerCase().trim();
return c === "แอดมิน" || c === "admin" || c === "ทั้งหมด" || c === "ผู้บริหาร";
};

const safeDateForDisplay = (dateVal) => {
if (!dateVal || String(dateVal).trim() === "") return "-";
try {
const d = new Date(dateVal);
if (isNaN(d.getTime())) return String(dateVal); 
return d.toLocaleDateString('th-TH', {year:'numeric', month:'short', day:'numeric'});
} catch(e) { return "-"; }
};

const safeDateForInput = (dateStr) => {
if (!dateStr || String(dateStr).trim() === "") return new Date().toISOString().split("T")[0];
try {
const d = new Date(dateStr);
if (isNaN(d.getTime())) return new Date().toISOString().split("T")[0];
return d.toISOString().split("T")[0];
} catch(e) { return new Date().toISOString().split("T")[0]; }
};

const [adminClassFilter, setAdminClassFilter] = useState("ทั้งหมด");
const [sidebarSearch, setSidebarSearch] = useState("");

      const [printStudents, setPrintStudents] = useState(null);

const showToast = useCallback((msg, type = "success") => setToast({ msg, type }), []);

useEffect(() => {
        const u = localStorage.getItem("hv_user_final_v12");
        const u = localStorage.getItem("hv_user_final_v13");
if (u) { 
const parsed = JSON.parse(u);
setUser(parsed); 
loadAllData(parsed); 
}
}, []);

      useEffect(() => {
        if (printStudents && printStudents.length > 0) {
          const timer = setTimeout(() => {
            window.print();
            setPrintStudents(null); 
          }, 800);
          return () => clearTimeout(timer);
        }

const loadAllData = async (u) => {
setIsDataLoaded(false);
const [sRes, vRes] = await Promise.all([
api.get("getStudents", { classLevel: u.classLevel }),
api.get("getVisitsFull", { classLevel: u.classLevel })
]);
if (sRes.success && Array.isArray(sRes.data)) setGlobalStudents(sRes.data);
if (vRes.success && Array.isArray(vRes.data)) setGlobalVisits(vRes.data);
setIsDataLoaded(true);
};

const handleLogin = async (code, stopLoading) => {
const res = await api.post({ action: "getTeacherByCode", code });
if (res.success && res.data) {
          localStorage.setItem("hv_user_final_v12", JSON.stringify(res.data));
          localStorage.setItem("hv_user_final_v13", JSON.stringify(res.data));
setUser(res.data); 
loadAllData(res.data);
setShowWelcome(true);
} else {
showToast("คุณครูน่าจะกรอกรหัสผิดนะครับ ไม่พบรหัสในฐานข้อมูล รบกวนกรอกรหัสอีกครั้งนะครับ", "error");
if(stopLoading) stopLoading();
}
};

const saveVisit = async (formData) => {
setIsSaving(true);
const data = { ...formData, teacherCode: user.code, teacherName: user.fullName, classLevel: formData.classLevel || user.classLevel };

const res = await api.post({ action: "saveVisit", data });
if (res.success) {
showToast("บันทึกข้อมูลเรียบร้อย!", "success");

setGlobalVisits(prev => {
const arr = Array.isArray(prev) ? [...prev] : [];
const idx = arr.findIndex(v => compareId(getVal(v, "studentNo"), data.studentNo) && getVal(v,"classLevel") === data.classLevel);
const newData = {...data, timestamp: new Date().toISOString()};
if(idx > -1) arr[idx] = newData; else arr.push(newData);
return arr;
});

api.get("getVisitsFull", { classLevel: user.classLevel }).then(r => { if(r.success) setGlobalVisits(r.data); });
setView("profile"); 
} else {
showToast(res.message || "เกิดข้อผิดพลาดในการบันทึก", "error");
}
setIsSaving(false);
};

setIsSaving(true);

function StudentManage({ user, showToast, refresh, students, isLoaded, isAdmin, currentFilterClass, userClass }) {
const [showAddModal, setShowAddModal] = useState(false);

const handleImport = async (e) => {
const file = e.target.files[0]; if(!file) return;
const reader = new FileReader();
reader.onload = async (evt) => {
showToast("กำลังนำเข้าข้อมูล...", "success");
try {
const wb = XLSX.read(evt.target.result, {type:'binary'}); 
const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
const targetClass = (isAdmin && currentFilterClass !== "ทั้งหมด") ? currentFilterClass : userClass;

const newSt = data.slice(1).filter(r=>r[0]&&r[1]).map(r=>({
studentNo: String(r[0]).trim(), 
studentName: String(r[1]).trim(), 
nickname: r[2] ? String(r[2]).trim() : "", 
classLevel: isAdmin && r[3] ? String(r[3]).trim() : targetClass
}));

if(newSt.length === 0) {
showToast("ไม่พบข้อมูลในไฟล์ Excel", "warning");
return;
}

const res = await api.post({action:"importStudents", students:newSt});
if(res.success){ showToast(`นำเข้าสำเร็จ ${newSt.length} คน`, "success"); refresh(user); } else showToast("เกิดข้อผิดพลาด", "error");
} catch(err) {
showToast("ไฟล์ Excel ไม่ถูกต้อง", "error");
}
};
reader.readAsBinaryString(file); e.target.value="";
};

const handleDelete = async (no, classLvl) => {
if(!confirm(`ลบเลขที่ ${no} ใช่หรือไม่?`)) return;
const res = await api.post({action:"deleteStudent", studentNo:no, classLevel:classLvl});
if(res.success){ showToast("ลบสำเร็จ", "success"); refresh(user); } else showToast("ลบไม่สำเร็จ", "error");
};

const handleAddStudent = async (formData) => {
const res = await api.post({action: "addStudent", data: formData});
if (res.success) {
showToast("เพิ่มนักเรียนสำเร็จ", "success");
setShowAddModal(false);
refresh(user);
} else {
showToast(res.message || "เกิดข้อผิดพลาด", "error");
}
};

if(!isLoaded) return <div className="text-center mt-32"><div className="w-16 h-16 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin mx-auto"></div></div>;

return (
<div className="slide-up">
{showAddModal && <AddStudentModal onClose={()=>setShowAddModal(false)} onSave={handleAddStudent} isAdmin={isAdmin} currentFilterClass={currentFilterClass} userClass={user.classLevel} />}

<div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
<div><h2 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">จัดการรายชื่อนักเรียน</h2></div>
<div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
<button onClick={()=>setShowAddModal(true)} className="bg-slate-900 hover:bg-slate-800 text-white px-8 py-4 rounded-full font-bold shadow-lg shadow-slate-900/20 cursor-pointer btn-press transition-colors flex items-center justify-center">
<i className="fa-solid fa-user-plus mr-3 text-xl"></i> เพิ่มนักเรียน
</button>
<label className="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-4 rounded-full font-bold shadow-lg shadow-emerald-500/30 cursor-pointer btn-press transition-colors flex items-center justify-center">
<i className="fa-solid fa-file-excel mr-3 text-xl"></i> นำเข้าจาก Excel
<input type="file" accept=".xlsx, .xls" onChange={handleImport} className="hidden" />
</label>
</div>
</div>

<div className="soft-card overflow-hidden border border-slate-100">
<div className="overflow-x-auto">
<table className="w-full text-left border-collapse">
<thead><tr className="bg-slate-50 border-b border-slate-100 text-slate-500 text-xs uppercase tracking-widest"><th className="py-6 px-8 font-bold w-32 text-center">เลขที่</th><th className="py-6 px-8 font-bold">ชื่อ-นามสกุล</th><th className="py-6 px-8 font-bold text-center">ชั้นเรียน</th><th className="py-6 px-8 font-bold text-center w-32">ลบ</th></tr></thead>
<tbody className="divide-y divide-slate-100">
{students.length===0 ? <tr><td colSpan="4" className="text-center py-16 text-slate-400 font-medium text-lg">ไม่มีข้อมูลนักเรียน</td></tr> : students.map((s,i) => (
<tr key={i} className="hover:bg-slate-50/50 transition-colors">
<td className="py-5 px-8 text-center font-black text-slate-700 text-xl">{s.studentNo}</td>
<td className="py-5 px-8"><span className="font-black text-slate-800 text-lg">{s.studentName}</span> {s.nickname && <span className="text-sm font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-md ml-3">{s.nickname}</span>}</td>
<td className="py-5 px-8 text-center font-bold text-blue-600"><span className="bg-blue-50 px-3 py-1 rounded-lg">{getVal(s,"classLevel")}</span></td>
<td className="py-5 px-8 text-center"><button onClick={()=>handleDelete(s.studentNo, getVal(s,"classLevel"))} className="w-12 h-12 rounded-full bg-white border border-slate-200 text-rose-500 hover:bg-rose-500 hover:text-white hover:border-rose-500 transition-all shadow-sm flex items-center justify-center mx-auto btn-press cursor-pointer"><i className="fa-solid fa-trash-can text-lg"></i></button></td>
</tr>
))}
</tbody>
</table>
</div>
</div>
</div>
);
}

if (newSet.has(no)) newSet.delete(no); else newSet.add(no);
setSelectedStudents(newSet);
};

const selectAll = () => {
const allVisisted = students.filter(s => getVisitStatus(visits, s.studentNo) === "เยี่ยมแล้ว").map(s => s.studentNo);
setSelectedStudents(new Set(allVisisted));
};

const exportExcel = () => {
const data = students.map(s => {
const v = visits.find(x => compareId(getVal(x,"studentNo"), s.studentNo) && getVal(x,"classLevel") === getVal(s,"classLevel")) || {};
return { "เลขที่":s.studentNo, "ชื่อ":s.studentName, "ชั้นเรียน":getVal(s,"classLevel"), "สถานะ":getVal(v,"visitStatus")||"ยังไม่เยี่ยม", "วันที่เยี่ยม":safeDateForDisplay(getVal(v,"visitDate")), "ระยะทาง":getVal(v,"distanceKm"), "สรุปผล":getVal(v,"visitResult") };
});
const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Report");
XLSX.writeFile(wb, `รายงานสรุปภาพรวม_${user.classLevel}.xlsx`);
showToast("ส่งออก Excel สำเร็จ", "success");

houseType: getVal(exist,"houseType")||"บ้านเดี่ยว (อยู่กับผู้อื่น/อยู่ฟรี)",
distanceKm: getVal(exist,"distanceKm")||NR01_DATA.distanceKm, 
travelMethod: getVal(exist,"travelMethod")||NR01_DATA.travelMethod,
travelCost: getVal(exist,"travelCost")||NR01_DATA.travelCostPerMonth,
houseCondition: getVal(exist,"houseCondition")||"ปานกลาง",
utilities: getVal(exist,"utilities")||(NR01_DATA.waterSource+" / "+NR01_DATA.electricity),
houseMaterial: getVal(exist,"houseMaterial")||(NR01_DATA.floorMaterial+" | "+NR01_DATA.wallMaterial+" | "+NR01_DATA.roofMaterial),
environment: getVal(exist,"environment"),
address: getVal(exist,"address")||NR01_DATA.address,
// ครอบครัว - จาก นร.01
familyMembers: getVal(exist,"familyMembers")||NR01_DATA.householdsMembers,
siblings: getVal(exist,"siblings")||NR01_DATA.siblings,
familyRelationship: getVal(exist,"familyRelationship")||"ปานกลาง",
familyIncome: getVal(exist,"familyIncome")||NR01_DATA.totalIncome,
incomePerPerson: getVal(exist,"incomePerPerson")||NR01_DATA.incomePerPerson,
guardianName: getVal(exist,"guardianName")||NR01_DATA.guardianName,
guardianRelation: getVal(exist,"guardianRelation")||NR01_DATA.guardianRelation,
guardianPhone: getVal(exist,"guardianPhone")||NR01_DATA.guardianPhone,
guardianOccupation: getVal(exist,"guardianOccupation")||NR01_DATA.guardianOccupation,
familyStatus: getVal(exist,"familyStatus")||NR01_DATA.familyStatus,
welfare: getVal(exist,"welfare")||NR01_DATA.welfare,
studentDuties: getVal(exist,"studentDuties"),
familyActivities: getVal(exist,"familyActivities"),
// ความเสี่ยง - เติมข้อมูลจาก นร.01
riskHealth: getVal(exist,"riskHealth"),
riskSafety: getVal(exist,"riskSafety"),
riskTravel: getVal(exist,"riskTravel")||"ใช้จักรยานยนต์ส่วนตัว ระยะทาง 9 กม. ใช้เวลา 15 นาที ค่าใช้จ่าย 800 บาท/เดือน",
riskWork: getVal(exist,"riskWork")||"รายได้ครัวเรือน 12,500 บาท/เดือน (4,166.67 บาท/คน) มารดารับจ้างรายวัน",
riskSocial: getVal(exist,"riskSocial"),
riskSubstance: getVal(exist,"riskSubstance"),
parentConcerns: getVal(exist,"parentConcerns"),
visitResult: getVal(exist,"visitResult"), teacherNotes: getVal(exist,"teacherNotes")
});

const [step, setStep] = useState(0);
const [gpsStatus, setGpsStatus] = useState(null);
const [gpsDist, setGpsDist] = useState("");

const STEPS = ["ข้อมูลเบื้องต้น", "ที่พัก", "ครอบครัว", "ความเสี่ยง"];
const update = (k, v) => setForm(p => ({...p, [k]:v}));

const getGPS = () => {
setGpsStatus("loading");
if("geolocation" in navigator) {
navigator.geolocation.getCurrentPosition(pos => {
const R=6371; const dLat=(SCHOOL_LAT-pos.coords.latitude)*Math.PI/180; const dLon=(SCHOOL_LON-pos.coords.longitude)*Math.PI/180;
const a = Math.sin(dLat/2)**2 + Math.cos(pos.coords.latitude*Math.PI/180)*Math.cos(SCHOOL_LAT*Math.PI/180)*Math.sin(dLon/2)**2;
const dist = (R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2);
update("distanceKm", dist); setGpsDist(dist); setGpsStatus("success");
setTimeout(() => setGpsStatus(null), 2500);
}, () => { setGpsStatus("error"); setTimeout(() => setGpsStatus(null), 2500); }, {enableHighAccuracy:true, timeout:10000});
} else { setGpsStatus("error"); setTimeout(() => setGpsStatus(null), 2500); }
};

return (
<div className="slide-up max-w-4xl mx-auto">
<GpsPopup status={gpsStatus} distance={gpsDist} />

<div className="flex items-center gap-6 mb-8">
<button onClick={onBack} className="w-14 h-14 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-500 btn-press shadow-sm hover:border-blue-400 hover:text-blue-600 transition-colors cursor-pointer"><i className="fa-solid fa-arrow-left text-xl"></i></button>
<div>
  <h2 className="text-3xl font-black text-slate-800 tracking-tight">{student.studentName}</h2>
  <p className="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full inline-block mt-2 shadow-sm">เลขที่ {student.studentNo} • ชั้น {getVal(student, "classLevel")}</p>
  <span className="ml-2 text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100 inline-block">✓ นำเข้าข้อมูลจาก นร.01 แล้ว</span>
</div>
</div>

<div className="bg-white p-3 rounded-full mb-8 shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-slate-100 flex justify-between relative mx-2">
<div className="absolute top-1/2 left-[12.5%] right-[12.5%] h-2 bg-slate-100 -translate-y-1/2 -z-10 rounded-full"><div className="h-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-700 ease-out rounded-full shadow-sm" style={{ width: `${(step/(STEPS.length-1))*100}%` }}></div></div>
{STEPS.map((s, i) => (
<div key={i} onClick={() => setStep(i)} className="flex flex-col items-center cursor-pointer group btn-press w-1/4">
<div className={`w-12 h-12 rounded-full flex items-center justify-center text-sm font-black mb-2 transition-all border-[4px] ${step === i ? "bg-white border-blue-600 text-blue-600 scale-110 shadow-lg" : step > i ? "bg-blue-500 border-blue-500 text-white" : "bg-slate-50 border-slate-50 text-slate-400 group-hover:bg-slate-100 group-hover:border-slate-100"}`}>
{step > i ? <i className="fa-solid fa-check text-lg"></i> : i+1}
</div>
<span className={`text-[10px] sm:text-sm font-bold text-center hidden sm:block ${step===i ? "text-blue-600" : "text-slate-400"}`}>{s}</span>
</div>
))}
</div>

<div className="soft-card p-8 md:p-12 mb-6 min-h-[500px]">
{step === 0 && <div className="space-y-2 fade-in">
<div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
<PremiumSelect label="ภาคเรียน" icon="fa-calendar-days" value={form.semester} onChange={e=>update("semester", e.target.value)} options={["1","2"]} />
<PremiumSelect label="สถานะการเยี่ยม *" icon="fa-clipboard-check" value={form.visitStatus} onChange={e=>update("visitStatus", e.target.value)} options={["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"]} />
</div>
{form.visitStatus === "นัดหมายแล้ว" ? (
<PremiumInput label="วันที่นัดหมาย" type="date" icon="fa-calendar-plus" value={form.appointmentDate} onChange={e=>update("appointmentDate", e.target.value)} />
) : (
<PremiumInput label="วันที่เยี่ยมบ้าน" type="date" icon="fa-calendar-check" value={form.visitDate} onChange={e=>update("visitDate", e.target.value)} />
)}
<div className="bg-blue-50 border border-blue-100 rounded-[1.5rem] p-6 mb-4">
  <p className="text-xs font-black text-blue-400 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-id-card"></i> ข้อมูลผู้ปกครอง (จากแบบ นร.01)</p>
  <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
    <PremiumInput label="ชื่อผู้ปกครอง" icon="fa-user-tie" value={form.guardianName} onChange={e=>update("guardianName", e.target.value)} />
    <PremiumInput label="ความสัมพันธ์กับนักเรียน" icon="fa-people-arrows" value={form.guardianRelation} onChange={e=>update("guardianRelation", e.target.value)} />
    <PremiumInput label="เบอร์โทรผู้ปกครอง" icon="fa-phone" value={form.guardianPhone} onChange={e=>update("guardianPhone", e.target.value)} />
    <PremiumInput label="อาชีพผู้ปกครอง" icon="fa-briefcase" value={form.guardianOccupation} onChange={e=>update("guardianOccupation", e.target.value)} />
  </div>
  <PremiumInput label="สถานภาพครอบครัว" icon="fa-house-chimney-user" value={form.familyStatus} onChange={e=>update("familyStatus", e.target.value)} />
  <PremiumInput label="สวัสดิการ/ความช่วยเหลือที่ได้รับ" icon="fa-hand-holding-dollar" value={form.welfare} onChange={e=>update("welfare", e.target.value)} />
</div>
<PremiumTextarea label="การสังเกตเบื้องต้น" rows={4} value={form.observations} onChange={e=>update("observations", e.target.value)} placeholder="พิมพ์ข้อความสังเกตเบื้องต้น..." />
</div>}

{step === 1 && <div className="space-y-2 fade-in grid grid-cols-1 md:grid-cols-2 gap-x-6">
<div className="col-span-full">
  <PremiumInput label="ที่อยู่ปัจจุบัน" icon="fa-map-pin" value={form.address} onChange={e=>update("address", e.target.value)} />
</div>
<div className="col-span-full md:col-span-1"><PremiumInput label="ลักษณะที่พักอาศัย" icon="fa-house-chimney" value={form.houseType} onChange={e=>update("houseType", e.target.value)} placeholder="เช่น บ้านเดี่ยว, หอพัก" /></div>
<div className="col-span-full md:col-span-1 relative mb-5 pop-in">
<label className="block text-sm font-bold text-slate-500 mb-2 pl-4">ระยะทางถึงสถานศึกษา (กม.)</label>
<div className="flex gap-3">
<div className="input-wrapper flex-1 flex items-center overflow-hidden"><div className="pl-5 text-slate-400"><i className="fa-solid fa-route text-lg"></i></div><input type="number" value={form.distanceKm} onChange={e=>update("distanceKm", e.target.value)} className="premium-input pl-4" placeholder="0.00" /></div>
<button onClick={getGPS} className="bg-slate-900 text-white hover:bg-blue-600 px-6 rounded-[1.25rem] flex items-center justify-center btn-press shadow-md font-bold transition-colors whitespace-nowrap cursor-pointer"><i className="fa-solid fa-location-dot mr-2"></i>ดึง GPS</button>
</div>
</div>
<div><PremiumInput label="วิธีการเดินทาง" icon="fa-motorcycle" value={form.travelMethod} onChange={e=>update("travelMethod", e.target.value)} placeholder="เช่น รถส่วนตัว, รถประจำทาง" /></div>
<div><PremiumInput label="ค่าใช้จ่ายเดินทาง (บาท/เดือน)" icon="fa-coins" value={form.travelCost} onChange={e=>update("travelCost", e.target.value)} /></div>
<div><PremiumSelect label="สภาพบ้าน" icon="fa-house-crack" value={form.houseCondition} onChange={e=>update("houseCondition", e.target.value)} options={HOUSE_COND} /></div>
<div><PremiumInput label="สิ่งอำนวยความสะดวก (น้ำ/ไฟ)" icon="fa-faucet-drip" value={form.utilities} onChange={e=>update("utilities", e.target.value)} /></div>
<div className="col-span-full"><PremiumInput label="วัสดุก่อสร้าง (พื้น | ฝา | หลังคา)" icon="fa-building" value={form.houseMaterial} onChange={e=>update("houseMaterial", e.target.value)} /></div>
<div className="col-span-full"><PremiumTextarea label="สภาพแวดล้อมรอบบ้าน" value={form.environment} onChange={e=>update("environment", e.target.value)} /></div>
</div>}

{step === 2 && <div className="space-y-2 fade-in grid grid-cols-1 md:grid-cols-2 gap-x-6">
<div><PremiumInput label="จำนวนสมาชิกในครัวเรือน (คน)" type="number" icon="fa-people-roof" value={form.familyMembers} onChange={e=>update("familyMembers", e.target.value)} /></div>
<div><PremiumInput label="จำนวนพี่น้อง (คน)" type="number" icon="fa-children" value={form.siblings} onChange={e=>update("siblings", e.target.value)} /></div>
<div className="col-span-full"><PremiumSelect label="ความสัมพันธ์ในครอบครัว" icon="fa-hand-holding-heart" value={form.familyRelationship} onChange={e=>update("familyRelationship", e.target.value)} options={REL_OPTS} /></div>
<div><PremiumInput label="รายได้ครัวเรือนรวม (บาท/เดือน)" icon="fa-coins" value={form.familyIncome} onChange={e=>update("familyIncome", e.target.value)} /></div>
<div><PremiumInput label="รายได้เฉลี่ยต่อคน (บาท/เดือน)" icon="fa-chart-line" value={form.incomePerPerson} onChange={e=>update("incomePerPerson", e.target.value)} /></div>
<div className="col-span-full"><PremiumInput label="ภาระงานนักเรียนเมื่ออยู่บ้าน" icon="fa-broom" value={form.studentDuties} onChange={e=>update("studentDuties", e.target.value)} /></div>
<div className="col-span-full"><PremiumTextarea label="กิจกรรมที่มักทำร่วมกัน" value={form.familyActivities} onChange={e=>update("familyActivities", e.target.value)} /></div>
</div>}

{step === 3 && <div className="space-y-2 fade-in grid grid-cols-1 md:grid-cols-2 gap-x-6">
<div className="col-span-full md:col-span-1"><PremiumInput label="ด้านสุขภาพ" icon="fa-heart-pulse" value={form.riskHealth} onChange={e=>update("riskHealth", e.target.value)} /></div>
<div className="col-span-full md:col-span-1"><PremiumInput label="ด้านความปลอดภัย" icon="fa-shield-halved" value={form.riskSafety} onChange={e=>update("riskSafety", e.target.value)} /></div>
<div className="col-span-full md:col-span-1"><PremiumInput label="ด้านการเดินทาง" icon="fa-route" value={form.riskTravel} onChange={e=>update("riskTravel", e.target.value)} /></div>
<div className="col-span-full md:col-span-1"><PremiumInput label="ด้านเศรษฐกิจ" icon="fa-sack-dollar" value={form.riskWork} onChange={e=>update("riskWork", e.target.value)} /></div>
<div className="col-span-full md:col-span-1"><PremiumInput label="ด้านสังคม/เพื่อน" icon="fa-users-slash" value={form.riskSocial} onChange={e=>update("riskSocial", e.target.value)} /></div>
<div className="col-span-full md:col-span-1"><PremiumInput label="ด้านยาเสพติด" icon="fa-smoking" value={form.riskSubstance} onChange={e=>update("riskSubstance", e.target.value)} /></div>
<div className="col-span-full"><PremiumTextarea label="ข้อห่วงใยของผู้ปกครอง" value={form.parentConcerns} onChange={e=>update("parentConcerns", e.target.value)} /></div>

<div className="col-span-full mt-4 border-t border-slate-100 pt-6">
<PremiumSelect label="สรุปความเห็นของครู" icon="fa-clipboard-user" value={form.visitResult} onChange={e=>update("visitResult", e.target.value)} options={RESULT_OPTS} />
<PremiumTextarea label="บันทึกเพิ่มเติมจากครู" value={form.teacherNotes} onChange={e=>update("teacherNotes", e.target.value)} rows={3} />
</div>
</div>}

<div className="flex justify-between mt-12 pt-8 border-t border-slate-100">
<button onClick={() => setStep(step-1)} disabled={step===0} className="px-8 py-4 rounded-full font-bold text-slate-500 bg-slate-50 hover:bg-slate-100 disabled:opacity-0 btn-press transition-all cursor-pointer"><i className="fa-solid fa-arrow-left mr-3"></i>ย้อนกลับ</button>
{step < STEPS.length-1 ? (
<button onClick={() => setStep(step+1)} className="px-12 py-4 rounded-full font-black text-white bg-slate-900 hover:bg-blue-600 shadow-xl shadow-slate-300 btn-press transition-all text-lg cursor-pointer">ถัดไป <i className="fa-solid fa-arrow-right ml-3"></i></button>
) : (
<button onClick={() => onSave(form)} className="px-12 py-4 rounded-full font-black text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 shadow-xl shadow-blue-500/40 btn-press transition-all text-lg cursor-pointer"><i className="fa-solid fa-cloud-arrow-up mr-3"></i> บันทึกข้อมูล</button>
)}
</div>
</div>
</div>
);
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(
<ErrorBoundary>
<DashboardApp />
</ErrorBoundary>
);
</script>
</body>
</html>
