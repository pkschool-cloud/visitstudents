<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ระบบเยี่ยมบ้านนักเรียน</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.6); }
    
    /* ซ่อน Template PDF */
    #pdf-report-container { position: absolute; left: -9999px; top: 0; width: 794px; background: white; padding: 40px; font-family: 'Prompt', sans-serif; color: #000; }
    .pdf-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 15px; }
    .pdf-table th, .pdf-table td { border: 1px solid #333; padding: 8px; text-align: left; }
    .pdf-table th { background-color: #f3f4f6; font-weight: bold; width: 30%; }
  </style>
</head>
<body class="text-slate-700 h-screen overflow-hidden">
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 🔴 🔴 🔴 เปลี่ยน URL ตรงนี้ 🔴 🔴 🔴
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxd5kApYf97c5Q5O7H_6duQBA5-K_f5ioVds2WAeQKTB-p2OTHHV9T8dQN2r-Z1XtaL/exec";

    // --- Utilities API ---
    const api = {
      async get(action, params = {}) {
        const q = new URLSearchParams({ action, ...params }).toString();
        try { const r = await fetch(`${SCRIPT_URL}?${q}`); return await r.json(); } 
        catch { return { success: false, message: "เชื่อมต่อขัดข้อง" }; }
      },
      async post(body) {
        try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" } }); return await r.json(); } 
        catch { return { success: false, message: "เชื่อมต่อขัดข้อง" }; }
      }
    };

    // --- Constants ---
    const SCHOOL_LAT = 18.8475; // พิกัดโรงเรียนป่าก้าง (สมมติ)
    const SCHOOL_LON = 99.0440;
    const HOUSE_COND = ["ดีมาก","ดี","ปานกลาง","ทรุดโทรม","ไม่ปลอดภัย"];
    const REL_OPTS = ["อบอุ่นดีมาก","อบอุ่นดี","ปานกลาง","ไม่ค่อยอบอุ่น","มีปัญหา"];
    const VISIT_STAT = ["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"];
    const RESULT_OPTS = ["ปกติ","ต้องเฝ้าระวัง","ต้องช่วยเหลือเร่งด่วน","ส่งต่อ"];

    // --- Components ---
    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
      return (
        <div className={`fixed top-6 right-6 z-50 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 slide-up border-l-4 bg-white/90 backdrop-blur-md ${type==='success'?'border-emerald-500':'border-rose-500'}`}>
          <i className={`fa-solid ${type==='success'?'fa-circle-check text-emerald-500':'fa-circle-exclamation text-rose-500'} text-xl`}></i>
          <span className="font-bold text-sm text-slate-700">{msg}</span>
        </div>
      );
    };

    // --- Main Dashboard ---
    function DashboardApp() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState("list"); 
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [toast, setToast] = useState(null);
      const [refreshKey, setRefreshKey] = useState(0);

      useEffect(() => {
        const savedUser = localStorage.getItem("hv_user");
        if (!savedUser) { window.location.href = "login.html"; return; }
        setUser(JSON.parse(savedUser));
      }, []);

      const logout = () => { localStorage.removeItem("hv_user"); window.location.href = "login.html"; };
      const showToast = (msg, type="success") => setToast({msg, type});
      const refreshData = () => setRefreshKey(k => k + 1);

      if (!user) return <div className="flex h-screen items-center justify-center bg-slate-50"><i className="fa-solid fa-spinner fa-spin text-5xl text-blue-500"></i></div>;

      return (
        <div className="flex h-full w-full bg-slate-50 bg-[radial-gradient(#e2e8f0_1px,transparent_1px)] [background-size:16px_16px]">
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          
          {/* Sidebar */}
          <aside className="w-[280px] bg-white/80 backdrop-blur-xl border-r border-slate-200 flex flex-col h-full flex-shrink-0 z-30 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
            <div className="p-8 pb-6 flex flex-col items-center border-b border-slate-100">
              <div className="w-24 h-24 rounded-full border-4 border-blue-50 p-1 mb-4 shadow-inner">
                <img src={`https://ui-avatars.com/api/?name=${user.fullName}&background=2563EB&color=fff`} className="w-full h-full rounded-full object-cover" />
              </div>
              <h2 className="text-lg font-extrabold text-slate-800 text-center">{user.fullName}</h2>
              <p className="text-xs text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full mt-2 font-bold shadow-sm">ครูประจำชั้น {user.classLevel}</p>
            </div>
            
            <div className="p-4 flex-1 overflow-y-auto">
              <nav className="space-y-2">
                <button onClick={() => {setView("list"); setSelectedStudent(null);}} className={`w-full flex items-center space-x-4 px-5 py-4 rounded-2xl transition-all font-bold ${view==='list' || view==='form' ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-500/30' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}>
                  <i className="fa-solid fa-house-user text-lg w-5"></i><span>บันทึกเยี่ยมบ้าน</span>
                </button>
                <button onClick={() => {setView("manage"); setSelectedStudent(null);}} className={`w-full flex items-center space-x-4 px-5 py-4 rounded-2xl transition-all font-bold ${view==='manage' ? 'bg-gradient-to-r from-emerald-500 to-teal-500 text-white shadow-lg shadow-emerald-500/30' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}>
                  <i className="fa-solid fa-users-gear text-lg w-5"></i><span>จัดการข้อมูลนักเรียน</span>
                </button>
                <button onClick={() => {setView("reports"); setSelectedStudent(null);}} className={`w-full flex items-center space-x-4 px-5 py-4 rounded-2xl transition-all font-bold ${view==='reports' ? 'bg-gradient-to-r from-rose-500 to-orange-500 text-white shadow-lg shadow-rose-500/30' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}>
                  <i className="fa-solid fa-file-pdf text-lg w-5"></i><span>พิมพ์รายงาน PDF</span>
                </button>
              </nav>
            </div>
            
            <div className="p-5">
              <button onClick={logout} className="w-full bg-white border border-rose-200 hover:bg-rose-50 hover:border-rose-300 text-rose-500 py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all shadow-sm hover:shadow-md">
                <i className="fa-solid fa-power-off"></i><span>ออกจากระบบ</span>
              </button>
            </div>
          </aside>

          {/* Main Area */}
          <main className="flex-1 flex flex-col h-full overflow-hidden relative">
            <header className="h-20 bg-white/70 backdrop-blur-md border-b border-slate-200 px-8 flex items-center justify-between flex-shrink-0 z-20">
              <div className="flex items-center gap-4">
                <div className="bg-gradient-to-tr from-blue-500 to-indigo-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md"><i className="fa-solid fa-school"></i></div>
                <h1 className="text-xl font-extrabold text-slate-800">โรงเรียนป่าก้าง</h1>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-6 md:p-10">
              <div className="max-w-5xl mx-auto pb-20">
                {view === "list" && <StudentList user={user} onSelect={(s) => {setSelectedStudent(s); setView("form");}} showToast={showToast} refreshKey={refreshKey} />}
                {view === "form" && <VisitForm user={user} student={selectedStudent} onDone={() => {setView("list"); setSelectedStudent(null); showToast("บันทึกเยี่ยมบ้านเรียบร้อย", "success"); refreshData();}} onBack={() => {setView("list"); setSelectedStudent(null);}} showToast={showToast} />}
                {view === "manage" && <StudentManage user={user} showToast={showToast} />}
                {view === "reports" && <ReportExport user={user} showToast={showToast} refreshKey={refreshKey} />}
              </div>
            </div>
          </main>
        </div>
      );
    }

    // --- 1. หน้าแสดงรายชื่อเพื่อบันทึก ---
    function StudentList({ user, onSelect, showToast, refreshKey }) {
      const [students, setStudents] = useState([]);
      const [visits, setVisits] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState("");

      useEffect(() => {
        setLoading(true);
        Promise.all([
          api.get("getStudents", { classLevel: user.classLevel }),
          api.get("getVisits", { classLevel: user.classLevel })
        ]).then(([sRes, vRes]) => {
          if (sRes.success) setStudents(sRes.data);
          if (vRes.success) setVisits(vRes.data);
          setLoading(false);
        }).catch(() => { setLoading(false); showToast("โหลดข้อมูลล้มเหลว", "error"); });
      }, [user, refreshKey]);

      const getStatus = (name) => { const v = visits.find(v => v.studentName === name); return v ? v.visitStatus : "ยังไม่เยี่ยม"; };
      const filtered = students.filter(s => !search || s.studentName.includes(search) || s.nickname?.includes(search) || s.studentNo?.includes(search));
      const visitedCount = students.filter(s => getStatus(s.studentName) === "เยี่ยมแล้ว").length;

      if (loading) return <div className="text-center py-20 fade-in"><i className="fa-solid fa-circle-notch fa-spin text-5xl text-blue-500 mb-4 block drop-shadow-md"></i><span className="font-bold text-slate-500">กำลังดึงข้อมูล...</span></div>;

      return (
        <div className="slide-up">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div className="glass-card p-6 rounded-3xl flex items-center justify-between shadow-[0_8px_30px_rgba(0,0,0,0.04)]">
              <div><p className="text-slate-400 font-bold text-sm mb-1">นักเรียนทั้งหมด</p><h3 className="text-4xl font-black text-slate-800">{students.length}</h3></div>
              <div className="w-16 h-16 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center text-3xl shadow-inner"><i className="fa-solid fa-users"></i></div>
            </div>
            <div className="glass-card p-6 rounded-3xl flex items-center justify-between shadow-[0_8px_30px_rgba(0,0,0,0.04)]">
              <div><p className="text-slate-400 font-bold text-sm mb-1">เยี่ยมแล้ว</p><h3 className="text-4xl font-black text-emerald-600">{visitedCount}</h3></div>
              <div className="w-16 h-16 rounded-2xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-3xl shadow-inner"><i className="fa-solid fa-house-circle-check"></i></div>
            </div>
            <div className="glass-card p-6 rounded-3xl flex items-center justify-between shadow-[0_8px_30px_rgba(0,0,0,0.04)]">
              <div><p className="text-slate-400 font-bold text-sm mb-1">ยังไม่เยี่ยม</p><h3 className="text-4xl font-black text-rose-500">{students.length - visitedCount}</h3></div>
              <div className="w-16 h-16 rounded-2xl bg-rose-50 text-rose-500 flex items-center justify-center text-3xl shadow-inner"><i className="fa-solid fa-house-circle-xmark"></i></div>
            </div>
          </div>

          <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 className="text-2xl font-black text-slate-800">รายชื่อนักเรียน <span className="text-blue-500 bg-blue-50 px-3 py-1 rounded-lg">ชั้น {user.classLevel}</span></h2>
            <div className="relative w-full md:w-80 group">
              <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
              <input type="text" placeholder="ค้นหาชื่อ หรือ เลขที่..." value={search} onChange={e => setSearch(e.target.value)} className="w-full bg-white border border-slate-200 rounded-2xl py-3 pl-12 pr-4 font-bold text-sm outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 shadow-sm transition-all" />
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {filtered.map((s, i) => {
              const isDone = getStatus(s.studentName) === "เยี่ยมแล้ว";
              return (
                <div key={i} onClick={() => onSelect(s)} className="glass-card p-5 rounded-2xl hover:border-blue-400 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 cursor-pointer flex items-center justify-between group fade-in" style={{animationDelay: `${i*0.04}s`}}>
                  <div className="flex items-center gap-4">
                    <div className="w-14 h-14 rounded-[1rem] bg-slate-100 text-slate-500 flex items-center justify-center font-black text-xl group-hover:bg-gradient-to-br group-hover:from-blue-500 group-hover:to-indigo-500 group-hover:text-white transition-all shadow-inner">{s.studentNo}</div>
                    <div>
                      <h4 className="font-bold text-slate-800 text-base group-hover:text-blue-600 transition-colors">{s.studentName}</h4>
                      <p className="text-xs text-slate-500 font-medium mt-0.5">{s.nickname && `ชื่อเล่น: ${s.nickname}`}</p>
                    </div>
                  </div>
                  <div>
                    {isDone ? <span className="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg text-xs font-bold border border-emerald-100 shadow-sm"><i className="fa-solid fa-check"></i> เยี่ยมแล้ว</span> : <span className="bg-rose-50 text-rose-500 px-3 py-1.5 rounded-lg text-xs font-bold border border-rose-100 shadow-sm">ยังไม่เยี่ยม</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // --- 2. ฟอร์มเยี่ยมบ้านอัจฉริยะ (GPS + Upload) ---
    function VisitForm({ user, student, onDone, onBack, showToast }) {
      const [tab, setTab] = useState(0);
      const [saving, setSaving] = useState(false);
      const [gpsLoading, setGpsLoading] = useState(false);
      const [images, setImages] = useState([null, null, null, null]);
      
      const [form, setForm] = useState({
        semester: "1", visitStatus: "เยี่ยมแล้ว", visitDate: new Date().toISOString().split("T")[0], observations: "",
        houseType: "", distanceKm: "", travelMethod: "", houseCondition: "", utilities: "", environment: "",
        familyMembers: "", siblings: "", familyRelationship: "", familyIncome: "", studentDuties: "", familyActivities: "",
        riskHealth: "", riskSafety: "", riskTravel: "", riskWork: "", riskSocial: "", riskSubstance: "",
        parentConcerns: "", visitResult: "", teacherNotes: ""
      });

      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
      const TABS = ["สถานะ", "ที่พัก & GPS", "ครอบครัว", "ความเสี่ยง", "รูปภาพ & สรุป"];

      // Haversine Formula คำนวณระยะทาง
      const calcDistance = (lat1, lon1, lat2, lon2) => {
        const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return (R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)))).toFixed(2);
      };

      const getGPS = () => {
        setGpsLoading(true);
        if ("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const dist = calcDistance(pos.coords.latitude, pos.coords.longitude, SCHOOL_LAT, SCHOOL_LON);
              set("distanceKm", dist); setGpsLoading(false); showToast(`คำนวณระยะทางได้ ${dist} กม.`, "success");
            },
            (err) => { setGpsLoading(false); showToast("ไม่สามารถดึงตำแหน่ง GPS ได้ กรุณาเปิด Location", "error"); },
            { enableHighAccuracy: true, timeout: 10000 }
          );
        } else { setGpsLoading(false); showToast("เบราว์เซอร์ของคุณไม่รองรับ GPS", "error"); }
      };

      // บีบอัดภาพด้วย Canvas ก่อนเปลี่ยนเป็น Base64
      const handleImageUpload = (e, index) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image(); img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const MAX_WIDTH = 800; const scaleSize = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
            const ctx = canvas.getContext("2d"); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL("image/jpeg", 0.7); // ลดคุณภาพเหลือ 70% ให้ส่งผ่านได้เร็ว
            const newImgs = [...images]; newImgs[index] = dataUrl; setImages(newImgs);
          }
        };
        reader.readAsDataURL(file);
      };

      const handleSave = async () => {
        setSaving(true);
        const data = { ...form, teacherUsername: user.username, teacherName: user.fullName, classLevel: user.classLevel, studentNo: student.studentNo, studentName: student.studentName, nickname: student.nickname, imagesBase64: images.filter(img => img !== null) };
        const res = await api.post({ action: "saveVisit", data });
        if (!res.success) { showToast(res.message || "เกิดข้อผิดพลาด", "error"); setSaving(false); return; }
        setSaving(false); onDone();
      };

      const Input = ({ label, type="text", k, placeholder="" }) => (<div className="mb-5"><label className="block text-sm font-bold text-slate-600 mb-2 ml-1">{label}</label><input type={type} value={form[k]} onChange={e=>set(k, e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 font-bold text-slate-700 transition-all shadow-inner" placeholder={placeholder}/></div>);
      const Select = ({ label, k, options }) => (<div className="mb-5"><label className="block text-sm font-bold text-slate-600 mb-2 ml-1">{label}</label><select value={form[k]} onChange={e=>set(k, e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 font-bold text-slate-700 transition-all cursor-pointer shadow-inner"><option value="">-- เลือก --</option>{options.map(o=><option key={o}>{o}</option>)}</select></div>);
      const Textarea = ({ label, k, rows=3 }) => (<div className="mb-5"><label className="block text-sm font-bold text-slate-600 mb-2 ml-1">{label}</label><textarea rows={rows} value={form[k]} onChange={e=>set(k, e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 font-medium text-slate-700 transition-all resize-y shadow-inner"/></div>);

      return (
        <div className="slide-up max-w-3xl mx-auto">
          <div className="flex items-center gap-4 mb-6">
            <button onClick={onBack} className="w-12 h-12 bg-white rounded-2xl shadow-sm border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-all"><i className="fa-solid fa-arrow-left"></i></button>
            <div><h2 className="text-3xl font-black text-slate-800 tracking-tight">{student.studentName}</h2><p className="text-blue-500 font-bold text-sm mt-1">เลขที่ {student.studentNo} {student.nickname && `• ชื่อเล่น: ${student.nickname}`}</p></div>
          </div>

          <div className="flex gap-2 overflow-x-auto custom-scroll pb-2 mb-6 p-1 bg-slate-200/50 rounded-2xl">
            {TABS.map((t, i) => (
              <button key={i} onClick={() => setTab(i)} className={`flex-1 min-w-[120px] px-4 py-3 rounded-xl font-bold text-sm transition-all duration-300 ${tab === i ? 'bg-white text-blue-600 shadow-md transform scale-100' : 'text-slate-500 hover:bg-white/50 transform scale-95'}`}>{t}</button>
            ))}
          </div>

          <div className="glass-card p-8 md:p-10 rounded-[2.5rem] shadow-xl border border-white min-h-[450px]">
            <div className="fade-in" key={tab}>
              {tab === 0 && <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6"><Select label="ภาคเรียน" k="semester" options={["1","2"]}/><Select label="สถานะการเยี่ยม" k="visitStatus" options={VISIT_STAT}/><Input label="วันที่เยี่ยมบ้าน" type="date" k="visitDate"/><div className="col-span-full"><Textarea label="การสังเกตและสอบถามเบื้องต้น" k="observations" rows={4}/></div></div>}
              
              {tab === 1 && <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                <Input label="ลักษณะที่พัก (เช่น บ้านเดี่ยว, หอพัก)" k="houseType"/>
                <div className="mb-5 relative">
                  <label className="block text-sm font-bold text-slate-600 mb-2 ml-1">ระยะทางถึง รร. (กม.)</label>
                  <div className="flex gap-2">
                    <input type="number" value={form.distanceKm} onChange={e=>set("distanceKm", e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 font-bold text-slate-700 shadow-inner" placeholder="ระบุตัวเลข"/>
                    <button onClick={getGPS} disabled={gpsLoading} className="bg-gradient-to-br from-indigo-500 to-blue-600 text-white px-5 rounded-xl font-bold shadow-md hover:shadow-lg transition-all disabled:opacity-70" title="ดึงพิกัด GPS อัตโนมัติ">
                      {gpsLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-location-crosshairs text-lg"></i>}
                    </button>
                  </div>
                </div>
                <Input label="วิธีการเดินทาง" k="travelMethod"/><Select label="สภาพบ้าน" k="houseCondition" options={HOUSE_COND}/><Input label="สาธารณูปโภค (น้ำ/ไฟ)" k="utilities"/><div className="col-span-full"><Textarea label="สภาพแวดล้อมรอบบ้าน" k="environment"/></div>
              </div>}
              
              {tab === 2 && <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6"><Input label="จำนวนสมาชิก (คน)" type="number" k="familyMembers"/><Input label="พี่น้อง (คน)" type="number" k="siblings"/><Select label="ความสัมพันธ์ในครอบครัว" k="familyRelationship" options={REL_OPTS}/><Input label="รายได้ครอบครัว (บาท)" type="number" k="familyIncome"/><div className="col-span-full"><Input label="ภาระงานของนักเรียน" k="studentDuties"/><Textarea label="กิจกรรมร่วมกัน" k="familyActivities"/></div></div>}
              
              {tab === 3 && <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6"><Input label="สุขภาพ" k="riskHealth"/><Input label="ความปลอดภัย" k="riskSafety"/><Input label="การเดินทาง" k="riskTravel"/><Input label="เศรษฐกิจ" k="riskWork"/><Input label="การคบเพื่อน" k="riskSocial"/><Input label="สารเสพติด" k="riskSubstance"/><div className="col-span-full"><Textarea label="ข้อห่วงใยของผู้ปกครอง" k="parentConcerns" rows={4}/></div></div>}
              
              {tab === 4 && <div>
                <h4 className="font-bold text-slate-700 mb-4"><i className="fa-solid fa-images text-blue-500 mr-2"></i>อัปโหลดรูปภาพ (ระบบจะย่อขนาดและบันทึกอัตโนมัติ)</h4>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                  {[0,1,2,3].map(n => (
                    <div key={n} className="relative aspect-square border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50 flex flex-col items-center justify-center overflow-hidden hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer group">
                      {images[n] ? ( <><img src={images[n]} className="w-full h-full object-cover" /><div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-pen text-white text-2xl"></i></div></> ) : ( <><i className="fa-solid fa-camera text-3xl text-slate-300 group-hover:text-blue-400 mb-2"></i><span className="text-xs font-bold text-slate-400 group-hover:text-blue-500">รูปที่ {n+1}</span></> )}
                      <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, n)} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full" />
                    </div>
                  ))}
                </div>
                <Select label="สรุปผลการเยี่ยมบ้าน" k="visitResult" options={RESULT_OPTS}/>
                <Textarea label="บันทึกเพิ่มเติมจากครู" k="teacherNotes" rows={4}/>
              </div>}
            </div>

            <div className="flex justify-between mt-10 pt-6 border-t border-slate-100">
              <button onClick={() => setTab(Math.max(0, tab - 1))} disabled={tab === 0} className="px-6 py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 disabled:opacity-30 transition-colors"><i className="fa-solid fa-arrow-left mr-2"></i>ย้อนกลับ</button>
              {tab < TABS.length - 1 ? (
                <button onClick={() => setTab(tab + 1)} className="px-8 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition-all">ถัดไป<i className="fa-solid fa-arrow-right ml-2"></i></button>
              ) : (
                <button onClick={handleSave} disabled={saving} className="px-10 py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 shadow-lg shadow-emerald-500/30 transition-all flex items-center gap-2 transform hover:-translate-y-1 disabled:opacity-70 disabled:hover:translate-y-0">
                  {saving ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-cloud-arrow-up"></i>} {saving ? "กำลังอัปโหลด..." : "บันทึกข้อมูล"}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // --- 3. หน้าจัดการข้อมูลนักเรียน (CRUD + Import Excel) ---
    function StudentManage({ user, showToast }) {
      const [students, setStudents] = useState([]);
      const [loading, setLoading] = useState(true);

      const loadData = () => {
        setLoading(true);
        api.get("getStudents", { classLevel: user.classLevel }).then(r => { if (r.success) setStudents(r.data); setLoading(false); });
      };
      useEffect(() => { loadData(); }, []);

      const handleDelete = async (id) => {
        if(!confirm(`ลบนักเรียนเลขที่ ${id}?`)) return;
        const res = await api.post({ action: "deleteStudent", studentNo: id, classLevel: user.classLevel });
        if(res.success) { showToast("ลบสำเร็จ", "success"); loadData(); } else showToast("ลบไม่สำเร็จ", "error");
      };

      const handleImportExcel = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = async (evt) => {
          showToast("กำลังนำเข้าข้อมูล...", "success");
          const bstr = evt.target.result; const wb = XLSX.read(bstr, {type:'binary'}); const wsname = wb.SheetNames[0]; const ws = wb.Sheets[wsname];
          const data = XLSX.utils.sheet_to_json(ws, {header:1}); 
          // ข้าม Header 1 แถว สมมติโครงสร้าง [เลขที่, ชื่อ, ชื่อเล่น, ชั้น]
          const newStudents = data.slice(1).filter(r => r[0] && r[1]).map(r => ({ studentNo: r[0], studentName: r[1], nickname: r[2]||"", classLevel: r[3]||user.classLevel }));
          
          const res = await api.post({ action: "importStudents", students: newStudents });
          if(res.success) { showToast(`นำเข้าสำเร็จ ${newStudents.length} คน`, "success"); loadData(); } else showToast("เกิดข้อผิดพลาด", "error");
        };
        reader.readAsBinaryString(file);
        e.target.value = ""; // reset
      };

      if (loading) return <div className="text-center py-20"><i className="fa-solid fa-spinner fa-spin text-5xl text-blue-500 mb-4 block"></i></div>;

      return (
        <div className="slide-up">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
            <div><h2 className="text-3xl font-black text-slate-800 mb-2">จัดการข้อมูลนักเรียน</h2><p className="text-slate-500 font-medium">นำเข้าข้อมูลจาก Excel หรือลบข้อมูลที่ไม่ต้องการ</p></div>
            <div className="flex gap-2">
              <label className="bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 px-5 py-3 rounded-xl font-bold shadow-sm cursor-pointer transition-all flex items-center gap-2">
                <i className="fa-solid fa-file-import text-blue-500"></i> นำเข้า Excel
                <input type="file" accept=".xlsx, .xls" onChange={handleImportExcel} className="hidden" />
              </label>
              <a href="#" onClick={(e)=>{e.preventDefault(); alert("คอลัมน์ A: เลขที่\nคอลัมน์ B: ชื่อ-นามสกุล\nคอลัมน์ C: ชื่อเล่น\nคอลัมน์ D: ชั้นเรียน");}} className="text-blue-500 text-sm flex items-center ml-2 underline">ดูรูปแบบไฟล์</a>
            </div>
          </div>
          <div className="glass-card rounded-[2rem] overflow-hidden shadow-sm">
            <div className="overflow-x-auto p-4">
              <table className="w-full text-left border-collapse">
                <thead><tr className="text-slate-400 text-xs uppercase border-b-2 border-slate-100"><th className="py-4 px-6 font-bold w-20 text-center">เลขที่</th><th className="py-4 px-6 font-bold">ชื่อ-นามสกุล</th><th className="py-4 px-6 font-bold">ชั้น</th><th className="py-4 px-6 font-bold text-center w-24">ลบ</th></tr></thead>
                <tbody className="divide-y divide-slate-100">
                  {students.map((s,i) => (
                    <tr key={i} className="hover:bg-slate-50/50">
                      <td className="py-4 px-6 text-center font-bold text-blue-600">{s.studentNo}</td>
                      <td className="py-4 px-6"><span className="font-bold text-slate-700">{s.studentName}</span> {s.nickname && <span className="text-xs text-slate-400 ml-2">({s.nickname})</span>}</td>
                      <td className="py-4 px-6 font-bold text-slate-500">{s.classLevel}</td>
                      <td className="py-4 px-6 text-center"><button onClick={() => handleDelete(s.studentNo)} className="w-10 h-10 rounded-xl bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition-colors"><i className="fa-solid fa-trash-can"></i></button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // --- 4. หน้าส่งออกรายงาน PDF แบบฟอร์มแน่นๆ ---
    function ReportExport({ user, showToast, refreshKey }) {
      const [visits, setVisits] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        api.get("getVisitsFull", { classLevel: user.classLevel }).then(r => { if (r.success) setVisits(r.data); setLoading(false); });
      }, [refreshKey]);

      const generatePDF = (studentName) => {
        const data = visits.find(v => v.StudentName === studentName);
        if(!data) return showToast("ไม่พบข้อมูลรายงาน", "error");

        showToast("กำลังสร้างเอกสาร PDF...", "success");
        
        // ใส่ข้อมูลลงใน Template
        document.getElementById('pdf-name').innerText = data.StudentName;
        document.getElementById('pdf-no').innerText = data.StudentNo;
        document.getElementById('pdf-class').innerText = data.ClassLevel;
        document.getElementById('pdf-date').innerText = new Date(data.VisitDate).toLocaleDateString('th-TH');
        
        document.getElementById('pdf-t1').innerText = data.HouseType || '-';
        document.getElementById('pdf-t2').innerText = data.DistanceKm ? `${data.DistanceKm} กม.` : '-';
        document.getElementById('pdf-t3').innerText = data.TravelMethod || '-';
        document.getElementById('pdf-t4').innerText = data.HouseCondition || '-';
        
        document.getElementById('pdf-r1').innerText = data.VisitResult || '-';
        document.getElementById('pdf-r2').innerText = data.TeacherNotes || '-';

        // วางรูปภาพ
        const imgContainer = document.getElementById('pdf-images');
        imgContainer.innerHTML = '';
        if(data.Images) {
          const urls = data.Images.split(',');
          urls.forEach(url => {
            if(url.trim()) imgContainer.innerHTML += `<div style="width: 48%; height: 200px; margin-bottom: 10px; display: inline-block; padding: 5px;"><img src="${url.trim()}" style="width: 100%; height: 100%; object-fit: cover; border: 1px solid #ccc; border-radius: 8px;"></div>`;
          });
        }

        // Generate PDF
        const element = document.getElementById('pdf-report-container');
        element.style.left = '0px'; element.style.zIndex = '-100';
        
        const opt = { margin: 10, filename: `เยี่ยมบ้าน_${data.StudentName}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        
        setTimeout(() => { html2pdf().set(opt).from(element).save().then(() => { element.style.left = '-9999px'; }); }, 800);
      };

      if (loading) return <div className="text-center py-20"><i className="fa-solid fa-spinner fa-spin text-5xl text-blue-500 mb-4 block"></i></div>;

      const visitedList = visits.filter(v => v.VisitStatus === "เยี่ยมแล้ว");

      return (
        <div className="slide-up">
          <h2 className="text-3xl font-black text-slate-800 mb-2">พิมพ์รายงานเยี่ยมบ้าน</h2>
          <p className="text-slate-500 font-medium mb-8">เลือกนักเรียนที่เยี่ยมแล้ว เพื่อพิมพ์รายงานรายบุคคล</p>
          
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {visitedList.length === 0 && <p className="text-slate-400 font-bold">ยังไม่มีนักเรียนที่เยี่ยมแล้ว</p>}
            {visitedList.map((v, i) => (
              <div key={i} className="glass-card p-6 rounded-3xl border border-slate-100 flex flex-col justify-between hover:shadow-lg hover:-translate-y-1 transition-all">
                <div className="mb-4">
                  <div className="bg-blue-100 text-blue-600 w-10 h-10 rounded-xl flex items-center justify-center font-black mb-3">{v.StudentNo}</div>
                  <h4 className="font-bold text-slate-800">{v.StudentName}</h4>
                  <p className="text-xs text-slate-500 mt-1"><i className="fa-solid fa-calendar text-emerald-500 mr-1"></i>เยี่ยมเมื่อ: {new Date(v.VisitDate).toLocaleDateString('th-TH')}</p>
                </div>
                <button onClick={() => generatePDF(v.StudentName)} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors">
                  <i className="fa-solid fa-print"></i> พิมพ์ PDF
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DashboardApp />);
  </script>

  <!-- PDF Template Hidden -->
  <div id="pdf-report-container">
    <div style="text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
      <h2 style="font-size: 20px; font-weight: bold; margin: 0;">แบบรายงานการเยี่ยมบ้านนักเรียน</h2>
      <h3 style="font-size: 16px; margin: 5px 0 0 0;">โรงเรียนป่าก้าง ปีการศึกษา 2568</h3>
    </div>
    
    <div style="margin-bottom: 15px; font-size: 14px;">
      <strong>ชื่อ-นามสกุล:</strong> <span id="pdf-name"></span><br>
      <strong>ชั้น:</strong> <span id="pdf-class"></span> &nbsp;&nbsp;&nbsp; <strong>เลขที่:</strong> <span id="pdf-no"></span><br>
      <strong>วันที่เยี่ยมบ้าน:</strong> <span id="pdf-date"></span>
    </div>

    <table class="pdf-table">
      <tr><th>ลักษณะที่อยู่อาศัย</th><td id="pdf-t1"></td></tr>
      <tr><th>ระยะทางถึงโรงเรียน</th><td id="pdf-t2"></td></tr>
      <tr><th>การเดินทาง</th><td id="pdf-t3"></td></tr>
      <tr><th>สภาพบ้าน</th><td id="pdf-t4"></td></tr>
      <tr><th>สรุปผลการเยี่ยม</th><td id="pdf-r1" style="color: red; font-weight: bold;"></td></tr>
      <tr><th>บันทึกจากครู</th><td id="pdf-r2"></td></tr>
    </table>

    <div style="margin-top: 25px;">
      <h4 style="font-size: 14px; font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 5px;">ภาพถ่ายการเยี่ยมบ้าน</h4>
      <div id="pdf-images" style="margin-top: 15px;"></div>
    </div>
  </div>
</body>
</html>
