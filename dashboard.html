<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเยี่ยมบ้านนักเรียน (Anti-Crash & Ultimate PDF)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; color: #334155; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    
    .soft-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(241, 245, 249, 1); box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05); border-radius: 2rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .soft-card:hover { transform: translateY(-2px); box-shadow: 0 15px 40px -10px rgba(0, 0, 0, 0.08); }
    
    .input-wrapper { position: relative; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 1.25rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .input-wrapper:focus-within { background: #ffffff; border-color: #60a5fa; box-shadow: 0 10px 25px -5px rgba(96, 165, 250, 0.2), 0 0 0 4px rgba(96, 165, 250, 0.1); transform: translateY(-2px); }
    .premium-input { width: 100%; background: transparent; border: none; padding: 1.2rem 1.5rem; font-family: 'Prompt', sans-serif; font-weight: 500; color: #1e293b; outline: none; }
    
    .btn-press { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 9999px; cursor: pointer; }
    .btn-press:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -6px rgba(0,0,0,0.15); }
    .btn-press:active { transform: scale(0.96); box-shadow: 0 2px 5px -2px rgba(0,0,0,0.1); }
    
    .hide-scroll::-webkit-scrollbar { display: none; }

    /* คอนเทนเนอร์ลับสำหรับสร้าง PDF แบบสมบูรณ์แบบ ป้องกันจอขาว */
    #pdf-engine-root { position: absolute; left: -9999px; top: -9999px; visibility: hidden; width: 800px; background: #fff; z-index: -100; }
  </style>
</head>
<body class="h-screen overflow-hidden bg-slate-50">
  <div id="root" class="h-full w-full"></div>
  <div id="pdf-engine-root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // 🔴 ใส่ URL ที่ Deploy ใหม่ล่าสุดตรงนี้ 🔴
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhsSolB88xpEQUdzV6GuYeY_GTI7kGDFQWzk6ApTEz5esM_IQitAqR0g4z--9GxNzT/exec";
    
    const SCHOOL_LAT = 18.862105; const SCHOOL_LON = 99.0872654;
    const HOUSE_COND = ["ดีมาก","ดี","ปานกลาง","ทรุดโทรม","ไม่ปลอดภัย"];
    const REL_OPTS = ["อบอุ่นดีมาก","อบอุ่นดี","ปานกลาง","ไม่ค่อยอบอุ่น","มีปัญหา"];
    const VISIT_STAT = ["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"];
    const RESULT_OPTS = ["ปกติ","ต้องเฝ้าระวัง","ต้องช่วยเหลือเร่งด่วน","ส่งต่อ"];

    const api = {
      async get(action, params = {}) {
        const q = new URLSearchParams({ action, t: Date.now(), ...params }).toString();
        try { const r = await fetch(`${SCRIPT_URL}?${q}`, { cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
      },
      async post(body) {
        try { const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "text/plain" }, cache: "no-store" }); return await r.json(); } catch(e){return {success:false};}
      }
    };

    // 🛡️ ป้องกัน Object Error
    const getVal = (obj, key) => {
      if (!obj || typeof obj !== 'object') return "";
      const k = Object.keys(obj).find(x => String(x).toLowerCase().trim() === String(key).toLowerCase().trim());
      return k && obj[k] !== undefined && obj[k] !== null ? String(obj[k]).trim() : "";
    };

    const compareId = (id1, id2) => String(id1 || "").replace(/^0+/, '').trim() === String(id2 || "").replace(/^0+/, '').trim();

    const getVisitStatus = (visits, studentNo) => {
      if (!visits || !studentNo) return "ยังไม่เยี่ยม";
      const v = visits.slice().reverse().find(v => compareId(getVal(v, 'studentNo'), studentNo));
      return v ? (getVal(v, 'visitStatus') || "ยังไม่เยี่ยม") : "ยังไม่เยี่ยม";
    };

    const checkIsAdmin = (lvl) => {
      const c = String(lvl || "").toLowerCase().trim();
      return c === "แอดมิน" || c === "admin" || c === "ทั้งหมด" || c === "ผู้บริหาร";
    };

    // 🌟 พระเอกกู้ชีพ: จัดการวันที่เสียๆ จาก Excel เพื่อป้องกันจอขาว 100% 🌟
    const formatSafeDate = (dateVal, options) => {
      if (!dateVal || String(dateVal).trim() === "") return "-";
      try {
        const d = new Date(dateVal);
        if (isNaN(d.getTime())) return String(dateVal); // ถ้าระบุว่า "ไม่ได้นัด" ก็ให้แสดงแบบนั้น ไม่พัง
        return d.toLocaleDateString('th-TH', options);
      } catch(e) {
        return "-";
      }
    };

    const safeDateForInput = (dateStr) => {
      if (!dateStr || String(dateStr).trim() === "") return new Date().toISOString().split("T")[0];
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return new Date().toISOString().split("T")[0];
        return d.toISOString().split("T")[0];
      } catch(e) { return new Date().toISOString().split("T")[0]; }
    };

    // 🌟 ระบบแยกภาพ & คลีนลิงก์ที่เสียจากบั๊กเก่า 🌟
    const parseImages = (str) => {
      if (!str) return [];
      let arr = [];
      if (String(str).includes("|||")) {
        arr = String(str).split("|||").map(s => s.trim()).filter(Boolean);
      } else {
        const parts = String(str).split(",");
        for (let i = 0; i < parts.length; i++) {
          const p = parts[i].trim();
          if (!p) continue;
          if (p.startsWith("data:image")) {
            if (parts[i+1]) { arr.push(p + "," + parts[i+1].trim()); i++; } 
            else { arr.push(p); }
          } else { arr.push(p); }
        }
      }
      // คัดกรองลิงก์ที่พังจากบัก {file.getId()} ทิ้งเพื่อความสวยงาม
      return arr.filter(link => !link.includes("{file.getId()}"));
    };

    // ============= UI Components =============
    const PremiumInput = ({ label, value, onChange, type="text", placeholder="", icon, disabled=false }) => (
      <div className="mb-6 pop-in">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">{label}</label>
        <div className={`input-wrapper flex items-center overflow-hidden ${disabled ? 'opacity-60 bg-slate-100' : ''}`}>
          {icon && <div className="pl-5 text-slate-400"><i className={`fa-solid ${icon} text-lg`}></i></div>}
          <input type={type} value={value || ""} onChange={onChange} disabled={disabled} placeholder={placeholder} className={`premium-input ${icon ? 'pl-4' : ''}`} />
        </div>
      </div>
    );

    const PremiumSelect = ({ label, value, onChange, options, icon, disabled=false }) => (
      <div className="mb-6 pop-in">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">{label}</label>
        <div className={`input-wrapper flex items-center overflow-hidden relative ${disabled ? 'opacity-60 bg-slate-100' : ''}`}>
          {icon && <div className="pl-5 text-slate-400"><i className={`fa-solid ${icon} text-lg`}></i></div>}
          <select value={value || ""} onChange={onChange} disabled={disabled} className={`premium-input appearance-none cursor-pointer ${icon ? 'pl-4' : ''} bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[position:right_1.5rem_center] bg-[length:0.8rem_auto]`}>
            <option value="">- กรุณาเลือก -</option>
            {options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        </div>
      </div>
    );

    const PremiumTextarea = ({ label, value, onChange, rows=3, placeholder="" }) => (
      <div className="mb-6 pop-in">
        <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">{label}</label>
        <div className="input-wrapper">
          <textarea rows={rows} value={value || ""} onChange={onChange} placeholder={placeholder} className="premium-input resize-none rounded-[1.25rem]"></textarea>
        </div>
      </div>
    );

    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
      return (
        <div className={`fixed top-6 right-6 z-[9999] px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 slide-up ${type === 'success' ? 'bg-emerald-500 text-white shadow-emerald-500/40' : type === 'warning' ? 'bg-amber-500 text-white shadow-amber-500/40' : 'bg-rose-500 text-white shadow-rose-500/40'}`}>
          <i className={`fa-solid ${type === 'success' ? 'fa-check' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-xmark'} text-xl`}></i><span className="font-bold tracking-wide">{msg}</span>
        </div>
      );
    };

    const GpsPopup = ({ status, distance }) => {
      if (!status) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center fade-in">
          <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl flex flex-col items-center bounce-in w-[340px]">
            {status === "loading" && (
              <>
                <div className="relative flex justify-center items-center w-24 h-24 bg-blue-50 rounded-full mb-6">
                  <div className="absolute inset-0 border-[4px] border-blue-300 rounded-full animate-[ping_1.5s_cubic-bezier(0,0,0.2,1)_infinite] opacity-70"></div>
                  <i className="fa-solid fa-location-crosshairs text-4xl text-blue-500"></i>
                </div>
                <h3 className="font-black text-slate-800 text-2xl mb-1">คำนวณพิกัด</h3>
                <p className="font-medium text-slate-500 text-center">ค้นหาระยะทางจากโรงเรียน...</p>
              </>
            )}
            {status === "success" && (
              <>
                <div className="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mb-6"><i className="fa-solid fa-check text-5xl text-emerald-500 bounce-in"></i></div>
                <h3 className="font-black text-slate-800 text-2xl mb-1">สำเร็จ!</h3>
                <p className="font-medium text-slate-500 text-center">ห่างจากโรงเรียน <span className="font-black text-emerald-600 text-xl">{distance} กม.</span></p>
              </>
            )}
            {status === "error" && (
              <>
                <div className="w-24 h-24 bg-rose-50 rounded-full flex items-center justify-center mb-6"><i className="fa-solid fa-xmark text-5xl text-rose-500 bounce-in"></i></div>
                <h3 className="font-black text-slate-800 text-2xl mb-1">ข้อผิดพลาด</h3>
                <p className="font-medium text-slate-500 text-center">เบราว์เซอร์ไม่รองรับ หรือปิด GPS ไว้</p>
              </>
            )}
          </div>
        </div>
      );
    };

    // ============= Main Dashboard App =============
    function DashboardApp() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState("dashboard"); 
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [toast, setToast] = useState(null);
      
      const [globalStudents, setGlobalStudents] = useState([]);
      const [globalVisits, setGlobalVisits] = useState([]);
      
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth >= 768);

      const [adminClassFilter, setAdminClassFilter] = useState("ทั้งหมด");
      const [sidebarSearch, setSidebarSearch] = useState("");
      
      const showToast = useCallback((msg, type = "success") => setToast({ msg, type }), []);

      useEffect(() => {
        const u = localStorage.getItem("hv_user_v14");
        if (u) { 
          const parsed = JSON.parse(u);
          setUser(parsed); 
          loadAllData(parsed); 
        }
      }, []);

      const loadAllData = async (u) => {
        setIsDataLoaded(false);
        const [sRes, vRes] = await Promise.all([
          api.get("getStudents", { classLevel: u.classLevel }),
          api.get("getVisitsFull", { classLevel: u.classLevel })
        ]);
        if (sRes.success) setGlobalStudents(sRes.data);
        if (vRes.success) setGlobalVisits(vRes.data);
        setIsDataLoaded(true);
      };

      const handleLogin = async (code) => {
        const res = await api.post({ action: "getTeacherByCode", code });
        if (res.success) {
          localStorage.setItem("hv_user_v14", JSON.stringify(res.data));
          setUser(res.data); loadAllData(res.data);
        } else showToast("รหัสไม่ถูกต้อง", "error");
      };

      const saveVisit = async (formData, images) => {
        setIsSaving(true);
        const finalImagesString = images.join("|||"); 
        const data = { ...formData, images: finalImagesString, teacherCode: user.code, teacherName: user.fullName, classLevel: formData.classLevel || user.classLevel, imagesBase64: images.filter(i=>i.startsWith("data:")), existingImageUrls: images.filter(i=>!i.startsWith("data:")) };
        
        const res = await api.post({ action: "saveVisit", data });
        if (res.success) {
          showToast("บันทึกข้อมูลเรียบร้อย!", "success");
          
          setGlobalVisits(prev => {
            const arr = [...prev];
            const idx = arr.findIndex(v => compareId(getVal(v, "studentNo"), data.studentNo));
            const newData = {...data, timestamp: new Date().toISOString()};
            if(idx > -1) arr[idx] = newData; else arr.push(newData);
            return arr;
          });

          api.get("getVisitsFull", { classLevel: user.classLevel }).then(r => { if(r.success) setGlobalVisits(r.data); });
          setView("profile"); 
        } else {
          showToast(res.message || "เกิดข้อผิดพลาดในการบันทึก", "error");
        }
        setIsSaving(false);
      };

      if (!user) return <Login onLogin={handleLogin} />;

      const isAdmin = checkIsAdmin(user.classLevel);
      const uniqueClasses = [...new Set(globalStudents.map(s => getVal(s, 'classLevel')))].filter(Boolean).sort();
      
      const displayedStudents = isAdmin && adminClassFilter !== "ทั้งหมด" 
          ? globalStudents.filter(s => getVal(s, 'classLevel') === adminClassFilter) 
          : globalStudents;
          
      const displayedVisits = isAdmin && adminClassFilter !== "ทั้งหมด"
          ? globalVisits.filter(v => getVal(v, 'classLevel') === adminClassFilter)
          : globalVisits;

      const sidebarSearchResults = sidebarSearch 
        ? displayedStudents.filter(s => 
            String(s.studentName).includes(sidebarSearch) || 
            String(s.studentNo).includes(sidebarSearch) || 
            (s.nickname && String(s.nickname).includes(sidebarSearch))
          ).slice(0, 5) 
        : [];

      return (
        <div className="flex h-screen bg-[#f4f7fb] fade-in">
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          
          {isSaving && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center fade-in">
               <div className="bg-white px-10 py-8 rounded-[2rem] shadow-2xl flex flex-col items-center bounce-in">
                  <div className="relative w-20 h-20 mb-4 flex items-center justify-center">
                    <div className="absolute inset-0 border-4 border-slate-100 border-t-blue-500 rounded-full animate-spin"></div>
                    <i className="fa-solid fa-cloud-arrow-up text-3xl text-blue-500"></i>
                  </div>
                  <p className="font-black text-slate-800 text-lg">กำลังประมวลผลข้อมูลและรูปภาพ...</p>
               </div>
            </div>
          )}

          {window.innerWidth < 768 && isSidebarOpen && <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 fade-in" onClick={() => setIsSidebarOpen(false)}></div>}
          
          <aside className={`fixed md:relative z-50 bg-white border-r border-slate-100 flex flex-col h-full transition-transform duration-300 shadow-[10px_0_30px_rgba(0,0,0,0.02)] ${isSidebarOpen ? 'translate-x-0 w-[280px]' : '-translate-x-full md:translate-x-0 md:w-[90px]'}`}>
             <div className="p-8 border-b border-slate-50 flex flex-col items-center">
                <div className={`bg-gradient-to-tr ${isAdmin ? 'from-purple-100 to-pink-50' : 'from-blue-50 to-indigo-50'} rounded-[1.5rem] mb-4 flex items-center justify-center shadow-inner transition-all ${isSidebarOpen ? 'w-24 h-24' : 'w-12 h-12'}`}>
                  <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(user.fullName)}&background=ffffff&color=${isAdmin ? '9333EA' : '2563EB'}&bold=true`} className="w-full h-full rounded-[1.5rem] object-cover" />
                </div>
                {isSidebarOpen && (
                  <div className="text-center fade-in">
                    <h2 className="font-black text-slate-800 tracking-tight">{user.fullName}</h2>
                    <p className={`text-sm font-bold px-4 py-1.5 rounded-full mt-2 inline-block shadow-sm ${isAdmin ? 'bg-purple-50 text-purple-600' : 'bg-blue-50 text-blue-600'}`}>{isAdmin ? 'ผู้ดูแลระบบ' : `ชั้น ${user.classLevel}`}</p>
                  </div>
                )}
             </div>
             
             {isSidebarOpen && (
               <div className="px-5 mt-5 mb-2 relative fade-in z-50">
                 <div className="input-wrapper flex items-center bg-slate-50 border-slate-200 rounded-[1.2rem] px-4 py-3">
                   <i className="fa-solid fa-search text-slate-400"></i>
                   <input type="text" value={sidebarSearch} onChange={e=>setSidebarSearch(e.target.value)} placeholder="ค้นหาประวัติเด็ก..." className="w-full bg-transparent border-none outline-none pl-3 text-sm font-bold text-slate-700"/>
                 </div>
                 {sidebarSearch && (
                   <div className="absolute top-full left-5 right-5 mt-2 bg-white border border-slate-100 shadow-2xl rounded-2xl overflow-hidden pop-in">
                     {sidebarSearchResults.length === 0 ? (
                        <div className="p-4 text-center text-slate-400 text-sm font-bold">ไม่พบรายชื่อ</div>
                     ) : sidebarSearchResults.map((s, i) => (
                        <button key={i} onClick={() => { 
                          setSelectedStudent(s); 
                          setView("profile"); 
                          setSidebarSearch(""); 
                          if(window.innerWidth < 768) setIsSidebarOpen(false); 
                        }} className="w-full text-left px-5 py-3 hover:bg-blue-50 border-b border-slate-50 last:border-0 flex items-center gap-3 transition-colors group cursor-pointer">
                          <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-black text-xs">{s.studentNo}</div>
                          <div className="flex-1 overflow-hidden">
                            <span className="font-black text-slate-800 text-sm group-hover:text-blue-600 truncate block">{s.studentName}</span>
                          </div>
                        </button>
                     ))}
                   </div>
                 )}
               </div>
             )}

             <nav className="flex-1 p-5 space-y-2 overflow-y-auto hide-scroll z-40">
                <NavBtn icon="fa-chart-pie" label="สรุปภาพรวม" active={view==="dashboard"} open={isSidebarOpen} onClick={()=>{setView("dashboard"); if(window.innerWidth<768) setIsSidebarOpen(false);}} color={isAdmin ? "purple" : "blue"} />
                <NavBtn icon="fa-users" label="รายชื่อทั้งหมด" active={view==="students" || view==="form" || view==="profile"} open={isSidebarOpen} onClick={()=>{setView("students"); setSelectedStudent(null); if(window.innerWidth<768) setIsSidebarOpen(false);}} color={isAdmin ? "purple" : "blue"} />

      const urlToBase64 = (url) => {
        return new Promise((resolve) => {
          if (!url) return resolve(null);
          if (url.startsWith('data:image')) return resolve(url);
          
          let imgUrl = url;
          const driveMatch = url.match(/[-\w]{25,}/);
          if (driveMatch) {
            // บังคับแปลงเป็นลิงก์ lh3 เสมอ เพื่อลดปัญหาการดึงรูป
            imgUrl = `https://lh3.googleusercontent.com/d/${driveMatch[0]}=w800`;
          }
          
          const img = new Image(); 
          img.crossOrigin = "anonymous";
          img.onload = () => {
            try {
              const canvas = document.createElement('canvas'); 
              const MAX_WIDTH = 600; 
              let width = img.width; let height = img.height;
              if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
              canvas.width = width; canvas.height = height;
              canvas.getContext('2d').drawImage(img, 0, 0, width, height); 
              resolve(canvas.toDataURL('image/jpeg', 0.8));
            } catch (e) { resolve(imgUrl); } // fallback ให้ html2pdf จัดการเอง
          };
          img.onerror = () => resolve(imgUrl); // ถ้าโดนบล็อก ก็ดันทุรังส่ง URL ดิบไป
          img.src = imgUrl;
        });

      const exportExcel = () => {

        });
        const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Report");
        XLSX.writeFile(wb, `รายงานสรุปภาพรวม_${user.classLevel}.xlsx`);

      const exportPDF = async () => {

        setGenerating(true);
        showToast("กำลังดาวน์โหลดภาพและสร้าง PDF...", "success");

        const targetStudents = students.filter(s => selectedStudents.has(s.studentNo));
        const dateStr = new Date().toLocaleDateString("th-TH");

        const container = document.getElementById("pdf-engine-root");
        
        let html = `
          <div style="text-align: center; margin-bottom: 20px; padding-top: 5px;">
            <h1 style="color: #1e40af; font-size: 24px; font-weight: bold; margin-bottom: 8px;">รายงานผลการเยี่ยมบ้านนักเรียน</h1>
            <div style="height: 3px; background-color: #3b82f6; width: 60%; margin: 0 auto 10px auto;"></div>
            <p style="color: #64748b; font-size: 13px; margin: 0;">พิมพ์เมื่อ: ${dateStr} | ข้อมูลโดย: ${user.fullName}</p>

        for (let i = 0; i < targetStudents.length; i++) {

          html += `
            <div style="border: 1px solid #94a3b8; border-radius: 6px; overflow: hidden; margin-bottom: 20px; page-break-inside: avoid; background-color: #ffffff;">
              <div style="background-color: #eff6ff; padding: 8px 12px; border-bottom: 1px solid #94a3b8;">
                <h2 style="color: #1e40af; font-size: 15px; margin: 0; font-weight: bold;">${i + 1}. เลขที่ ${s.studentNo} - ${s.studentName} (ชั้น ${getVal(s, "classLevel")})</h2>
              </div>
              <div style="padding: 0;">
                <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
                  <tbody>
                    <tr>
                      <td style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; font-weight: bold; background-color:#f8fafc; width: 20%;">วันที่เยี่ยม</td>
                      <td style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0; width: 30%;">${vDate}</td>
                      <td style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; font-weight: bold; background-color:#f8fafc; width: 20%;">ระยะทาง</td>
                      <td style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0; width: 30%;">${dist}</td>
                    </tr>
                    <tr>
                      <td style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; font-weight: bold; background-color:#f8fafc;">ลักษณะที่พัก</td>
                      <td style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0;">${getVal(v, "houseType") || '-'}</td>
                      <td style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; font-weight: bold; background-color:#f8fafc;">สภาพบ้าน</td>
                      <td style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0;">${getVal(v, "houseCondition") || '-'}</td>
                    </tr>
                    <tr>
                      <td style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; font-weight: bold; background-color:#f8fafc;">สรุปผล</td>
                      <td colspan="3" style="padding: 6px 10px; border-bottom: 1px solid #e2e8f0; font-weight: bold; color: #1e40af;">${getVal(v, "visitResult") || '-'}</td>
                    </tr>
                    <tr>
                      <td style="padding: 6px 10px; border-right: 1px solid #e2e8f0; font-weight: bold; background-color:#f8fafc; vertical-align: top;">บันทึกครู</td>
                      <td colspan="3" style="padding: 6px 10px; vertical-align: top;">${getVal(v, "teacherNotes") || '-'}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
          `;

          const imagesStr = getVal(v, 'images');
          if (imagesStr) {
            const urls = parseImages(imagesStr);
            const base64Images = await Promise.all(urls.map(u => urlToBase64(u)));
            const validImages = base64Images.filter(img => img !== null);
            
            if (validImages.length > 0) {
              html += `<div style="padding: 12px; border-top: 1px solid #94a3b8; background-color: #f1f5f9; page-break-inside: avoid;">
                         <p style="font-weight:bold; margin-top:0; margin-bottom:8px; font-size:13px; color:#475569;">ภาพประกอบการเยี่ยมบ้าน:</p>
                         <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content: flex-start;">`;
              
              validImages.forEach(img => {

                           <img src="${img}" style="width:100%; height:100%; object-fit:contain;" />

              html += `  </div>
                       </div>`;
            }
          }
          html += `</div>`;
        }

        container.innerHTML = html;

        try {

            filename: `รายงานเยี่ยมบ้าน_จำนวน${targetStudents.length}คน.pdf`,
            image: { type: 'jpeg', quality: 0.95 },

        } finally {
          container.innerHTML = ""; 
          container.style.visibility = "hidden";
          setGenerating(false);
          setSelectedStudents(new Set()); 
        }
      };

      if(!isLoaded) return <div className="text-center mt-32"><div className="w-16 h-16 border-4 border-slate-200 border-t-rose-500 rounded-full animate-spin mx-auto"></div></div>;

      const visitedList = students.filter(s => getVisitStatus(visits, s.studentNo) === "เยี่ยมแล้ว");

      return (

    function VisitForm({ student, visits, onBack, onSave }) {
      const exist = visits.slice().reverse().find(v => compareId(getVal(v,"studentNo"), student.studentNo) && getVal(v,"classLevel") === getVal(student,"classLevel")) || {};
      
      const [form, setForm] = useState({
        studentNo: student.studentNo, studentName: student.studentName, classLevel: getVal(student, "classLevel"),
        semester: getVal(exist,"semester")||"1", visitStatus: getVal(exist,"visitStatus")||"เยี่ยมแล้ว", 
        visitDate: getVal(exist,"visitDate") ? safeDateForInput(getVal(exist,"visitDate")) : safeDateForInput(new Date()), 
        appointmentDate: getVal(exist,"appointmentDate") ? safeDateForInput(getVal(exist,"appointmentDate")) : "",
        observations: getVal(exist,"observations"), houseType: getVal(exist,"houseType"), distanceKm: getVal(exist,"distanceKm"), 
        travelMethod: getVal(exist,"travelMethod"), houseCondition: getVal(exist,"houseCondition"), utilities: getVal(exist,"utilities"), environment: getVal(exist,"environment"),
        familyMembers: getVal(exist,"familyMembers"), siblings: getVal(exist,"siblings"), familyRelationship: getVal(exist,"familyRelationship"), familyIncome: getVal(exist,"familyIncome"), studentDuties: getVal(exist,"studentDuties"), familyActivities: getVal(exist,"familyActivities"),
        riskHealth: getVal(exist,"riskHealth"), riskSafety: getVal(exist,"riskSafety"), riskTravel: getVal(exist,"riskTravel"), riskWork: getVal(exist,"riskWork"), riskSocial: getVal(exist,"riskSocial"), riskSubstance: getVal(exist,"riskSubstance"), parentConcerns: getVal(exist,"parentConcerns"),
        visitResult: getVal(exist,"visitResult"), teacherNotes: getVal(exist,"teacherNotes"), 
        images: parseImages(getVal(exist, "images"))
      });
      
      const [step, setStep] = useState(0);
      const [gpsStatus, setGpsStatus] = useState(null);
      const [gpsDist, setGpsDist] = useState("");
      
      const STEPS = ["ข้อมูลเบื้องต้น", "ที่พัก", "ครอบครัว", "ความเสี่ยง", "รูปภาพ"];
      const update = (k, v) => setForm(p => ({...p, [k]:v}));

      const handleImage = (e) => {
        Array.from(e.target.files).forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = new Image(); img.src = ev.target.result;
            img.onload = () => {
              const canvas = document.createElement("canvas");
              const ratio = Math.min(1, 800 / img.width); 
              canvas.width = img.width * ratio; canvas.height = img.height * ratio;
              canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
              update("images", [...(form.images||[]), canvas.toDataURL("image/jpeg", 0.7)]);
            };
          };
          reader.readAsDataURL(file);
        });
        e.target.value = "";
      };

      const getGPS = () => {
        setGpsStatus("loading");
        if("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(pos => {
            const R=6371; const dLat=(SCHOOL_LAT-pos.coords.latitude)*Math.PI/180; const dLon=(SCHOOL_LON-pos.coords.longitude)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(pos.coords.latitude*Math.PI/180)*Math.cos(SCHOOL_LAT*Math.PI/180)*Math.sin(dLon/2)**2;
            const dist = (R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2);
            update("distanceKm", dist); setGpsDist(dist); setGpsStatus("success");
            setTimeout(() => setGpsStatus(null), 2500);
          }, () => { setGpsStatus("error"); setTimeout(() => setGpsStatus(null), 2500); }, {enableHighAccuracy:true, timeout:10000});
        } else { setGpsStatus("error"); setTimeout(() => setGpsStatus(null), 2500); }
      };

      return (
        <div className="slide-up max-w-4xl mx-auto">
          <GpsPopup status={gpsStatus} distance={gpsDist} />

          <div className="flex items-center gap-6 mb-8">
            <button onClick={onBack} className="w-14 h-14 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-500 btn-press shadow-sm hover:border-blue-400 hover:text-blue-600 transition-colors cursor-pointer"><i className="fa-solid fa-arrow-left text-xl"></i></button>
            <div><h2 className="text-3xl font-black text-slate-800 tracking-tight">{student.studentName}</h2><p className="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full inline-block mt-2 shadow-sm">เลขที่ {student.studentNo} • ชั้น {getVal(student, "classLevel")}</p></div>
          </div>

          <div className="bg-white p-3 rounded-full mb-8 shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-slate-100 flex justify-between relative mx-2">
            <div className="absolute top-1/2 left-[10%] right-[10%] h-2 bg-slate-100 -translate-y-1/2 -z-10 rounded-full"><div className="h-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-700 ease-out rounded-full shadow-sm" style={{ width: `${(step/(STEPS.length-1))*100}%` }}></div></div>
            {STEPS.map((s, i) => (
              <div key={i} onClick={() => setStep(i)} className="flex flex-col items-center cursor-pointer group btn-press w-1/5">
                <div className={`w-12 h-12 rounded-full flex items-center justify-center text-sm font-black mb-2 transition-all border-[4px] ${step === i ? "bg-white border-blue-600 text-blue-600 scale-110 shadow-lg" : step > i ? "bg-blue-500 border-blue-500 text-white" : "bg-slate-50 border-slate-50 text-slate-400 group-hover:bg-slate-100 group-hover:border-slate-100"}`}>
                  {step > i ? <i className="fa-solid fa-check text-lg"></i> : i+1}
                </div>
                <span className={`text-[10px] sm:text-sm font-bold text-center hidden sm:block ${step===i ? "text-blue-600" : "text-slate-400"}`}>{s}</span>
              </div>
            ))}
          </div>

          <div className="soft-card p-8 md:p-12 mb-6 min-h-[500px]">
            {step === 0 && <div className="space-y-2 fade-in">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                 <PremiumSelect label="ภาคเรียน" icon="fa-calendar-days" value={form.semester} onChange={e=>update("semester", e.target.value)} options={["1","2"]} />
                 <PremiumSelect label="สถานะการเยี่ยม *" icon="fa-clipboard-check" value={form.visitStatus} onChange={e=>update("visitStatus", e.target.value)} options={["ยังไม่เยี่ยม","เยี่ยมแล้ว","นัดหมายแล้ว"]} />
              </div>
              {form.visitStatus === "นัดหมายแล้ว" ? (
                 <PremiumInput label="วันที่นัดหมาย" type="date" icon="fa-calendar-plus" value={form.appointmentDate} onChange={e=>update("appointmentDate", e.target.value)} />
              ) : (
                 <PremiumInput label="วันที่เยี่ยมบ้าน" type="date" icon="fa-calendar-check" value={form.visitDate} onChange={e=>update("visitDate", e.target.value)} />
              )}
              <PremiumTextarea label="การสังเกตเบื้องต้น" rows={4} value={form.observations} onChange={e=>update("observations", e.target.value)} placeholder="พิมพ์ข้อความสังเกตเบื้องต้น..." />
            </div>}
            
            {step === 1 && <div className="space-y-2 fade-in grid grid-cols-1 md:grid-cols-2 gap-x-6">
              <div className="col-span-full md:col-span-1"><PremiumInput label="ลักษณะที่พักอาศัย" icon="fa-house-chimney" value={form.houseType} onChange={e=>update("houseType", e.target.value)} placeholder="เช่น บ้านเดี่ยว, หอพัก" /></div>
              <div className="col-span-full md:col-span-1 relative mb-5 pop-in">
                <label className="block text-sm font-bold text-slate-500 mb-2 pl-4">ระยะทางถึงโรงเรียน (กม.)</label>
                <div className="flex gap-3">
                    <div className="input-wrapper flex-1 flex items-center overflow-hidden"><div className="pl-5 text-slate-400"><i className="fa-solid fa-route text-lg"></i></div><input type="number" value={form.distanceKm} onChange={e=>update("distanceKm", e.target.value)} className="premium-input pl-4" placeholder="0.00" /></div>
                    <button onClick={getGPS} className="bg-slate-900 text-white hover:bg-blue-600 px-6 rounded-[1.25rem] flex items-center justify-center btn-press shadow-md font-bold transition-colors whitespace-nowrap cursor-pointer"><i className="fa-solid fa-location-dot mr-2"></i>ดึง GPS</button>
                </div>
              </div>
              <div><PremiumInput label="วิธีการเดินทาง" icon="fa-car" value={form.travelMethod} onChange={e=>update("travelMethod", e.target.value)} placeholder="เช่น รถส่วนตัว, รถประจำทาง" /></div>
              <div><PremiumSelect label="สภาพบ้าน" icon="fa-house-crack" value={form.houseCondition} onChange={e=>update("houseCondition", e.target.value)} options={HOUSE_COND} /></div>
              <div className="col-span-full"><PremiumInput label="สิ่งอำนวยความสะดวก (น้ำ/ไฟ)" icon="fa-faucet-drip" value={form.utilities} onChange={e=>update("utilities", e.target.value)} /></div>
              <div className="col-span-full"><PremiumTextarea label="สภาพแวดล้อมรอบบ้าน" value={form.environment} onChange={e=>update("environment", e.target.value)} /></div>
            </div>}

            {step === 2 && <div className="space-y-2 fade-in grid grid-cols-1 md:grid-cols-2 gap-x-6">
              <div><PremiumInput label="จำนวนสมาชิกในบ้าน (คน)" type="number" icon="fa-people-roof" value={form.familyMembers} onChange={e=>update("familyMembers", e.target.value)} /></div>
              <div><PremiumInput label="จำนวนพี่น้อง (คน)" type="number" icon="fa-children" value={form.siblings} onChange={e=>update("siblings", e.target.value)} /></div>
              <div className="col-span-full"><PremiumSelect label="ความสัมพันธ์ในครอบครัว" icon="fa-hand-holding-heart" value={form.familyRelationship} onChange={e=>update("familyRelationship", e.target.value)} options={REL_OPTS} /></div>
              <div className="col-span-full"><PremiumInput label="รายได้ครอบครัวเฉลี่ย" icon="fa-coins" value={form.familyIncome} onChange={e=>update("familyIncome", e.target.value)} placeholder="เช่น 15,000 บาท/เดือน" /></div>
              <div className="col-span-full"><PremiumInput label="ภาระงานนักเรียนเมื่ออยู่บ้าน" icon="fa-broom" value={form.studentDuties} onChange={e=>update("studentDuties", e.target.value)} /></div>
              <div className="col-span-full"><PremiumTextarea label="กิจกรรมที่มักทำร่วมกัน" value={form.familyActivities} onChange={e=>update("familyActivities", e.target.value)} /></div>
            </div>}

            {step === 3 && <div className="space-y-2 fade-in grid grid-cols-1 md:grid-cols-2 gap-x-6">
              <div className="col-span-full md:col-span-1"><PremiumInput label="ด้านสุขภาพ" icon="fa-heart-pulse" value={form.riskHealth} onChange={e=>update("riskHealth", e.target.value)} /></div>
              <div className="col-span-full md:col-span-1"><PremiumInput label="ด้านความปลอดภัย" icon="fa-shield-halved" value={form.riskSafety} onChange={e=>update("riskSafety", e.target.value)} /></div>
              <div className="col-span-full md:col-span-1"><PremiumInput label="ด้านการเดินทาง" icon="fa-route" value={form.riskTravel} onChange={e=>update("riskTravel", e.target.value)} /></div>
              <div className="col-span-full md:col-span-1"><PremiumInput label="ด้านเศรษฐกิจ" icon="fa-sack-dollar" value={form.riskWork} onChange={e=>update("riskWork", e.target.value)} /></div>
              <div className="col-span-full md:col-span-1"><PremiumInput label="ด้านสังคม/เพื่อน" icon="fa-users-slash" value={form.riskSocial} onChange={e=>update("riskSocial", e.target.value)} /></div>
              <div className="col-span-full md:col-span-1"><PremiumInput label="ด้านยาเสพติด" icon="fa-smoking" value={form.riskSubstance} onChange={e=>update("riskSubstance", e.target.value)} /></div>
              <div className="col-span-full"><PremiumTextarea label="ข้อห่วงใยของผู้ปกครอง" value={form.parentConcerns} onChange={e=>update("parentConcerns", e.target.value)} /></div>
            </div>}

            {step === 4 && <div className="space-y-2 fade-in">
              <PremiumSelect label="สรุปความเห็นของครู" icon="fa-clipboard-user" value={form.visitResult} onChange={e=>update("visitResult", e.target.value)} options={RESULT_OPTS} />
              <PremiumTextarea label="บันทึกเพิ่มเติมจากครู" value={form.teacherNotes} onChange={e=>update("teacherNotes", e.target.value)} rows={4} />
              <div className="mb-5 pop-in">
                <label className="block text-sm font-bold text-slate-500 mb-4 pl-4">รูปภาพประกอบ ({form.images.length} รูป)</label>
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                  {form.images.map((img, i) => (
                    <div key={i} className="relative aspect-square rounded-[1.5rem] overflow-hidden group border-4 border-slate-50 shadow-sm">
                      <img src={img} className="w-full h-full object-cover" />
                      <button onClick={()=>update("images", form.images.filter((_,idx)=>idx!==i))} className="absolute inset-0 bg-rose-500/80 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity backdrop-blur-sm btn-press cursor-pointer"><i className="fa-solid fa-trash text-white text-3xl drop-shadow-md"></i></button>
                    </div>
                  ))}
                  <label className="border-4 border-dashed border-blue-200 bg-blue-50/50 rounded-[1.5rem] flex flex-col items-center justify-center aspect-square cursor-pointer hover:bg-blue-100 hover:border-blue-400 transition-colors btn-press shadow-sm cursor-pointer">
                    <i className="fa-solid fa-camera text-4xl text-blue-400 mb-3 drop-shadow-sm"></i><span className="text-sm font-bold text-blue-600">เพิ่มรูปภาพ</span>
                    <input type="file" accept="image/*" multiple onChange={handleImage} className="hidden"/>
                  </label>
                </div>
              </div>
            </div>}

            <div className="flex justify-between mt-12 pt-8 border-t border-slate-100">
              <button onClick={() => setStep(step-1)} disabled={step===0} className="px-8 py-4 rounded-full font-bold text-slate-500 bg-slate-50 hover:bg-slate-100 disabled:opacity-0 btn-press transition-all cursor-pointer"><i className="fa-solid fa-arrow-left mr-3"></i>ย้อนกลับ</button>
              {step < STEPS.length-1 ? (
                <button onClick={() => setStep(step+1)} className="px-12 py-4 rounded-full font-black text-white bg-slate-900 hover:bg-blue-600 shadow-xl shadow-slate-300 btn-press transition-all text-lg cursor-pointer">ถัดไป <i className="fa-solid fa-arrow-right ml-3"></i></button>
              ) : (
                <button onClick={() => onSave(form, form.images)} className="px-12 py-4 rounded-full font-black text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 shadow-xl shadow-blue-500/40 btn-press transition-all text-lg cursor-pointer"><i className="fa-solid fa-cloud-arrow-up mr-3"></i> บันทึกเข้าระบบจริง</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<DashboardApp />);
  </script>
</body>
</html>
